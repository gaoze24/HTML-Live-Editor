      updateToolbarState();
      syncSourceFromPreview();
      scheduleOverlayRefresh();
    }

    function applyImageDimension(property, rawValue) {
      const image = getSelectedImageTarget();
      if (!image) {
        return;
      }

      const numericValue = Math.max(1, Number(rawValue) || 1);
      image.style[property] = `${numericValue}px`;
      if (!image.style.objectFit) {
        image.style.objectFit = "cover";
      }
      updateToolbarState();
      syncSourceFromPreview();
      scheduleOverlayRefresh();
    }

    function applyCodeLanguageToSelection(languageValue) {
      const codeBlock = getSelectedCodeBlockTarget();
      if (!codeBlock) {
        return;
      }

      const selectedLanguage = String(languageValue || "").trim();
      const normalizedLanguage = normalizeCodeLanguage(selectedLanguage);
      if (!selectedLanguage) {
        codeBlock.removeAttribute("data-remark-language");
        codeBlock.removeAttribute("data-remark-fence-info");
      } else {
        codeBlock.setAttribute("data-remark-fence-info", selectedLanguage);
        if (normalizedLanguage) {
          codeBlock.setAttribute("data-remark-language", normalizedLanguage);
        } else {
          codeBlock.removeAttribute("data-remark-language");
        }
      }

      highlightPreviewCodeBlock(codeBlock, { force: true, preserveCaret: true });

      updateToolbarState();
      syncSourceFromPreview();
      scheduleOverlayRefresh();
      editorStatus.textContent = "Updated code language";
    }

    function replaceSelectedImage() {
      const image = getSelectedImageTarget();
      if (!image) {
        return;
      }

      appState.imagePickerMode = "replace-image";
      appState.pendingImageTarget = image;
      imagePicker.value = "";
      imagePicker.click();
    }

    function toHexColor(colorValue, fallback) {
      if (!colorValue || colorValue === "transparent" || colorValue === "rgba(0, 0, 0, 0)") {
        return fallback;
      }

      const match = colorValue.match(/\d+/g);
      if (!match || match.length < 3) {
        return fallback;
      }

      const [r, g, b] = match.slice(0, 3).map((value) => Number(value).toString(16).padStart(2, "0"));
      return `#${r}${g}${b}`;
    }

    function createNewPage() {
      if (isRemarkMode()) {
        createNewRemarkSlide();
        return;
      }

      createNewHtmlPage();
    }

    function createNewHtmlPage() {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return;
      }

      const page = createBlankPageSection(previewDocument);
      previewDocument.body.appendChild(page);
      initializePageModel(previewDocument);
      markInteractiveNodes(previewDocument);
      setCurrentPage(page, { scroll: true });
      selectElement(page);
      syncSourceFromPreview();
      editorStatus.textContent = "Added new page";
      setPreviewHint("The new page is ready. Add text or images to the current page, or drag selected elements into place.");
    }

    function createNewRemarkSlide() {
      const slide = createRemarkSlide({
        directives: [createRemarkDirective("class", "middle, center")],
        bodySource: "# New Slide\n\nYour content here",
        notesSource: ""
      });

      appState.documentModel.slides.push(slide);
      appState.pendingSelection = { remarkSlideId: slide.id };
      setSourceValue(buildRemarkDeckSource(appState.documentModel));
      renderCurrentDocument();
      editorStatus.textContent = "Added new slide";
      setPreviewHint("The new slide is ready. Edit its class metadata in the toolbar or add visible content directly in the preview.");
    }

    function deleteSelectedElement() {
      if (!canDeleteSelectedElement()) {
        return;
      }

      const element = appState.selectedElement;
      const page = getElementPage(element);
      clearSelection(false);
      element.remove();

      if (page && page.isConnected) {
        setCurrentPage(page, { scroll: false });
      }

      syncSourceFromPreview();
      editorStatus.textContent = "Deleted selected element";
      setPreviewHint("The selected element was removed and will not appear in export.");
      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function deleteCurrentPage() {
      if (!canDeleteCurrentPage()) {
        updateToolbarState();
        return;
      }

      const noun = isRemarkMode() ? "slide" : "page";
      if (!window.confirm(`Delete the current ${noun}?`)) {
        return;
      }

      if (isRemarkMode()) {
        deleteCurrentRemarkSlide();
      } else {
        deleteCurrentHtmlPage();
      }
    }

    function deleteCurrentHtmlPage() {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return;
      }

      const page = ensureCurrentPage(previewDocument, false);
      if (!page) {
        return;
      }

      const pages = getPageElements(previewDocument);
      const currentPage = getActivePage(previewDocument);
      const fallbackPage = resolvePageAfterDeletion(pages, page, currentPage);
      const shouldClearSelection = Boolean(appState.selectedElement) && getElementPage(appState.selectedElement) === page;

      if (shouldClearSelection) {
        clearSelection(false);
      }

      if (page === previewDocument.body) {
        previewDocument.body.replaceChildren();
      } else {
        page.remove();
      }

      initializePageModel(previewDocument);
      let nextPage = fallbackPage && fallbackPage.isConnected ? fallbackPage : getActivePage(previewDocument);

      if ((!nextPage || nextPage === previewDocument.body) &&
        !previewDocument.body.children.length &&
        !previewDocument.body.textContent.trim()) {
        previewDocument.body.replaceChildren();
        nextPage = createBlankPageSection(previewDocument);
        previewDocument.body.appendChild(nextPage);
        initializePageModel(previewDocument);
      }

      markInteractiveNodes(previewDocument);

      if (nextPage && nextPage.isConnected) {
        setCurrentPage(nextPage, { scroll: false });
      }

      syncSourceFromPreview();
      editorStatus.textContent = pages.length <= 1 ? "Reset page" : "Deleted page";
      setPreviewHint("The editor stayed on the nearest remaining page so your place is preserved.");
      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function deleteCurrentRemarkSlide() {
      const slides = appState.documentModel?.slides || [];
      if (!slides.length) {
        return;
      }

      const currentSlide = getCurrentRemarkSlide() || slides[0];
      const targetSlide = currentSlide;
      const targetIndex = slides.findIndex((slide) => slide.id === targetSlide.id);
      if (targetIndex === -1) {
        return;
      }

      const previewScrollState = capturePreviewScrollState();
      const nextSlide = targetSlide.id !== currentSlide.id
        ? currentSlide
        : slides[targetIndex + 1] || slides[targetIndex - 1] || null;

      clearSelection(false);

      if (slides.length <= 1) {
        const replacementSlide = createEmptyRemarkSlide();
        appState.documentModel.slides = [replacementSlide];
        appState.pendingSelection = {
          remarkSlideId: replacementSlide.id,
          index: 0,
          previewScrollState
        };
        setSourceValue(buildRemarkDeckSource(appState.documentModel));
        renderCurrentDocument();
        editorStatus.textContent = "Reset slide";
        setPreviewHint("The final slide was replaced with a new blank slide so your deck stays editable.");
        return;
      }

      appState.documentModel.slides = slides.filter((slide) => slide.id !== targetSlide.id);
      appState.pendingSelection = {
        remarkSlideId: nextSlide?.id || null,
        index: Math.max(0, Math.min(targetIndex, appState.documentModel.slides.length - 1)),
        previewScrollState
      };

      setSourceValue(buildRemarkDeckSource(appState.documentModel));
      renderCurrentDocument();
      editorStatus.textContent = "Deleted slide";
      setPreviewHint("The editor stayed on the nearest remaining slide so your position in the deck is preserved.");
    }

    function createBlankPageSection(previewDocument) {
      const pageDefaults = appState.documentModel?.pageDefaults || createDefaultPageDefaults("normal-html");
      const page = previewDocument.createElement("section");
      page.setAttribute("data-builder-page", "true");
      page.style.position = "relative";
      page.style.display = "block";
      page.style.width = pageDefaults.widthCss;
      page.style.minHeight = `${pageDefaults.minHeightPx}px`;
      page.style.margin = "0 auto 28px";
      page.style.padding = pageDefaults.paddingCss;
      page.style.background = pageDefaults.backgroundCss;
      page.style.border = pageDefaults.borderCss;
      page.style.borderRadius = pageDefaults.borderRadiusCss;
      page.style.boxShadow = pageDefaults.boxShadowCss;
      page.style.fontFamily = pageDefaults.fontFamilyCss;
      page.style.color = pageDefaults.colorCss;
      page.style.overflow = "hidden";
      return page;
    }

    function addCodeBlockToCurrentPage() {

    function addImageNodeToCurrentPage(dataUrl, fileName) {
      const previewDocument = previewFrame.contentDocument;
      const page = ensureCurrentPage(previewDocument, true);

      if (!previewDocument || !page) {
        return;
      }

      const image = previewDocument.createElement("img");
      image.setAttribute("data-builder-node", "image");
      image.src = dataUrl;
      image.alt = fileName ? fileName.replace(/\.[^.]+$/, "") : "Inserted image";
      image.style.position = "absolute";
      image.style.left = `${getBuilderOffset(page, 84)}px`;
      image.style.top = `${getBuilderOffset(page, 126)}px`;
      image.style.width = "320px";
      image.style.height = "220px";
      image.style.margin = "0";
      image.style.alignSelf = "flex-start";
      image.style.justifySelf = "start";
      image.style.display = "block";
      image.style.objectFit = "cover";
      image.style.borderRadius = "22px";
      image.style.boxShadow = "0 18px 36px rgba(20, 33, 61, 0.16)";

      page.appendChild(image);
      markInteractiveNodes(previewDocument);
      selectElement(image);
      syncSourceFromPreview();
      editorStatus.textContent = "Added image";
      setPreviewHint("Use the image controls for dimensions and styling, or drag the selected image with the Move handle.");
    }

    function getBuilderOffset(page, baseOffset) {
      const count = page.querySelectorAll("[data-builder-node]").length;
      return baseOffset + (count % 6) * 26;
    }

    function focusEditableElement(element) {
      if (!element.matches("[data-editor-text-editable='true']")) {
        return;
      }

      element.focus();
      const selection = previewFrame.contentWindow.getSelection();
      const range = element.ownerDocument.createRange();
      range.selectNodeContents(element);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function handleImageSelection(event) {
      const file = event.target.files && event.target.files[0];

      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        if (typeof reader.result !== "string") {
          return;
        }

        if (appState.imagePickerMode === "add-image") {
          addImageNodeToCurrentPage(reader.result, file.name);
        } else if (appState.pendingImageTarget) {
          appState.pendingImageTarget.setAttribute("src", reader.result);
          appState.pendingImageTarget.removeAttribute("srcset");
          appState.pendingImageTarget.removeAttribute("sizes");
          if (!appState.pendingImageTarget.getAttribute("alt")) {
            appState.pendingImageTarget.setAttribute("alt", file.name.replace(/\.[^.]+$/, ""));
          }
          selectElement(appState.pendingImageTarget);
          syncSourceFromPreview();
          editorStatus.textContent = "Image updated";
          setPreviewHint(`Embedded ${file.name} as a Base64 data URL.`);
        }

        appState.pendingImageTarget = null;
        appState.imagePickerMode = null;
      };

      reader.readAsDataURL(file);
      imagePicker.value = "";
    }

    function syncSourceFromPreview() {
      const previewDocument = previewFrame.contentDocument;

      if (!previewDocument) {
        return;
      }

      if (isRemarkMode()) {
        syncRemarkSourceFromPreview(previewDocument);
      } else {
        syncNormalSourceFromPreview(previewDocument);
      }
    }

    function syncNormalSourceFromPreview(previewDocument) {
      const workingHtml = serializePreviewDocument(previewDocument, false);
      appState.documentModel.rawHtml = workingHtml;
      setSourceValue(workingHtml);
      editorStatus.textContent = "Changes synced";
    }

    function syncRemarkSourceFromPreview(previewDocument) {
      const slidePages = Array.from(previewDocument.querySelectorAll("[data-remark-slide-id]"));
      const slideMap = new Map(appState.documentModel.slides.map((slide) => [slide.id, slide]));
      const nextSlides = slidePages.map((page) => {
        const slideId = page.getAttribute("data-remark-slide-id");
        const slide = slideMap.get(slideId) || createRemarkSlide({});
        slide.bodySource = serializeRemarkSlideBody(page);
        return slide;
      });

      appState.documentModel.slides = nextSlides.length ? nextSlides : [createRemarkSlide({ bodySource: "", notesSource: "" })];
      setSourceValue(buildRemarkDeckSource(appState.documentModel));
      editorStatus.textContent = "Slide source synced";
      updateRemarkMetadataControls();
    }

    function serializePreviewDocument(previewDocument, forExport) {
      const clone = previewDocument.documentElement.cloneNode(true);
      clone.querySelector("#editor-preview-style")?.remove();
      clone.querySelector(`#${PREVIEW_ZOOM_STYLE_ID}`)?.remove();
      clone.querySelectorAll("[data-editor-overlay-root]").forEach((overlay) => overlay.remove());
      stripPreviewOnlyCodeDecorations(clone);

      clone.querySelectorAll("*").forEach((element) => {
        finalizeClonedTransform(element);

        Array.from(element.attributes).forEach((attribute) => {
          if (attribute.name.startsWith("data-editor-")) {
            element.removeAttribute(attribute.name);
          }

          if (forExport && attribute.name.startsWith("data-builder-")) {
            element.removeAttribute(attribute.name);
          }
        });

        element.removeAttribute("contenteditable");
        element.removeAttribute("spellcheck");
      });

      return `${appState.lastDoctype}\n${clone.outerHTML}`;
    }

    function finalizeClonedTransform(element) {
      const baseTransform = element.getAttribute("data-editor-base-transform") || "";
      const translateX = Number.parseFloat(element.getAttribute("data-editor-translate-x") || "0") || 0;
      const translateY = Number.parseFloat(element.getAttribute("data-editor-translate-y") || "0") || 0;
      const rotate = Number.parseFloat(element.getAttribute("data-editor-rotate") || "0") || 0;

      if (!baseTransform && !translateX && !translateY && !rotate) {
        return;
      }

      const parts = [];
      if (baseTransform) {
        parts.push(baseTransform);
      }
      if (translateX || translateY) {
        parts.push(`translate(${Math.round(translateX)}px, ${Math.round(translateY)}px)`);
      }
      if (rotate) {
        parts.push(`rotate(${rotate}deg)`);
      }

      element.style.transform = parts.join(" ").trim();
    }

    function exportEditedPage() {
      commitSourceInputToModel();

      if (isRemarkMode()) {
        exportRemarkDocument();
      } else {
        exportNormalDocument();
      }
    }

    function exportNormalDocument() {
      const rawHtml = appState.documentModel?.rawHtml || sourceInput.value || "";
      const sanitized = sanitizeHtmlDocument(rawHtml);
      const finalHtml = `${sanitized.doctype}\n${sanitized.document.documentElement.outerHTML}`;
      triggerDownload(finalHtml, appState.exportFileName || "edited_presentation.html");
      editorStatus.textContent = `Exported ${appState.exportFileName || "edited_presentation.html"}`;
      setPreviewHint("The exported file preserves page structure, positions, inline styles, and content changes without editor-only UI.");
    }

    function exportRemarkDocument() {
      const model = appState.documentModel;
      const slideSource = buildRemarkDeckSource(model);
      const textareaMarkup = buildRemarkTextareaMarkup(model, slideSource);
      const htmlAttributes = model.htmlAttributes || ` lang="en"`;
      const headHtml = model.headHtml || DEFAULT_REMARK_HEAD.trim();
      const bodyTemplate = ensureRemarkPlaceholder(model.bodyTemplate || DEFAULT_REMARK_BODY);
      const bodyHtml = bodyTemplate.replace(REMARK_PLACEHOLDER, textareaMarkup);
      const finalHtml = `${model.doctype || "<!DOCTYPE html>"}\n<html${htmlAttributes}>\n<head>\n${headHtml}\n</head>\n<body>\n${bodyHtml}\n</body>\n</html>`;

      triggerDownload(finalHtml, appState.exportFileName || "remark_deck.html");
      editorStatus.textContent = `Exported ${appState.exportFileName || "remark_deck.html"}`;
      setPreviewHint("The exported file is a remark-compatible slideshow wrapper with your updated slide source stored inside <textarea id=\"source\">.");
    }

    function triggerDownload(content, fileName) {
      const blob = new Blob([content], { type: "text/html;charset=utf-8" });
      const downloadUrl = URL.createObjectURL(blob);
      const downloadLink = document.createElement("a");

      downloadLink.href = downloadUrl;
      downloadLink.download = fileName;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      downloadLink.remove();
      URL.revokeObjectURL(downloadUrl);
    }

    function buildSanitizationLabel(stats) {
      const parts = [];

      if (stats.scriptsRemoved) {
        parts.push(`${stats.scriptsRemoved} script${stats.scriptsRemoved === 1 ? "" : "s"} removed`);
      }

      if (stats.handlersRemoved) {
        parts.push(`${stats.handlersRemoved} inline handler${stats.handlersRemoved === 1 ? "" : "s"} removed`);
      }

      if (stats.dangerousLinksNeutralized) {
        parts.push(`${stats.dangerousLinksNeutralized} javascript link${stats.dangerousLinksNeutralized === 1 ? "" : "s"} neutralized`);
      }

      if (stats.refreshTagsRemoved) {
        parts.push(`${stats.refreshTagsRemoved} refresh tag${stats.refreshTagsRemoved === 1 ? "" : "s"} removed`);
      }

      return parts.length ? parts.join(" | ") : "Safe preview ready";
    }

    function updateSourceStats() {
      sourceStats.textContent = `${sourceInput.value.length.toLocaleString()} characters`;
    }

    function handleSlideClassInput() {
      if (!isRemarkMode()) {
        return;
      }

      const slide = getCurrentRemarkSlide();
      if (!slide) {
        return;
      }

      setSlideDirectiveValue(slide, "class", slideClassControl.value, "class");
      const page = findRemarkPageBySlideId(slide.id);
      if (page) {
        applyRemarkClassesToPage(page, getSlideDirectiveValue(slide, "class"));
      }
      setSourceValue(buildRemarkDeckSource(appState.documentModel));
      editorStatus.textContent = "Updated slide class";
      setPreviewHint("Slide-level classes now apply to the current preview page and are preserved on export.");
    }

    function detectRemarkHtml(rawHtml) {
      if (!rawHtml || !/<textarea[^>]+id=["']source["']/i.test(rawHtml)) {
        return false;
      }

      const parser = new DOMParser();
      const documentNode = parser.parseFromString(rawHtml, "text/html");
      if (!documentNode.querySelector("textarea#source")) {
        return false;
      }

      const scripts = Array.from(documentNode.querySelectorAll("script")).map((script) => script.textContent || "");
      return scripts.some((text) => /remark\.create\s*\(/.test(text)) || /remark\.create\s*\(/.test(rawHtml);
    }

    function createRemarkModelFromHtml(rawHtml) {
      const parser = new DOMParser();
      const documentNode = parser.parseFromString(rawHtml || "", "text/html");
      ensureDocumentShape(documentNode);

      const sourceTextarea = documentNode.querySelector("textarea#source");
      const sourceValue = sourceTextarea ? sourceTextarea.value : DEFAULT_REMARK_SOURCE;

      if (sourceTextarea) {
        const placeholder = documentNode.createElement("remark-source-placeholder");
        placeholder.setAttribute("data-editor-remark-source", "true");
        sourceTextarea.replaceWith(placeholder);
      }

      const bodyTemplate = ensureRemarkPlaceholder(documentNode.body.innerHTML || DEFAULT_REMARK_BODY);
      const htmlAttributes = serializeElementAttributes(documentNode.documentElement) || ` lang="en"`;
      const textareaAttributes = sourceTextarea ? serializeElementAttributes(sourceTextarea) || ` id="source"` : ` id="source"`;

      return {
        mode: "remark-slideshow",
        doctype: extractDoctype(rawHtml) || serializeDoctype(documentNode),
        htmlAttributes,
        headHtml: (documentNode.head.innerHTML || DEFAULT_REMARK_HEAD.trim()).trim(),
        bodyTemplate,
        textareaAttributes,
        pageDefaults: createDefaultPageDefaults("remark-slideshow"),
        slides: parseRemarkDeckSource(sourceValue)
      };
    }

    function applyDocumentPageDefaults(previewDocument) {
      if (!previewDocument || !appState.documentModel?.pageDefaults) {
        return;
      }

      const defaults = appState.documentModel.pageDefaults;
      previewDocument.body.style.setProperty("--editor-page-width", defaults.widthCss);
      previewDocument.body.style.setProperty("--editor-page-min-height", `${defaults.minHeightPx}px`);
    }

    function syncDocumentPageDefaultsFromPreview(previewDocument) {
      if (!previewDocument || !appState.documentModel) {
        return;
      }

      const pages = getPageElements(previewDocument);
      if (!pages.length) {
        return;
      }

      const inferredDefaults = inferPageDefaultsFromPage(pages[0], appState.documentModel.mode);
      if (!inferredDefaults) {
        return;
      }

      appState.documentModel.pageDefaults = inferredDefaults;
    }

    function inferPageDefaultsFromPage(page, mode) {
      const fallback = createDefaultPageDefaults(mode);
      if (!page || !previewFrame.contentWindow) {
        return fallback;
      }

      const computed = previewFrame.contentWindow.getComputedStyle(page);
      const rect = page.getBoundingClientRect();
      const viewportWidth = previewFrame.contentDocument?.documentElement?.clientWidth || rect.width || 0;

      let widthCss = fallback.widthCss;
      const explicitWidth = (page.style.width || "").trim();
      if (explicitWidth) {
        widthCss = explicitWidth;
      } else if (rect.width > 0 && viewportWidth > 0 && rect.width < viewportWidth - 56) {
        widthCss = `${Math.round(rect.width)}px`;
      }

      let minHeightPx = fallback.minHeightPx;
      const explicitMinHeight = parsePixelValue(page.style.minHeight);
      const explicitHeight = parsePixelValue(page.style.height);
      const computedMinHeight = parsePixelValue(computed.minHeight);
      const computedHeight = parsePixelValue(computed.height);

      if (explicitMinHeight > 0) {
        minHeightPx = explicitMinHeight;
      } else if (explicitHeight > 0) {
        minHeightPx = explicitHeight;
      } else if (computedMinHeight > 0) {
        minHeightPx = computedMinHeight;
      } else if ((page.hasAttribute("data-builder-page") || mode === "remark-slideshow") && computedHeight > 0) {
        minHeightPx = computedHeight;
      }

      const paddingCss = inferPaddingCss(page, computed, fallback.paddingCss);
      const backgroundCss = inferBackgroundCss(page, computed, fallback.backgroundCss);
      const borderCss = inferBorderCss(page, computed, fallback.borderCss);
      const borderRadiusCss = inferBorderRadiusCss(page, computed, fallback.borderRadiusCss);
      const boxShadowCss = inferBoxShadowCss(page, computed, fallback.boxShadowCss);
      const fontFamilyCss = (page.style.fontFamily || computed.fontFamily || fallback.fontFamilyCss).trim() || fallback.fontFamilyCss;
      const colorCss = inferColorCss(page, computed, fallback.colorCss);

      return {
        widthCss,
        minHeightPx: Math.max(360, Math.round(minHeightPx)),
        paddingCss,
        backgroundCss,
        borderCss,
        borderRadiusCss,
        boxShadowCss,
        fontFamilyCss,
        colorCss
      };
    }

    function parsePixelValue(value) {
      if (!value || value === "auto" || value === "none") {
        return 0;
      }

      const match = String(value).match(/-?\d+(\.\d+)?/);
      return match ? Number.parseFloat(match[0]) || 0 : 0;
    }

    function inferPaddingCss(page, computed, fallback) {
      if ((page.style.padding || "").trim()) {
        return page.style.padding.trim();
      }

      const values = [
        computed.paddingTop,
        computed.paddingRight,
        computed.paddingBottom,
        computed.paddingLeft
      ].map((value) => value || "0px");

      return values.some((value) => parsePixelValue(value) > 0) ? values.join(" ") : fallback;
    }

    function inferBackgroundCss(page, computed, fallback) {
      if ((page.style.background || "").trim()) {
        return page.style.background.trim();
      }

      if (computed.backgroundImage && computed.backgroundImage !== "none") {
        return computed.background;
      }

      const color = computed.backgroundColor || "";
      return isTransparentColor(color) ? fallback : color;
    }

    function inferBorderCss(page, computed, fallback) {
      if ((page.style.border || "").trim()) {
        return page.style.border.trim();
      }

      const width = parsePixelValue(computed.borderTopWidth);
      return width > 0 ? computed.border : fallback;
    }

    function inferBorderRadiusCss(page, computed, fallback) {
      if ((page.style.borderRadius || "").trim()) {
        return page.style.borderRadius.trim();
      }

      const radius = parsePixelValue(computed.borderTopLeftRadius);
      return radius > 0 ? computed.borderRadius : fallback;
    }

    function inferBoxShadowCss(page, computed, fallback) {
      if ((page.style.boxShadow || "").trim()) {
        return page.style.boxShadow.trim();
      }

      return computed.boxShadow && computed.boxShadow !== "none" ? computed.boxShadow : fallback;
    }

    function inferColorCss(page, computed, fallback) {
      if ((page.style.color || "").trim()) {
        return page.style.color.trim();
      }

      const color = computed.color || "";
      return color && !isTransparentColor(color) ? color : fallback;
    }

    function isTransparentColor(value) {

      if (bodyTemplate.includes(REMARK_PLACEHOLDER)) {

      return `${REMARK_PLACEHOLDER}\n${bodyTemplate || DEFAULT_REMARK_BODY}`;

    function serializeElementAttributes(element) {

    function buildRemarkTextareaMarkup(model, slideSource) {

    function parseRemarkSlide(block) {

      const directives = [];
      let index = 0;

      while (index < lines.length && !lines[index].trim()) {

      const notesIndex = contentLines.findIndex((line) => isRemarkNotesSeparator(line));

      const bodySource = trimSurroundingBlankLines(bodyLines.join("\n"));
      const notesSource = trimSurroundingBlankLines(notesLines.join("\n"));
      return createRemarkSlide({
        directives,
        bodySource,
        notesSource
      });

    function isRemarkDirectiveLine(line) {
      const match = String(line || "").match(REMARK_DIRECTIVE_PATTERN);
      if (!match) {

      return /^\s*\?\?\?\s*$/.test(String(line || ""));

    function buildRemarkSlideSource(slide) {

      const parts = [];

      if (metadataLines.length) {

      }

        parts.push(`???\n${notes}`);
      }

      return parts.join("\n\n");

    function serializeRemarkDirective(directive) {

    function getSlideDirectiveValue(slide, key) {
      const directive = slide?.directives.find((item) => item.key === key.toLowerCase());
      return directive ? directive.value : "";
    }

    function setSlideDirectiveValue(slide, key, value, label = key) {
      if (!slide) {
        return;
      }

      const normalizedKey = key.toLowerCase();
      const trimmedValue = String(value || "").trim();
      const existing = slide.directives.find((item) => item.key === normalizedKey);

      if (!trimmedValue) {
        slide.directives = slide.directives.filter((item) => item.key !== normalizedKey);
        return;
      }

      if (existing) {
        existing.value = trimmedValue;
        existing.label = existing.label || label;
        existing.raw = `${existing.label}: ${trimmedValue}`;
        existing.dirty = true;
        return;

      slide.directives.unshift({
        key: normalizedKey,
        label,
        value: trimmedValue,
        raw: `${label}: ${trimmedValue}`,
        dirty: true
      });
    }

    function getCurrentRemarkSlide() {
      if (!isRemarkMode()) {
        return null;
      }

      const activeId = getActivePage(previewFrame.contentDocument)?.getAttribute("data-remark-slide-id");
      if (activeId) {
        return appState.documentModel.slides.find((slide) => slide.id === activeId) || null;
      }

      return appState.documentModel.slides[0] || null;
    }

    function findRemarkPageBySlideId(slideId) {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return null;
      }

      return Array.from(previewDocument.querySelectorAll("[data-remark-slide-id]")).find((page) => {
        return page.getAttribute("data-remark-slide-id") === slideId;
      }) || null;

    function extractRemarkClasses(value) {
      return String(value || "")
        .split(",")
        .map((part) => part.trim())
        .filter(Boolean)
        .flatMap((part) => part.split(/\s+/))
        .filter(Boolean);

      page.className = "remark-editor-slide";
      extractRemarkClasses(classValue).forEach((className) => {

    function renderRemarkSlideBody(source) {
      const normalized = String(source || "").replace(/\r\n?/g, "\n");
      const lines = normalized.split("\n");
      const blocks = [];
      let index = 0;

      while (index < lines.length) {
        const line = lines[index];

        if (!line.trim()) {
          index += 1;
          continue;
        }

        const classWrapper = parseRemarkClassWrapper(lines, index);
        if (classWrapper) {
          const innerMarkup = renderRemarkSlideBody(classWrapper.content);
          blocks.push(
            `<div class="${escapeHtmlAttribute(classWrapper.classNames.join(" "))}" data-remark-class-wrapper="true" data-remark-class-source="${escapeHtmlAttribute(classWrapper.classNames.join(" "))}">` +
            `${innerMarkup || '<p data-remark-block="paragraph" data-remark-empty="true">Empty block</p>'}` +
            `</div>`
          );

          continue;
        }

        if (/^```/.test(line.trim())) {
          const fenceInfo = line.trim().slice(3).trim();
          const language = normalizeCodeLanguage(extractFenceLanguage(fenceInfo));
          const codeLines = [];
          index += 1;

          while (index < lines.length && !/^```/.test(lines[index].trim())) {
            codeLines.push(lines[index]);
            index += 1;
          }

          if (index < lines.length) {
            index += 1;
          }

          const fenceInfoAttribute = fenceInfo ? ` data-remark-fence-info="${escapeHtmlAttribute(fenceInfo)}"` : "";
          const languageAttribute = language ? ` data-remark-language="${escapeHtmlAttribute(language)}"` : "";

          index += 1;

          const items = [];

        }

        const paragraphLines = [];
        while (index < lines.length && lines[index].trim() && !/^(#{1,3})\s+/.test(lines[index]) && !/^```/.test(lines[index].trim()) && !isRemarkListLine(lines[index]) && !/^\s*</.test(lines[index])) {

    function isRemarkListLine(line) {

    function renderInlineMarkup(text) {
      const rawText = String(text || "");

      const stash = (value) => {

        tokens.push({ token, value });

      markup = markup.replace(/&(?:#\d+|#x[0-9a-fA-F]+|[A-Za-z][A-Za-z0-9]+);/g, (entity) => {

      markup = markup.replace(/<\/?(?:br|code|img|span|em|strong|a|b|i|u|small|mark|sup|sub|del)(?:\s[^<>]*?)?>/gi, (tag) => {

      markup = markup.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => {
        return stash(`<img alt="${escapeHtmlAttribute(decodeRemarkInlineText(alt))}" src="${escapeHtmlAttribute(decodeRemarkInlineText(src))}">`);
      });

      markup = markup.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
        return stash(`<a href="${escapeHtmlAttribute(decodeRemarkInlineText(href))}">${escapeHtml(decodeRemarkInlineText(label))}</a>`);
      });

      markup = markup.replace(/`([^`]+)`/g, (_, code) => {

      });

      markup = markup.replace(/\.([A-Za-z0-9_-]+)\[([^\]]+)\]/g, (_, className, content) => {

      });

    function parseRemarkClassWrapper(lines, startIndex) {

        .split(".")
        .flatMap((part) => part.split(/\s+/))
        .map((part) => part.trim())
        .filter(Boolean);

      if (!rawClasses.length) {

      }

      let depth = 1;
      let index = startIndex + 1;

      while (index < lines.length) {
        const line = lines[index];
        const trimmed = line.trim();

        if (/^\s*\.([A-Za-z0-9_.\-\s]+)\[\s*$/.test(line)) {

          collected.push(line);
          index += 1;

              classNames: rawClasses,
              content: trimSurroundingBlankLines(collected.join("\n")),

          index += 1;
          continue;

        index += 1;

        return cleaned.outerHTML;

      if ((tagName === "UL" || tagName === "OL") && canSerializeSimpleList(cleaned)) {
        return Array.from(cleaned.children).map((item, index) => {
          const prefix = tagName === "OL" ? `${index + 1}.` : "-";
          return `${prefix} ${serializeRemarkInlineChildren(item).replace(/\n/g, " ").trim()}`;

        if (serializedCodeBlock) {

      finalizeClonedTransform(clone);

      nodes.forEach((node) => {

    function canSerializeRemarkInlineBlock(element) {

      if (node.nodeType !== Node.ELEMENT_NODE) {

      if (node.tagName === "A") {

    function getAllowedRemarkInlineAttributes(node) {

      }

      if (node.tagName === "IMG") {
        return ["src", "alt"];
      }

      if (node.tagName === "A") {

    function canSerializeSimpleTextBlock(element) {
      if (hasNonTrivialAttributes(element)) {

    }

    function canSerializeSimpleList(element) {
      if (hasNonTrivialAttributes(element)) {

      }

      return Array.from(element.children).every((child) => {
        return child.tagName === "LI" && canSerializeRemarkInlineBlock(child);
      });

    function canSerializeSimpleCodeBlock(element) {
      if (hasNonTrivialAttributes(element, ["data-remark-block", "data-remark-language", "data-remark-fence-info"])) {

      if (!element.children.length) {

      }

      const code = element.querySelector("code");
      if (code && element.children.length === 1 && !hasNonTrivialAttributes(code)) {

      return Array.from(element.querySelectorAll("*")).every((node) => {
        return ["BR", "DIV", "P"].includes(node.tagName) && !hasNonTrivialAttributes(node);

    }

    function serializeRemarkCodeBlock(element) {
      if (!canSerializeSimpleCodeBlock(element)) {
        return "";
      }

      const code = element.querySelector("code");
      const codeContent = (code ? code.textContent : (element.innerText || element.textContent)) || "";

      const fenceInfo = (element.getAttribute("data-remark-fence-info") || element.getAttribute("data-remark-language") || "").trim();
      const fenceSuffix = fenceInfo ? fenceInfo : "";
      return `\`\`\`${fenceSuffix}\n${codeContent.replace(/\n+$/, "")}\n\`\`\``;

    function canSerializeSimpleStandaloneImage(element) {
      return !hasNonTrivialAttributes(element, ["src", "alt"]);

    function canSerializeSimpleImageParagraph(element) {
      if (hasNonTrivialAttributes(element)) {

      return element.children.length === 1 && element.firstElementChild.tagName === "IMG" && canSerializeSimpleStandaloneImage(element.firstElementChild);

    function hasNonTrivialAttributes(element, allowedAttributes = []) {

    function serializePlainTextWithBreaks(element) {
      return Array.from(element.childNodes).map((child) => {

        return child.tagName === "BR" ? "\n" : "";

    function serializeRemarkInlineChildren(element) {
      return Array.from(element.childNodes).map((child) => serializeRemarkInlineNode(child)).join("").trim();
    }

    function serializeRemarkInlineNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return encodeRemarkTextNode(node.textContent);
      }

      if (node.nodeType !== Node.ELEMENT_NODE) {
        return "";
      }

      const element = node;

      if (element.tagName === "BR") {
        return "<br>";
      }

      if (element.tagName === "IMG" && canSerializeSimpleStandaloneImage(element)) {
        return `![${encodeRemarkAttributeText(element.getAttribute("alt") || "")}](${element.getAttribute("src") || ""})`;
      }

      if (element.tagName === "A" && !hasNonTrivialAttributes(element, ["href", "title"])) {
        return `[${serializeRemarkInlineChildren(element)}](${element.getAttribute("href") || ""})`;
      }

      if (element.tagName === "CODE" && !hasNonTrivialAttributes(element)) {
        return `\`${serializeRemarkInlineChildren(element).replace(/`/g, "\\`")}\``;

      if ((element.tagName === "STRONG" || element.tagName === "B") && !hasNonTrivialAttributes(element)) {

      if (element.tagName === "DEL" && !hasNonTrivialAttributes(element)) {

        if (/^[A-Za-z0-9_-]+$/.test(className)) {

        }
      }

      if (REMARK_INLINE_HTML_TAGS.has(element.tagName)) {
        return serializeElementHtmlForRemark(element);
      }

      return element.outerHTML;
    }

    function encodeRemarkTextNode(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function encodeRemarkAttributeText(value) {
      return String(value || "")
        .replace(/]/g, "\\]")
        .replace(/\[/g, "\\[");
    }

    function serializeElementHtmlForRemark(element) {
      const tagName = element.tagName.toLowerCase();
      const attributes = Array.from(element.attributes)
        .filter((attribute) => attribute.name !== "data-remark-inline-class")
        .map((attribute) => ` ${attribute.name}="${escapeHtmlAttribute(attribute.value)}"`)
        .join("");

      if (tagName === "br") {
        return "<br>";
      }

      if (tagName === "img") {
        return `<img${attributes}>`;
      }

      return `<${tagName}${attributes}>${serializeRemarkInlineChildren(element)}</${tagName}>`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeHtmlAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function escapeRegex(value) {
      return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    initialize();
  </script>
</body>
</html>
