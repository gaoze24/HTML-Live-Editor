      endRange.setEnd(range.endContainer, range.endOffset);

      return {
        start: startRange.toString().length,
        end: endRange.toString().length
      };
    }

    function resolveCodeBlockTextPosition(preElement, charOffset) {
      const documentNode = preElement.ownerDocument;
      const showText = documentNode.defaultView?.NodeFilter?.SHOW_TEXT || 4;
      const walker = documentNode.createTreeWalker(preElement, showText);
      let remaining = Math.max(0, Number(charOffset) || 0);
      let current = null;

      while ((current = walker.nextNode())) {
        const length = current.textContent?.length || 0;
        if (remaining <= length) {
          return { node: current, offset: remaining };
        }

        remaining -= length;
      }

      return { node: preElement, offset: preElement.childNodes.length };
    }

    function restoreCodeBlockSelection(preElement, offsets) {
      if (!offsets) {
        return;
      }

      const selection = preElement.ownerDocument.defaultView?.getSelection?.();
      if (!selection) {
        return;
      }

      const start = resolveCodeBlockTextPosition(preElement, offsets.start);
      const end = resolveCodeBlockTextPosition(preElement, offsets.end);
      const range = preElement.ownerDocument.createRange();

      range.setStart(start.node, start.offset);
      range.setEnd(end.node, end.offset);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function scheduleCodeBlockHighlight(preElement) {
      if (!isHighlightableCodePre(preElement)) {
        return;
      }

      if (preElement.getAttribute("data-editor-code-highlight-pending") === "true") {
        return;
      }

      preElement.setAttribute("data-editor-code-highlight-pending", "true");
      const view = preElement.ownerDocument.defaultView || window;
      const schedule = typeof view.requestAnimationFrame === "function"
        ? view.requestAnimationFrame.bind(view)
        : (callback) => view.setTimeout(callback, 16);
      schedule(() => {
        if (!preElement.isConnected) {
          return;
        }

        preElement.removeAttribute("data-editor-code-highlight-pending");
        highlightPreviewCodeBlock(preElement, { force: true, preserveCaret: true });
      });
    }

    function highlightPreviewCodeBlock(preElement, options = {}) {
      if (!isHighlightableCodePre(preElement)) {
        return;
      }

      ensureUnifiedCodeBlockStructure(preElement);

      const force = Boolean(options.force);
      const preserveCaret = Boolean(options.preserveCaret) || isCodeBlockFocused(preElement);
      const selectionOffsets = preserveCaret ? getCodeBlockSelectionOffsets(preElement) : null;
      const rawCode = readCodeBlockContent(preElement);
      const language = detectCodeLanguage(preElement);
      const highlightedHtml = renderHighlightedCode(rawCode, language);
      const currentLanguage = preElement.getAttribute("data-editor-code-language") || "";
      const isAlreadyHighlighted = preElement.getAttribute("data-editor-highlighted") === "true";

      if (!force && isAlreadyHighlighted && currentLanguage === language && preElement.innerHTML === highlightedHtml) {
        return;
      }

      preElement.setAttribute("data-editor-code-block", "true");
      preElement.setAttribute("data-editor-highlighted", "true");

      if (language) {
        preElement.setAttribute("data-editor-code-language", language);
      } else {
        preElement.removeAttribute("data-editor-code-language");
      }

      preElement.innerHTML = highlightedHtml;

      if (selectionOffsets) {
        restoreCodeBlockSelection(preElement, selectionOffsets);
      }
    }

    function detectCodeLanguage(preElement) {
      const legacyCodeElement = preElement?.firstElementChild?.tagName === "CODE" ? preElement.firstElementChild : null;
      const candidates = [
        preElement?.getAttribute("data-remark-language"),
        extractFenceLanguage(preElement?.getAttribute("data-remark-fence-info")),
        preElement?.getAttribute("data-language"),
        legacyCodeElement?.getAttribute("data-language"),
        preElement?.getAttribute("data-lang"),
        legacyCodeElement?.getAttribute("data-lang"),
        preElement?.getAttribute("lang"),
        legacyCodeElement?.getAttribute("lang"),
        extractCodeLanguageFromType(preElement?.getAttribute("type")),
        extractCodeLanguageFromType(legacyCodeElement?.getAttribute("type")),
        extractCodeLanguageFromClassNames(preElement?.className),
        extractCodeLanguageFromClassNames(legacyCodeElement?.className)
      ];

      return candidates.map(normalizeCodeLanguage).find(Boolean) || "";
    }

    function extractFenceLanguage(infoString) {
      const parts = String(infoString || "").trim().split(/\s+/).filter(Boolean);
      if (!parts.length) {
        return "";
      }

      return parts.find((part) => !/[=:{\[]/.test(part)) || parts[0];
    }

    function extractCodeLanguageFromType(typeValue) {
      const normalized = String(typeValue || "").trim().toLowerCase();
      if (!normalized) {
        return "";
      }

      const mimeMatch = normalized.match(/^(?:text|application)\/([a-z0-9.+-]+)$/);
      if (mimeMatch) {
        return mimeMatch[1].replace(/^x-/, "");
      }

      const genericMatch = normalized.match(/^[a-z0-9.+-]+\/x-([a-z0-9.+-]+)$/);
      return genericMatch ? genericMatch[1] : "";
    }

    function extractCodeLanguageFromClassNames(className) {
      const parts = String(className || "").split(/\s+/).map((part) => part.trim()).filter(Boolean);
      for (const part of parts) {
        const match = part.match(/^(?:language|lang)-([a-z0-9+#-]+)$/i);
        if (match) {
          return match[1];
        }

        if (CODE_LANGUAGE_ALIASES[part.toLowerCase()] || SUPPORTED_CODE_LANGUAGES.has(part.toLowerCase())) {
          return part;
        }
      }

      return "";
    }

    function normalizeCodeLanguage(value) {
      let normalized = String(value || "").trim().toLowerCase();
      if (!normalized) {
        return "";
      }

      normalized = normalized
        .replace(/^(?:language|lang)-/, "")
        .replace(/^x-/, "")
        .split(/[\s,{\[]/)[0]
        .replace(/^[^a-z0-9+#-]+|[^a-z0-9+#-]+$/g, "");

      return CODE_LANGUAGE_ALIASES[normalized] || normalized;
    }

    function renderHighlightedCode(source, language) {
      const normalizedLanguage = normalizeCodeLanguage(language);
      const safeSource = String(source || "");

      try {
        switch (normalizedLanguage) {
          case "markup":
            return highlightMarkupCode(safeSource);
          case "css":
            return highlightCssCode(safeSource);
          case "json":
            return highlightJsonCode(safeSource);
          case "javascript":
          case "typescript":
          case "java":
          case "c++":
            return highlightClikeCode(safeSource, normalizedLanguage);
          case "python":
            return highlightPythonCode(safeSource);
          case "bash":
            return highlightBashCode(safeSource);
          default:
            return escapeHtml(safeSource);
        }
      } catch (error) {
        return escapeHtml(safeSource);
      }
    }

    function highlightClikeCode(source, language) {
      const keywordsByLanguage = {
        java: "abstract assert break case catch class const continue default do else enum extends final finally for if implements import instanceof interface native new package private protected public return static strictfp super switch synchronized this throw throws transient try volatile while boolean byte char double float int long short void var record sealed permits non-sealed",
        javascript: "await break case catch class const continue debugger default delete do else export extends finally for function if import in instanceof let new of return static super switch this throw try typeof var void while with yield async null true false",
        typescript: "abstract as asserts await break case catch class const continue debugger declare default delete do else enum export extends finally for function if implements import in infer instanceof interface is keyof let namespace never new of override private protected public readonly return satisfies static super switch this throw try type typeof unique var void while with yield async null true false",
        "c++": "alignas alignof and and_eq asm auto bitand bitor bool break case catch char char8_t char16_t char32_t class compl concept const consteval constexpr constinit const_cast continue co_await co_return co_yield decltype default delete do double dynamic_cast else enum explicit export extern false float for friend goto if inline int long mutable namespace new noexcept not not_eq nullptr operator or or_eq private protected public register reinterpret_cast requires return short signed sizeof static static_assert static_cast struct switch template this thread_local throw true try typedef typeid typename union unsigned using virtual void volatile wchar_t while xor xor_eq"
      };

      const builtinsByLanguage = {
        java: "String System Integer Long Double Float Boolean Math List Map Set ArrayList HashMap Optional Objects Arrays Stream Runnable Exception RuntimeException",
        javascript: "Array Boolean Date Error JSON Map Math Number Object Promise RegExp Set String console document window globalThis Intl URL fetch",
        typescript: "Array Boolean Date Error JSON Map Math Number Object Promise RegExp Set String console document window globalThis Intl URL fetch Partial Pick Record Omit Readonly",
        "c++": "std size_t string vector map set unordered_map unordered_set optional variant any pair tuple shared_ptr unique_ptr weak_ptr cout cin cerr endl nullptr_t int8_t int16_t int32_t int64_t uint8_t uint16_t uint32_t uint64_t"
      };

      return tokenizeCode(source, [
        createCodeRule(/\s+/y),
        createCodeRule(/\/\*[\s\S]*?\*\//y, "comment"),
        createCodeRule(/\/\/[^\n\r]*/y, "comment"),
        createCodeRule(/@\w[\w.]*/y, "decorator"),
        createCodeRule(/`(?:\\[\s\S]|[^\\`])*`/y, "string"),
        createCodeRule(/'(?:\\.|[^'\\])*'/y, "string"),
        createCodeRule(/"(?:\\.|[^"\\])*"/y, "string"),
        createCodeRule(/\b(?:0x[\da-f]+|0b[01]+|0o[0-7]+|\d+(?:\.\d+)?(?:e[+-]?\d+)?)\b/iy, "number"),
        createCodeRule(createKeywordRegex(keywordsByLanguage[language]), "keyword"),
        createCodeRule(createKeywordRegex(builtinsByLanguage[language]), "builtin"),
        createCodeRule(/\b[A-Za-z_$][\w$]*(?=\s*:)/y, "property"),
        createCodeRule(/\b[A-Za-z_$][\w$]*(?=\s*\()/y, "function"),
        createCodeRule(/(?:=>|===|!==|==|!=|<=|>=|\+\+|--|\*\*|&&|\|\||[-+*/%=&|^!<>?:~]+)/y, "operator"),
        createCodeRule(/[()[\]{}.,;]/y, "punctuation")
      ]);
    }

    function highlightPythonCode(source) {
      return tokenizeCode(source, [
        createCodeRule(/\s+/y),
        createCodeRule(/#[^\n\r]*/y, "comment"),
        createCodeRule(/(?:[rRuUbBfF]{0,2})"""[\s\S]*?"""/y, "string"),
        createCodeRule(/(?:[rRuUbBfF]{0,2})'''[\s\S]*?'''/y, "string"),
        createCodeRule(/(?:[rRuUbBfF]{0,2})"(?:\\.|[^"\\])*"/y, "string"),
        createCodeRule(/(?:[rRuUbBfF]{0,2})'(?:\\.|[^'\\])*'/y, "string"),
        createCodeRule(/@\w[\w.]*/y, "decorator"),
        createCodeRule(/\b\d+(?:\.\d+)?(?:e[+-]?\d+)?\b/iy, "number"),
        createCodeRule(createKeywordRegex("and as assert async await break class continue def del elif else except False finally for from global if import in is lambda None nonlocal not or pass raise return True try while with yield match case"), "keyword"),
        createCodeRule(createKeywordRegex("self cls print len range dict list tuple set str int float bool object Exception ValueError TypeError Path"), "builtin"),
        createCodeRule(/\b[A-Za-z_][A-Za-z0-9_]*(?=\s*\()/y, "function"),
        createCodeRule(/[-+*/%=&|^!<>:]+/y, "operator"),
        createCodeRule(/[()[\]{}.,;]/y, "punctuation")
      ]);
    }

    function highlightBashCode(source) {
      return tokenizeCode(source, [
        createCodeRule(/\s+/y),
        createCodeRule(/#[^\n\r]*/y, "comment"),
        createCodeRule(/"(?:\\.|[^"\\])*"/y, "string"),
        createCodeRule(/'(?:\\.|[^'\\])*'/y, "string"),
        createCodeRule(/\$(?:[A-Za-z_][A-Za-z0-9_]*|\{[^}]+\}|[#?*!@$0-9-])/y, "variable"),
        createCodeRule(createKeywordRegex("if then elif else fi for while until do done in case esac function select time coproc return exit export local readonly declare"), "keyword"),
        createCodeRule(/\b\d+\b/y, "number"),
        createCodeRule(/(?:\|\||&&|<<-?|>>|[|&;<>()])/y, "operator"),
        createCodeRule(/[()[\]{},;]/y, "punctuation")
      ]);
    }

    function highlightJsonCode(source) {
      return tokenizeCode(source, [
        createCodeRule(/\s+/y),
        createCodeRule(/"(?:\\.|[^"\\])*"(?=\s*:)/y, "property"),
        createCodeRule(/"(?:\\.|[^"\\])*"/y, "string"),
        createCodeRule(/\b-?\d+(?:\.\d+)?(?:e[+-]?\d+)?\b/iy, "number"),
        createCodeRule(createKeywordRegex("true false null"), "keyword"),
        createCodeRule(/[{}\[\],:]/y, "punctuation")
      ]);
    }

    function highlightCssCode(source) {
      return tokenizeCode(source, [
        createCodeRule(/\s+/y),
        createCodeRule(/\/\*[\s\S]*?\*\//y, "comment"),
        createCodeRule(/"(?:\\.|[^"\\])*"/y, "string"),
        createCodeRule(/'(?:\\.|[^'\\])*'/y, "string"),
        createCodeRule(/@[A-Za-z-]+/y, "keyword"),
        createCodeRule(/#[0-9A-Fa-f]{3,8}\b/y, "number"),
        createCodeRule(/(?:--[A-Za-z0-9_-]+|[A-Za-z-]+)(?=\s*:)/y, "property"),
        createCodeRule(/\b[A-Za-z-]+(?=\()/y, "function"),
        createCodeRule(/\b\d+(?:\.\d+)?(?:%|[a-z]+)?\b/iy, "number"),
        createCodeRule(/[.#]?[A-Za-z_-][A-Za-z0-9_-]*/y, "tag"),
        createCodeRule(/[-+*/%=&|^!<>~]+/y, "operator"),
        createCodeRule(/[{}:;(),]/y, "punctuation")
      ]);
    }

    function highlightMarkupCode(source) {
      let output = "";
      let index = 0;
      const tagRegex = /<!DOCTYPE[\s\S]*?>|<!--[\s\S]*?-->|<\/?[A-Za-z][^<>]*?>/iy;
      const entityRegex = /&(?:#\d+|#x[\da-f]+|[a-z][a-z0-9]+);/iy;

      while (index < source.length) {
        tagRegex.lastIndex = index;
        const tagMatch = tagRegex.exec(source);
        if (tagMatch && tagMatch.index === index) {
          const token = tagMatch[0];
          output += token.startsWith("<!--")
            ? wrapHighlightedToken("comment", token)
            : token.toUpperCase().startsWith("<!DOCTYPE")
              ? wrapHighlightedToken("keyword", token)
              : highlightMarkupTag(token);
          index = tagRegex.lastIndex;
          continue;
        }

        entityRegex.lastIndex = index;
        const entityMatch = entityRegex.exec(source);
        if (entityMatch && entityMatch.index === index) {
          output += wrapHighlightedToken("entity", entityMatch[0]);
          index = entityRegex.lastIndex;
          continue;
        }

        output += escapeHtml(source[index]);
        index += 1;
      }

      return output;
    }

    function highlightMarkupTag(tagSource) {
      const match = tagSource.match(/^(<\/?)([^\s/>]+)([\s\S]*?)(\/?>)$/);
      if (!match) {
        return escapeHtml(tagSource);
      }

      const [, open, tagName, attributes, close] = match;
      return (
        wrapHighlightedToken("punctuation", open) +
        wrapHighlightedToken("tag", tagName) +
        highlightMarkupAttributes(attributes) +
        wrapHighlightedToken("punctuation", close)
      );
    }

    function highlightMarkupAttributes(source) {
      let output = "";
      let index = 0;

      while (index < source.length) {
        const whitespace = source.slice(index).match(/^\s+/);
        if (whitespace) {
          output += escapeHtml(whitespace[0]);
          index += whitespace[0].length;
          continue;
        }

        const attribute = source.slice(index).match(/^([^\s=/>]+)(\s*=\s*(?:"[^"]*"|'[^']*'|[^\s"'=<>`]+))?/);
        if (!attribute) {
          output += escapeHtml(source[index]);
          index += 1;
          continue;
        }

        output += wrapHighlightedToken("attr-name", attribute[1]);

        if (attribute[2]) {
          const valueMatch = attribute[2].match(/^(\s*=\s*)([\s\S]+)$/);
          output += escapeHtml(valueMatch[1]);
          output += wrapHighlightedToken("attr-value", valueMatch[2]);
        }

        index += attribute[0].length;
      }

      return output;
    }

    function tokenizeCode(source, rules) {
      let output = "";
      let index = 0;

      while (index < source.length) {
        let matched = false;

        for (const rule of rules) {
          rule.regex.lastIndex = index;
          const match = rule.regex.exec(source);
          if (!match || match.index !== index) {
            continue;
          }

          output += rule.tokenType ? wrapHighlightedToken(rule.tokenType, match[0]) : escapeHtml(match[0]);
          index = rule.regex.lastIndex;
          matched = true;
          break;
        }

        if (!matched) {
          output += escapeHtml(source[index]);
          index += 1;
        }
      }

      return output;
    }

    function createCodeRule(regex, tokenType = "") {
      return { regex, tokenType };
    }

    function createKeywordRegex(words) {
      const values = String(words || "").split(/\s+/).filter(Boolean).map(escapeRegex);
      return new RegExp(`\\b(?:${values.join("|")})\\b`, "iy");
    }

    function wrapHighlightedToken(tokenType, value) {
      return `<span data-editor-code-token="${escapeHtmlAttribute(tokenType)}">${escapeHtml(value)}</span>`;
    }

    function stripPreviewOnlyCodeDecorations(root) {
      if (!root) {
        return;
      }

      root.querySelectorAll("[data-editor-highlighted='true']").forEach((codeElement) => {
        codeElement.textContent = codeElement.textContent;
        codeElement.removeAttribute("data-editor-highlighted");
      });

      root.querySelectorAll("[data-editor-code-block], [data-editor-code-language]").forEach((element) => {
        element.removeAttribute("data-editor-code-block");
        element.removeAttribute("data-editor-code-language");
      });

      root.querySelectorAll("[data-editor-code-token]").forEach((element) => {
        const textNode = element.ownerDocument.createTextNode(element.textContent || "");
        element.replaceWith(textNode);
      });
    }

    function decoratePreviewDocument() {
      const previewDocument = previewFrame.contentDocument;

      if (!previewDocument) {
        return;
      }

      previewDocument.documentElement.setAttribute("data-editor-preview-root", "true");
      previewDocument.body.setAttribute("data-editor-preview", "true");
      previewDocument.body.setAttribute("data-editor-mode", isRemarkMode() ? "remark-slideshow" : "normal-html");
      initializePageModel(previewDocument);
      syncDocumentPageDefaultsFromPreview(previewDocument);
      applyDocumentPageDefaults(previewDocument);
      applyCodeSyntaxHighlighting(previewDocument);
      markInteractiveNodes(previewDocument);
      ensureEditorOverlay(previewDocument);
      bindPreviewEvents(previewDocument);

      const pendingSelection = appState.pendingSelection;
      const initialPage = resolvePendingPage(previewDocument) || ensureCurrentPage(previewDocument, true);
      if (initialPage) {
        setCurrentPage(initialPage, { scroll: false });
      }

      updatePagePicker(previewDocument);
      updateToolbarState();
      applyPreviewZoom({ preserveScroll: false });
      if (pendingSelection?.previewScrollState) {
        window.requestAnimationFrame(() => {
          restorePreviewScrollState(pendingSelection.previewScrollState);
          scheduleOverlayRefresh();
        });
      }
      refreshSelectionOverlay();
      appState.pendingSelection = null;
    }

    function initializePageModel(previewDocument) {
      if (isRemarkMode()) {
        initializeRemarkPageModel(previewDocument);
        return;
      }

      const body = previewDocument.body;
      const pages = findPageRoots(previewDocument);

      body.removeAttribute("data-editor-multipage");
      body.removeAttribute("data-editor-page");
      body.removeAttribute("data-editor-page-kind");
      body.removeAttribute("data-editor-page-label");
      body.removeAttribute("data-editor-page-id");
      body.removeAttribute("data-editor-page-active");

      previewDocument.querySelectorAll("[data-editor-page='true']").forEach((page) => {
        if (page !== body) {
          page.removeAttribute("data-editor-page");
          page.removeAttribute("data-editor-page-kind");
          page.removeAttribute("data-editor-page-label");
          page.removeAttribute("data-editor-page-active");
        }
      });

      if (!pages.length) {
        markPage(body, 0, "implicit");
        applySlideTypographyBaseline(previewDocument, [body], false);
        return;
      }

      if (pages.length > 1) {
        body.setAttribute("data-editor-multipage", "true");
      }

      pages.forEach((page, index) => {
        const kind = page.hasAttribute("data-builder-page") ? "builder" : "explicit";
        markPage(page, index, kind);
      });

      applySlideTypographyBaseline(previewDocument, pages, shouldApplySlideTypographyBaseline(previewDocument, pages));
    }

    function initializeRemarkPageModel(previewDocument) {
      const body = previewDocument.body;
      body.setAttribute("data-editor-multipage", "true");
      const pages = Array.from(previewDocument.querySelectorAll("[data-remark-slide-page='true']"));

      previewDocument.querySelectorAll("[data-editor-page='true']").forEach((page) => {
        page.removeAttribute("data-editor-page");
        page.removeAttribute("data-editor-page-kind");
        page.removeAttribute("data-editor-page-label");
        page.removeAttribute("data-editor-page-active");
      });

      pages.forEach((page, index) => {
        markPage(page, index, "remark");
      });
    }

    function resolvePendingPage(previewDocument) {
      const pending = appState.pendingSelection;
      if (!pending) {
        return null;
      }

      const pages = getPageElements(previewDocument);
      if (!pages.length) {
        return null;
      }

      if (pending.remarkSlideId) {
        const match = pages.find((page) => page.getAttribute("data-remark-slide-id") === pending.remarkSlideId);
        if (match) {
          return match;
        }
      }

      if (typeof pending.index === "number" && pending.index >= 0) {
        return pages[Math.min(pending.index, pages.length - 1)] || null;
      }

      if (pending.pageId) {
        return pages.find((page) => page.getAttribute("data-editor-page-id") === pending.pageId) || null;
      }

      return null;
    }

    function shouldApplySlideTypographyBaseline(previewDocument, pages) {
      if (pages.length < 2) {
        return false;
      }

      if (previewDocument.querySelector("style, link[rel='stylesheet']")) {
        return false;
      }

      return !previewDocument.querySelector(
        "[style*='font-size'], [style*='font-family'], [style*='font-weight'], [style*='line-height'], [style*='letter-spacing']"
      );
    }

    function applySlideTypographyBaseline(previewDocument, pages, shouldApply) {
      previewDocument.querySelectorAll("[data-editor-slide-baseline='true']").forEach((page) => {
        page.removeAttribute("data-editor-slide-baseline");
      });

      if (!shouldApply) {
        return;
      }

      pages.forEach((page) => {
        page.setAttribute("data-editor-slide-baseline", "true");
      });
    }

    function findPageRoots(previewDocument) {
      const children = Array.from(previewDocument.body.children).filter((child) => {
        return !child.matches("[data-editor-overlay-root='true'], script, style");
      });

      if (!children.length) {
        return [];
      }

      const explicit = children.filter((child) => {
        const hints = [
          child.id,
          child.className,
          child.getAttribute("data-page"),
          child.getAttribute("data-slide"),
          child.getAttribute("aria-label")
        ].filter(Boolean).join(" ");

        return child.hasAttribute("data-builder-page") || PAGE_HINT_PATTERN.test(hints);
      });

      if (explicit.length >= 2) {
        return explicit;
      }

      if (explicit.length === 1 && children.length === 1) {
        return explicit;
      }

      if (!explicit.length && children.length >= 2 && children.every(isStructuralPageSized)) {
        return children;
      }

      return explicit;
    }

    function isStructuralPageSized(element) {
      if (!["SECTION", "ARTICLE", "DIV", "MAIN"].includes(element.tagName)) {
        return false;
      }

      const computed = previewFrame.contentWindow.getComputedStyle(element);
      const rect = element.getBoundingClientRect();
      const breakAfter = `${computed.breakAfter || ""} ${computed.pageBreakAfter || ""}`;

      return rect.height >= 480 || /page|always/i.test(breakAfter);
    }

    function markPage(page, index, kind) {
      page.setAttribute("data-editor-page", "true");
      page.setAttribute("data-editor-page-kind", kind);
      page.setAttribute("data-editor-page-label", `${isRemarkMode() ? "Slide" : "Page"} ${index + 1}`);

      if (!page.getAttribute("data-editor-page-id")) {
        appState.pageCounter += 1;
        page.setAttribute("data-editor-page-id", `page-${appState.pageCounter}`);
      }

      if (page !== page.ownerDocument.body) {
        const computed = previewFrame.contentWindow.getComputedStyle(page);
        if (computed.position === "static") {
          page.style.position = "relative";
        }
      }
    }

    function markInteractiveNodes(previewDocument) {
      const nodes = [previewDocument.body, ...previewDocument.body.querySelectorAll("*")];

      nodes.forEach((element) => {
        if (element.matches("[data-editor-overlay-root='true'], [data-editor-overlay-root='true'] *")) {
          return;
        }

        if (isPreviewCodeTokenElement(element)) {
          return;
        }

        element.removeAttribute("data-editor-selectable");
        element.removeAttribute("data-editor-text-editable");
        element.removeAttribute("data-editor-image");
        element.removeAttribute("data-editor-managed-block");

        if (element !== previewDocument.body) {
          element.removeAttribute("contenteditable");
          element.removeAttribute("spellcheck");
        }

        if (element.tagName === "IMG") {
          element.setAttribute("data-editor-selectable", "true");
          element.setAttribute("data-editor-image", "true");
          element.setAttribute("data-editor-managed-block", "image");
          return;
        }

        if (element !== previewDocument.body && isCodePreElement(element)) {
          element.setAttribute("data-editor-selectable", "true");
          element.setAttribute("data-editor-text-editable", "true");
          element.setAttribute("contenteditable", "true");
          element.setAttribute("spellcheck", "false");
          element.setAttribute("data-editor-managed-block", "code");
          return;
        }

        if (element !== previewDocument.body && isTextEditableElement(element)) {
          element.setAttribute("data-editor-selectable", "true");
          element.setAttribute("data-editor-text-editable", "true");
          element.setAttribute("contenteditable", "true");
          element.setAttribute("spellcheck", "false");
          element.setAttribute("data-editor-managed-block", "text");
          return;
        }

        if (element !== previewDocument.body && isSelectableElement(element)) {
          element.setAttribute("data-editor-selectable", "true");
        }
      });
    }

    function isTextEditableElement(element) {
      if (!TEXT_EDITABLE_TAGS.has(element.tagName)) {
        return false;
      }

      if (isCodeBlockElement(element)) {
        return false;
      }

      if (element.matches("[data-editor-page='true']")) {
        return false;
      }

      if (element.closest("[data-editor-text-editable='true']")) {
        return false;
      }

      if (INLINE_FORMATTING_TAGS.has(element.tagName) && element.parentElement?.matches("[data-editor-text-editable='true']")) {
        return false;
      }

      const text = element.textContent.replace(/\s+/g, " ").trim();
      if (!text && element.tagName !== "PRE" && element.tagName !== "CODE") {
        return false;
      }

      if (element.tagName === "DIV") {
        return hasMeaningfulDirectText(element) &&
          !element.querySelector(STRUCTURAL_DESCENDANTS.map((tag) => tag.toLowerCase()).join(","));
      }

      if (/^H[1-6]$/.test(element.tagName) || element.tagName === "P" || element.tagName === "LI" || element.tagName === "BLOCKQUOTE") {
        return !element.querySelector("p, h1, h2, h3, h4, h5, h6, li, blockquote");
      }

      return true;
    }

    function hasMeaningfulDirectText(element) {
      return Array.from(element.childNodes).some((child) => {
        return child.nodeType === Node.TEXT_NODE && child.textContent.trim();
      });
    }

    function isSelectableElement(element) {
      if (NON_SELECTABLE_TAGS.has(element.tagName)) {
        return false;
      }

      if (isPreviewCodeTokenElement(element) || (element.tagName === "CODE" && element.parentElement?.tagName === "PRE")) {
        return false;
      }

      if (element.matches("[data-editor-page='true']")) {
        return true;
      }

      if (INLINE_FORMATTING_TAGS.has(element.tagName) && element.closest("[data-editor-text-editable='true']")) {
        return false;
      }

      const computed = previewFrame.contentWindow.getComputedStyle(element);
      if (computed.display === "none" || computed.visibility === "hidden") {
        return false;
      }

      const meaningfulText = element.textContent.replace(/\s+/g, " ").trim();
      const hasRenderableChild = Array.from(element.children).some((child) => {
        return !NON_SELECTABLE_TAGS.has(child.tagName) && child.getBoundingClientRect().width + child.getBoundingClientRect().height > 0;
      });

      return Boolean(meaningfulText || hasRenderableChild);
    }

    function isCodeBlockElement(element) {
      if (!element) {
        return false;
      }

      if (element.tagName === "PRE") {
        return element.firstElementChild?.tagName === "CODE";
      }

      return element.tagName === "CODE" && element.parentElement?.tagName === "PRE";
    }

    function isPreviewCodeTokenElement(element) {
      return Boolean(element?.hasAttribute("data-editor-code-token")) || Boolean(element?.closest?.("[data-editor-code-token]"));
    }

    function isResizableTextElement(element) {
      return Boolean(
        element &&
        element.matches("[data-editor-text-editable='true']") &&
        RESIZABLE_TEXT_TAGS.has(element.tagName) &&
        !isCodePreElement(element)
      );
    }

    function getManagedBlockKind(element) {
      if (!element || !element.ownerDocument || element === element.ownerDocument.body) {
        return "";
      }

      const explicitKind = element.getAttribute("data-editor-managed-block");
      if (explicitKind === "text" || explicitKind === "code" || explicitKind === "image") {
        return explicitKind;
      }

      if (element.matches("img[data-editor-image='true']")) {
        return "image";
      }

      if (isCodePreElement(element)) {
        return "code";
      }

      if (isResizableTextElement(element)) {
        return "text";
      }

      return "";
    }

    function getDimensionMinimumForElement(element, property) {
      const kind = getManagedBlockKind(element);
      if (kind === "image") {
        return 1;
      }

      if (kind === "code") {
        return property === "width" ? 120 : 96;
      }

      return property === "width" ? 80 : 48;
    }

    function ensureEditorOverlay(previewDocument) {
      if (previewDocument.querySelector("[data-editor-overlay-root='true']")) {
        return;
      }

      const root = previewDocument.createElement("div");
      root.setAttribute("data-editor-overlay-root", "true");
      root.innerHTML = `
        <div data-editor-guide-layer="true"></div>
        <div data-editor-selection-box="true">
          <button type="button" data-editor-move-handle="true">Move</button>
        </div>
        <button type="button" data-editor-resize-handle="true" data-resize-direction="nw" aria-hidden="true" tabindex="-1"></button>
        <button type="button" data-editor-resize-handle="true" data-resize-direction="ne" aria-hidden="true" tabindex="-1"></button>
        <button type="button" data-editor-resize-handle="true" data-resize-direction="sw" aria-hidden="true" tabindex="-1"></button>
        <button type="button" data-editor-resize-handle="true" data-resize-direction="se" aria-hidden="true" tabindex="-1"></button>
      `;
      previewDocument.body.appendChild(root);
    }

    function renderAlignmentGuides(previewDocument, guides) {
      const guideLayer = previewDocument?.querySelector("[data-editor-guide-layer='true']");
      if (!guideLayer) {
        appState.activeAlignmentGuides = null;
        return;
      }

      if (!Array.isArray(guides) || !guides.length) {
        appState.activeAlignmentGuides = null;
        guideLayer.replaceChildren();
        return;
      }

      appState.activeAlignmentGuides = guides.map((guide) => ({ ...guide }));
      const nodes = guides.map((guide) => {
        const line = previewDocument.createElement("div");
        const start = Math.round(Math.min(guide.start, guide.end));
        const end = Math.round(Math.max(guide.start, guide.end));
        line.setAttribute("data-editor-guide-line", "true");
        line.setAttribute("data-axis", guide.axis);

        if (guide.axis === "x") {
          line.style.left = `${Math.round(guide.position - ALIGNMENT_GUIDE_THICKNESS / 2)}px`;
          line.style.top = `${start}px`;
          line.style.width = `${ALIGNMENT_GUIDE_THICKNESS}px`;
          line.style.height = `${Math.max(1, end - start)}px`;
        } else {
          line.style.left = `${start}px`;
          line.style.top = `${Math.round(guide.position - ALIGNMENT_GUIDE_THICKNESS / 2)}px`;
          line.style.width = `${Math.max(1, end - start)}px`;
          line.style.height = `${ALIGNMENT_GUIDE_THICKNESS}px`;
        }

        return line;
      });

      guideLayer.replaceChildren(...nodes);
    }

    function clearAlignmentGuides(previewDocument = previewFrame.contentDocument) {
      appState.activeAlignmentGuides = null;
      previewDocument?.querySelector("[data-editor-guide-layer='true']")?.replaceChildren();
    }

    function bindPreviewEvents(previewDocument) {
      previewDocument.addEventListener("click", handlePreviewClick);
      previewDocument.addEventListener("dblclick", handlePreviewDoubleClick);
      previewDocument.addEventListener("pointerdown", handlePreviewPointerDown);
      previewDocument.addEventListener("focusin", handlePreviewFocusIn);
      previewDocument.addEventListener("input", handlePreviewMutation);
      previewDocument.addEventListener("blur", handlePreviewMutation, true);
      previewDocument.addEventListener("keydown", handlePreviewKeydown);
      previewDocument.addEventListener("submit", (event) => event.preventDefault());
      previewDocument.addEventListener("scroll", scheduleOverlayRefresh, true);
      previewFrame.contentWindow.addEventListener("resize", scheduleOverlayRefresh);
    }

    function handlePreviewClick(event) {
      const target = getEventTargetElement(event);
      const previewDocument = previewFrame.contentDocument;

      if (!target || !previewDocument) {
        return;
      }

      if (target.closest("[data-editor-overlay-root='true']")) {
        return;
      }

      const link = target.closest("a");
      if (link) {
        event.preventDefault();
      }

      const button = target.closest("button");
      if (button) {
        event.preventDefault();
      }

      const selectable = target.closest("[data-editor-selectable='true']");
      const page = getElementPage(target);

      if (page) {
        setCurrentPage(page, { scroll: false });
      }

      if (selectable) {
        selectElement(selectable);
        return;
      }

      clearSelection(false);

      if (page) {
        setCurrentPage(page, { scroll: false });
      }

      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function handlePreviewDoubleClick(event) {
      const target = getEventTargetElement(event);

      if (!target) {
        return;
      }

      const image = target.closest("img[data-editor-image='true']");
      if (!image) {
        return;
      }

      event.preventDefault();
      selectElement(image);
      replaceSelectedImage();
    }

    function handlePreviewPointerDown(event) {
      const target = getEventTargetElement(event);

      if (!target) {
        return;
      }

      const resizeHandle = target.closest("[data-editor-resize-handle='true']");
      if (resizeHandle && appState.selectedElement) {
        const direction = resizeHandle.getAttribute("data-resize-direction") || "se";
        startElementResize(appState.selectedElement, event, direction);
        return;
      }

      const handle = target.closest("[data-editor-move-handle='true']");
      if (!handle || !appState.selectedElement) {
        return;
      }

      startElementDrag(appState.selectedElement, event);
    }

    function handlePreviewKeydown(event) {
      if (event.key === "Tab") {
        const target = event.target;
        if (target && target.nodeType === 1 && target.matches("[data-editor-text-editable='true']")) {
          event.preventDefault();
          setPreviewHint("Tab stays inside the current text element so typing remains predictable.");
        }
      }

      handleDeleteShortcut(event);
    }

    function handleAppKeydown(event) {
      if (event.key === "Escape" && appState.fullscreenActive) {
        return;
      }

      if (event.key === "Escape" && appState.previewMaximized) {
        event.preventDefault();
        setPreviewMaximized(false);
        return;
      }
      handleDeleteShortcut(event);
    }

    function handleDeleteShortcut(event) {
      if (event.defaultPrevented || !isDeletionKey(event)) {
        return;
      }

      if (shouldIgnoreDeleteShortcut(event)) {
        return;
      }

      if (!canDeleteSelectedElement()) {
        return;
      }

      event.preventDefault();
      deleteSelectedElement();
    }

    function handlePreviewFocusIn(event) {
      const target = getEventTargetElement(event);
      if (!target) {
        return;
      }

      const codeBlock = resolveCodeBlockFromElement(target);
      if (!codeBlock) {
        return;
      }

      highlightPreviewCodeBlock(codeBlock, { preserveCaret: true });
    }

    function isDeletionKey(event) {
      return event.key === "Delete" || event.key === "Backspace";
    }

    function shouldIgnoreDeleteShortcut(event) {
      if (event.metaKey || event.ctrlKey || event.altKey) {
        return true;
      }

      const target = event.target;
      if (!target || target.nodeType !== 1) {
        return false;
      }

      if (target.matches("input, textarea, select")) {
        return true;
      }

      if (target.isContentEditable) {
        return true;
      }

      return false;
    }

    function handlePreviewMutation(event) {
      const target = getEventTargetElement(event || {});
      const codeBlock = target ? resolveCodeBlockFromElement(target) : null;
      if (codeBlock && event?.type === "input") {
        scheduleCodeBlockHighlight(codeBlock);
      }

      if (codeBlock && event?.type === "blur") {
        highlightPreviewCodeBlock(codeBlock, { force: true });
      }

      window.clearTimeout(appState.previewSyncTimer);
      appState.previewSyncTimer = window.setTimeout(syncSourceFromPreview, 90);
      updatePagePicker(previewFrame.contentDocument);
      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function getEventTargetElement(event) {
      if (event.target && event.target.nodeType === 1) {
        return event.target;
      }

      return event.target && event.target.parentElement ? event.target.parentElement : null;
    }

    function clearSelection(syncToolbar = true) {
      if (appState.selectedElement && typeof appState.selectedElement.removeAttribute === "function") {
        appState.selectedElement.removeAttribute("data-editor-selected");
      }

      appState.selectedElement = null;

      if (syncToolbar) {
        updateToolbarState();
      }

      scheduleOverlayRefresh();
    }

    function selectElement(element) {
      if (!element) {
        clearSelection();
        return;
      }

      if (appState.selectedElement === element) {
        setCurrentPage(getElementPage(element), { scroll: false });
        updateToolbarState();
        scheduleOverlayRefresh();
        return;
      }

      if (appState.selectedElement) {
        appState.selectedElement.removeAttribute("data-editor-selected");
      }

      appState.selectedElement = element;
      appState.selectedElement.setAttribute("data-editor-selected", "true");
      setCurrentPage(getElementPage(element), { scroll: false });
      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function setCurrentPage(page, options = {}) {
      const previewDocument = previewFrame.contentDocument;

      if (!previewDocument || !page) {
        return;
      }

      const allPages = getPageElements(previewDocument);
      allPages.forEach((candidate) => candidate.removeAttribute("data-editor-page-active"));

      appState.selectedPage = page;
      page.setAttribute("data-editor-page-active", "true");

      updatePagePicker(previewDocument);
      updateToolbarState();
      updatePresenterViewUi();

      if (options.scroll) {
        page.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function getActivePage(previewDocument) {
      if (!previewDocument) {
        return null;
      }

      if (appState.selectedPage && appState.selectedPage.ownerDocument === previewDocument && previewDocument.contains(appState.selectedPage)) {
        return appState.selectedPage;
      }

      if (appState.selectedElement) {
        const selectedElementPage = getElementPage(appState.selectedElement);
        if (selectedElementPage && selectedElementPage.ownerDocument === previewDocument && previewDocument.contains(selectedElementPage)) {
          return selectedElementPage;
        }
      }

      return getPageElements(previewDocument)[0] || null;
    }

    function resolvePageAfterDeletion(pages, deletedPage, currentPage) {
      if (!Array.isArray(pages) || !pages.length || !deletedPage) {
        return null;
      }

      if (currentPage && currentPage !== deletedPage && pages.includes(currentPage)) {
        return currentPage;
      }

      const deletedIndex = pages.indexOf(deletedPage);
      if (deletedIndex === -1) {
        return currentPage && pages.includes(currentPage) ? currentPage : pages[0] || null;
      }

      return pages[deletedIndex + 1] || pages[deletedIndex - 1] || null;
    }

    function getPageElements(previewDocument) {
      return Array.from(previewDocument.querySelectorAll("[data-editor-page='true']"));
    }

    function getElementPage(element) {
      if (!element || !element.ownerDocument) {
        return null;
      }

      return element.closest("[data-editor-page='true']") ||
        (element.ownerDocument.body.hasAttribute("data-editor-page") ? element.ownerDocument.body : null);
    }

    function ensureCurrentPage(previewDocument, createIfMissing) {
      if (!previewDocument) {
        return null;
      }

      const activePage = getActivePage(previewDocument);
      if (activePage) {
        return activePage;
      }

      if (!createIfMissing) {
        return null;
      }

      if (isRemarkMode()) {
        createNewRemarkSlide();
        return null;
      }

      initializePageModel(previewDocument);
      return previewDocument.body;
    }

    function updatePagePicker(previewDocument) {
      if (!previewDocument) {
        return;
      }

      const pages = getPageElements(previewDocument);
      const activePage = getActivePage(previewDocument);
      const activeId = activePage?.getAttribute("data-editor-page-id") || pages[0]?.getAttribute("data-editor-page-id") || "";

      pageSelect.innerHTML = "";

      pages.forEach((page, index) => {
        const option = document.createElement("option");
        const pageId = page.getAttribute("data-editor-page-id");
        option.value = pageId;
        option.textContent = buildPageOptionLabel(page, index);
        pageSelect.appendChild(option);
      });

      pageSelect.disabled = pages.length <= 1;

      if (activeId) {
        pageSelect.value = activeId;
      }
    }

    function buildPageOptionLabel(page, index) {
      const noun = isRemarkMode() ? "Slide" : "Page";
      const heading = page.querySelector("h1, h2, h3");
      const headingText = heading ? heading.textContent.replace(/\s+/g, " ").trim().slice(0, 28) : "";
      return headingText ? `${noun} ${index + 1}: ${headingText}` : `${noun} ${index + 1}`;
    }

    function getActivePageIndex() {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return 0;
      }

      const pages = getPageElements(previewDocument);
      if (!pages.length) {
        return 0;
      }

      const active = getActivePage(previewDocument) || pages[0];
      const index = pages.indexOf(active);
      return index >= 0 ? index : 0;
    }

    function scheduleOverlayRefresh() {
      if (appState.overlaySyncFrame) {
        return;
      }

      appState.overlaySyncFrame = window.requestAnimationFrame(() => {
        appState.overlaySyncFrame = null;
        refreshSelectionOverlay();
      });
    }

    function formatOverlayPixel(value) {
      if (!Number.isFinite(value)) {
        return "0px";
      }

      return `${Math.round(value * 1000) / 1000}px`;
    }

    function getSelectionOverlayMetrics(element) {
      if (!element) {
        return null;
      }

      const rect = element.getBoundingClientRect();
      if (!rect.width || !rect.height) {
        return null;
      }

      const left = rect.left;
      const top = rect.top;
      const right = rect.right;
      const bottom = rect.bottom;
      const width = right - left;
      const height = bottom - top;

      return {
        left,
        top,
        right,
        bottom,
        width,
        height,
        corners: {
          nw: { x: left, y: top },
          ne: { x: right, y: top },
          sw: { x: left, y: bottom },
          se: { x: right, y: bottom }
        }
      };
    }

    function clearResizeHandlePositions(resizeHandles) {
      resizeHandles.forEach((handle) => {
        handle.hidden = true;
        handle.style.left = "";
        handle.style.top = "";
      });
    }

    function positionResizeHandles(resizeHandles, overlayMetrics) {
      resizeHandles.forEach((handle) => {
        const direction = handle.getAttribute("data-resize-direction");
        const corner = overlayMetrics?.corners?.[direction];

        if (!corner) {
          handle.style.left = "";
          handle.style.top = "";
          return;
        }

        handle.style.left = formatOverlayPixel(corner.x);
        handle.style.top = formatOverlayPixel(corner.y);
      });
    }

    function refreshSelectionOverlay() {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return;
      }

      const selectionBox = previewDocument.querySelector("[data-editor-selection-box='true']");
      const moveHandle = previewDocument.querySelector("[data-editor-move-handle='true']");
      const resizeHandles = Array.from(previewDocument.querySelectorAll("[data-editor-resize-handle='true']"));

      if (!selectionBox || !moveHandle) {
        return;
      }

      if (!appState.selectedElement || !previewDocument.contains(appState.selectedElement)) {
        selectionBox.removeAttribute("data-visible");
        selectionBox.style.left = "";
        selectionBox.style.top = "";
        selectionBox.style.width = "";
        selectionBox.style.height = "";
        clearResizeHandlePositions(resizeHandles);
        clearAlignmentGuides(previewDocument);
        return;
      }

      const overlayMetrics = getSelectionOverlayMetrics(appState.selectedElement);
      if (!overlayMetrics) {
        selectionBox.removeAttribute("data-visible");
        clearResizeHandlePositions(resizeHandles);
        clearAlignmentGuides(previewDocument);
        return;
      }

      selectionBox.setAttribute("data-visible", "true");
      selectionBox.style.left = formatOverlayPixel(overlayMetrics.left);
      selectionBox.style.top = formatOverlayPixel(overlayMetrics.top);
      selectionBox.style.width = formatOverlayPixel(overlayMetrics.width);
      selectionBox.style.height = formatOverlayPixel(overlayMetrics.height);
      moveHandle.hidden = !canDragElement(appState.selectedElement);
      const canResize = canResizeElement(appState.selectedElement);
      resizeHandles.forEach((handle) => {
        handle.hidden = !canResize;
      });
      if (canResize) {
        positionResizeHandles(resizeHandles, overlayMetrics);
      } else {
        clearResizeHandlePositions(resizeHandles);
      }
    }

    function canDragElement(element) {
      if (!element || !element.ownerDocument) {
        return false;
      }

      return element !== element.ownerDocument.body;
    }

    function canResizeElement(element) {
      if (!element || !element.ownerDocument || element === element.ownerDocument.body) {
        return false;
      }

      return Boolean(getManagedBlockKind(element));
    }

    function createRectSnapshot(rect) {
      const left = rect.left;
      const top = rect.top;
      const width = rect.width;
      const height = rect.height;
      return {
        left,
        top,
        width,
        height,
        right: left + width,
        bottom: top + height,
        centerX: left + width / 2,
        centerY: top + height / 2
      };
    }

    function offsetRectSnapshot(rect, deltaX, deltaY) {
      return {
        left: rect.left + deltaX,
        top: rect.top + deltaY,
        width: rect.width,
        height: rect.height,
        right: rect.right + deltaX,
        bottom: rect.bottom + deltaY,
        centerX: rect.centerX + deltaX,
        centerY: rect.centerY + deltaY
      };
    }

    function getRectMetric(rect, axis, key) {
      if (axis === "x") {
        if (key === "left") {
          return rect.left;
        }

        if (key === "right") {
          return rect.right;
        }

        return rect.centerX;
      }

      if (key === "top") {
        return rect.top;
      }

      if (key === "bottom") {
        return rect.bottom;
      }

      return rect.centerY;
    }

    function collectAlignmentSiblings(draggedElement, page) {
      return Array.from(page.querySelectorAll("[data-editor-selectable='true']")).reduce((result, candidate) => {
        if (
          candidate === draggedElement ||
          candidate.matches("[data-editor-page='true']") ||
          candidate.closest("[data-editor-overlay-root='true']") ||
          draggedElement.contains(candidate) ||
          candidate.contains(draggedElement)
        ) {
          return result;
        }

        const rect = createRectSnapshot(candidate.getBoundingClientRect());
        if (!rect.width || !rect.height) {
          return result;
        }

        result.push({ rect });
        return result;
      }, []);
    }

    function buildDragAlignmentContext(draggedElement, boundary) {
      const page = draggedElement.matches("[data-editor-page='true']")
        ? boundary
        : (getElementPage(draggedElement) || boundary);

      if (!page) {
        return null;
      }

      const pageRect = createRectSnapshot(page.getBoundingClientRect());
      const computed = previewFrame.contentWindow.getComputedStyle(page);
      return {
        pageRect,
        safeBounds: {
          left: pageRect.left + (Number.parseFloat(computed.paddingLeft) || 0),
          right: pageRect.right - (Number.parseFloat(computed.paddingRight) || 0),
          top: pageRect.top + (Number.parseFloat(computed.paddingTop) || 0),
          bottom: pageRect.bottom - (Number.parseFloat(computed.paddingBottom) || 0)
        },
        siblingRects: draggedElement.matches("[data-editor-page='true']") ? [] : collectAlignmentSiblings(draggedElement, page)
      };
    }

    function createAlignmentCandidate(axis, matchKey, currentValue, targetValue, priority, options = {}) {
      const diff = targetValue - currentValue;
      if (Math.abs(diff) > ALIGNMENT_SNAP_THRESHOLD) {
        return null;
      }

      return {
        axis,
        matchKey,
        position: targetValue,
        diff,
        priority,
        scope: options.scope || "page",
        siblingRect: options.siblingRect || null
      };
    }

    function pickBetterAlignmentCandidate(current, candidate) {
      if (!candidate) {
        return current;
      }

      if (!current) {
        return candidate;
      }

      const candidateDistance = Math.abs(candidate.diff);
      const currentDistance = Math.abs(current.diff);
      if (candidateDistance < currentDistance - 0.01) {
        return candidate;
      }

      if (candidateDistance <= currentDistance + 0.01 && candidate.priority < current.priority) {
        return candidate;
      }

      return current;
    }

    function findBestAlignment(axis, movingRect, alignmentContext) {
      if (!alignmentContext) {
        return null;
      }

      const isHorizontal = axis === "x";
      const pageTargets = isHorizontal
        ? {
          left: alignmentContext.safeBounds.left,
          center: alignmentContext.pageRect.centerX,
          right: alignmentContext.safeBounds.right
        }
        : {
          top: alignmentContext.safeBounds.top,
          center: alignmentContext.pageRect.centerY,
          bottom: alignmentContext.safeBounds.bottom
        };
      const keys = isHorizontal ? ["left", "center", "right"] : ["top", "center", "bottom"];

      return keys.reduce((best, key) => {
        const currentValue = getRectMetric(movingRect, axis, key);
        const pagePriority = key === "center" ? 0 : 2;
        let nextBest = pickBetterAlignmentCandidate(
          best,
          createAlignmentCandidate(axis, key, currentValue, pageTargets[key], pagePriority, { scope: "page" })
        );

        alignmentContext.siblingRects.forEach(({ rect }) => {
          const targetValue = getRectMetric(rect, axis, key);
          const priority = key === "center" ? 1 : 3;
          nextBest = pickBetterAlignmentCandidate(
            nextBest,
            createAlignmentCandidate(axis, key, currentValue, targetValue, priority, {
              scope: "sibling",
              siblingRect: rect
            })
          );
        });

        return nextBest;
      }, null);
    }

    function isAlignmentSatisfied(candidate, rect) {
      if (!candidate) {
        return false;
      }

      return Math.abs(candidate.position - getRectMetric(rect, candidate.axis, candidate.matchKey)) <= 0.75;
    }

    function buildAlignmentGuide(candidate, movingRect, alignmentContext) {
      if (!candidate || !alignmentContext) {
        return null;
      }

      if (candidate.axis === "x") {
        return {
          axis: "x",
          position: candidate.position,
          start: candidate.scope === "page"
            ? alignmentContext.pageRect.top
            : Math.min(movingRect.top, candidate.siblingRect?.top ?? movingRect.top),
          end: candidate.scope === "page"
            ? alignmentContext.pageRect.bottom
            : Math.max(movingRect.bottom, candidate.siblingRect?.bottom ?? movingRect.bottom)
        };
      }

      return {
        axis: "y",
        position: candidate.position,
        start: candidate.scope === "page"
          ? alignmentContext.pageRect.left
          : Math.min(movingRect.left, candidate.siblingRect?.left ?? movingRect.left),
        end: candidate.scope === "page"
          ? alignmentContext.pageRect.right
          : Math.max(movingRect.right, candidate.siblingRect?.right ?? movingRect.right)
      };
    }

    function resolveDragAlignment(proposedDeltaX, proposedDeltaY, dragState) {
      const previewRect = offsetRectSnapshot(
        dragState.startRect,
        proposedDeltaX,
        proposedDeltaY
      );
      const xCandidate = findBestAlignment("x", previewRect, dragState.alignmentContext);
      const yCandidate = findBestAlignment("y", previewRect, dragState.alignmentContext);
      const nextDeltaX = clamp(proposedDeltaX + (xCandidate?.diff || 0), dragState.minDeltaX, dragState.maxDeltaX);
      const nextDeltaY = clamp(proposedDeltaY + (yCandidate?.diff || 0), dragState.minDeltaY, dragState.maxDeltaY);
      const resolvedRect = offsetRectSnapshot(
        dragState.startRect,
        nextDeltaX,
        nextDeltaY
      );
      const resolvedX = isAlignmentSatisfied(xCandidate, resolvedRect) ? xCandidate : null;
      const resolvedY = isAlignmentSatisfied(yCandidate, resolvedRect) ? yCandidate : null;

      return {
        nextDeltaX,
        nextDeltaY,
        guides: [
          buildAlignmentGuide(resolvedX, resolvedRect, dragState.alignmentContext),
          buildAlignmentGuide(resolvedY, resolvedRect, dragState.alignmentContext)
        ].filter(Boolean)
      };
    }

    function startElementDrag(element, pointerEvent) {
      if (!canDragElement(element)) {
        return;
      }

      const previewDocument = previewFrame.contentDocument;
      const boundary = getDragBoundary(element);

      if (!previewDocument || !boundary) {
        return;
      }

      pointerEvent.preventDefault();
      ensureTransformState(element);

      const startX = pointerEvent.clientX;
      const startY = pointerEvent.clientY;
      const startTranslateX = getTransformValue(element, "data-editor-translate-x");
      const startTranslateY = getTransformValue(element, "data-editor-translate-y");
      const startRect = createRectSnapshot(element.getBoundingClientRect());
      const boundaryRect = createRectSnapshot(boundary.getBoundingClientRect());
      const alignmentContext = buildDragAlignmentContext(element, boundary);
      const zoomScale = getAppliedPreviewZoomScale() || 1;
      const padding = 8;

      element.setAttribute("data-editor-dragging", "true");
      previewDocument.body.style.userSelect = "none";
      clearAlignmentGuides(previewDocument);

      const onMove = (moveEvent) => {
        const deltaX = moveEvent.clientX - startX;
        const deltaY = moveEvent.clientY - startY;

        const minDeltaX = boundaryRect.left + padding - startRect.left;
        const maxDeltaX = boundaryRect.right - padding - startRect.right;
        const minDeltaY = boundaryRect.top + padding - startRect.top;
        const maxDeltaY = boundaryRect.bottom - padding - startRect.bottom;
        const nextDeltaX = clamp(deltaX, minDeltaX, maxDeltaX);
        const nextDeltaY = clamp(deltaY, minDeltaY, maxDeltaY);
        const resolvedDrag = resolveDragAlignment(nextDeltaX, nextDeltaY, {
          startRect,
          minDeltaX,
          maxDeltaX,
          minDeltaY,
          maxDeltaY,
          alignmentContext
        });
        const translatedX = startTranslateX + resolvedDrag.nextDeltaX / zoomScale;
        const translatedY = startTranslateY + resolvedDrag.nextDeltaY / zoomScale;

        element.setAttribute("data-editor-translate-x", String(Math.round(translatedX)));
        element.setAttribute("data-editor-translate-y", String(Math.round(translatedY)));
        applyManagedTransform(element);
        renderAlignmentGuides(previewDocument, resolvedDrag.guides);
        scheduleOverlayRefresh();
      };

      const onUp = () => {
        element.removeAttribute("data-editor-dragging");
        previewDocument.body.style.userSelect = "";
        clearAlignmentGuides(previewDocument);
        previewDocument.removeEventListener("pointermove", onMove);
        previewDocument.removeEventListener("pointerup", onUp);
        previewDocument.removeEventListener("pointercancel", onUp);
        syncSourceFromPreview();
      };

      previewDocument.addEventListener("pointermove", onMove);
      previewDocument.addEventListener("pointerup", onUp);
      previewDocument.addEventListener("pointercancel", onUp);
    }

    function startElementResize(element, pointerEvent, direction) {
      if (!canResizeElement(element)) {
        return;
      }

      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return;
      }

      pointerEvent.preventDefault();
      ensureTransformState(element);

      const startX = pointerEvent.clientX;
      const startY = pointerEvent.clientY;
      const startWidth = getElementDimensionPx(element, "width");
      const startHeight = getElementDimensionPx(element, "height");
      const startTranslateX = getTransformValue(element, "data-editor-translate-x");
      const startTranslateY = getTransformValue(element, "data-editor-translate-y");
      const zoomScale = getAppliedPreviewZoomScale() || 1;
      const minWidth = getDimensionMinimumForElement(element, "width");
      const minHeight = getDimensionMinimumForElement(element, "height");

      element.style.width = `${Math.round(startWidth)}px`;
      element.style.height = `${Math.round(startHeight)}px`;
      element.style.minHeight = `${Math.round(startHeight)}px`;
      element.setAttribute("data-editor-resizing", "true");
      previewDocument.body.style.userSelect = "none";

      const onMove = (moveEvent) => {
        const deltaX = (moveEvent.clientX - startX) / zoomScale;
        const deltaY = (moveEvent.clientY - startY) / zoomScale;
        let nextWidth = startWidth;
        let nextHeight = startHeight;
        let nextTranslateX = startTranslateX;
        let nextTranslateY = startTranslateY;

        if (direction.includes("e")) {
          nextWidth = startWidth + deltaX;
        }

        if (direction.includes("s")) {
          nextHeight = startHeight + deltaY;
        }

        if (direction.includes("w")) {
          nextWidth = startWidth - deltaX;
          nextTranslateX = startTranslateX + deltaX;
        }

        if (direction.includes("n")) {
          nextHeight = startHeight - deltaY;
          nextTranslateY = startTranslateY + deltaY;
        }

        if (nextWidth < minWidth) {
          if (direction.includes("w")) {
            nextTranslateX -= (minWidth - nextWidth);
          }
          nextWidth = minWidth;
        }

        if (nextHeight < minHeight) {
          if (direction.includes("n")) {
            nextTranslateY -= (minHeight - nextHeight);
          }
          nextHeight = minHeight;
        }

        element.style.width = `${Math.round(nextWidth)}px`;
        element.style.height = `${Math.round(nextHeight)}px`;
        element.style.minHeight = `${Math.round(nextHeight)}px`;
        element.setAttribute("data-editor-translate-x", String(Math.round(nextTranslateX)));
        element.setAttribute("data-editor-translate-y", String(Math.round(nextTranslateY)));
        applyManagedTransform(element);
        updateToolbarState();
        scheduleOverlayRefresh();
      };

      const onUp = () => {
        element.removeAttribute("data-editor-resizing");
        previewDocument.body.style.userSelect = "";
        previewDocument.removeEventListener("pointermove", onMove);
        previewDocument.removeEventListener("pointerup", onUp);
        previewDocument.removeEventListener("pointercancel", onUp);
        syncSourceFromPreview();
      };

      previewDocument.addEventListener("pointermove", onMove);
      previewDocument.addEventListener("pointerup", onUp);
      previewDocument.addEventListener("pointercancel", onUp);
    }

    function getDragBoundary(element) {
      if (element.matches("[data-editor-page='true']")) {
        return element.ownerDocument.body;
      }

      return getElementPage(element) || element.ownerDocument.body;
    }

    function clamp(value, min, max) {
      if (min > max) {
        return value;
      }

      return Math.min(Math.max(value, min), max);
    }

    function ensureTransformState(element) {
      if (!element.hasAttribute("data-editor-base-transform")) {
        const computedTransform = previewFrame.contentWindow.getComputedStyle(element).transform;
        element.setAttribute("data-editor-base-transform", computedTransform && computedTransform !== "none" ? computedTransform : "");
      }

      if (!element.hasAttribute("data-editor-translate-x")) {
        element.setAttribute("data-editor-translate-x", "0");
      }

      if (!element.hasAttribute("data-editor-translate-y")) {
        element.setAttribute("data-editor-translate-y", "0");
      }

      if (!element.hasAttribute("data-editor-rotate")) {
        element.setAttribute("data-editor-rotate", "0");
      }
    }

    function getTransformValue(element, attributeName) {
      return Number.parseFloat(element.getAttribute(attributeName) || "0") || 0;
    }

    function applyManagedTransform(element) {
      const baseTransform = element.getAttribute("data-editor-base-transform") || "";
      const translateX = getTransformValue(element, "data-editor-translate-x");
      const translateY = getTransformValue(element, "data-editor-translate-y");
      const rotate = getTransformValue(element, "data-editor-rotate");
      const parts = [];

      if (baseTransform) {
        parts.push(baseTransform);
      }

      if (translateX || translateY) {
        parts.push(`translate(${translateX}px, ${translateY}px)`);
      }

      if (rotate) {
        parts.push(`rotate(${rotate}deg)`);
      }

      element.style.transform = parts.join(" ").trim();
    }

    function isCodeBlockContainer(element) {
      return Boolean(element && isCodePreElement(element));
    }

    function getSelectedCodeBlockTarget() {
      const selectedElement = appState.selectedElement;
      if (!selectedElement) {
        return null;
      }

      if (isCodeBlockContainer(selectedElement)) {
        return selectedElement;
      }

      if (selectedElement.tagName === "CODE" && isCodeBlockContainer(selectedElement.parentElement)) {
        return selectedElement.parentElement;
      }

      return null;
    }

    function getSelectedTextTarget() {
      const selectedElement = appState.selectedElement;
      if (!selectedElement || !selectedElement.matches("[data-editor-text-editable='true']")) {
        return null;
      }

      return isCodeBlockContainer(selectedElement) ? null : selectedElement;
    }

    function getSelectedImageTarget() {
      const selectedElement = appState.selectedElement;
      return selectedElement && selectedElement.matches("img[data-editor-image='true']") ? selectedElement : null;
    }

    function getSelectedResizableTextTarget() {
      const target = getSelectedTextTarget();
      return target && getManagedBlockKind(target) === "text" ? target : null;
    }

    function getSelectedResizableCodeTarget() {
      const target = getSelectedCodeBlockTarget();
      return target && getManagedBlockKind(target) === "code" ? target : null;
    }

    function getElementDimensionPx(element, property) {
      const direct = Number.parseFloat(element.style[property]);
      if (Number.isFinite(direct) && direct > 0) {
        return Math.round(direct);
      }

      const computed = previewFrame.contentWindow.getComputedStyle(element);
      const computedValue = Number.parseFloat(computed[property]);
      if (Number.isFinite(computedValue) && computedValue > 0) {
        return Math.round(computedValue);
      }

      const rect = element.getBoundingClientRect();
      return Math.round(property === "width" ? rect.width : rect.height);
    }

    function applyElementDimension(element, property, rawValue, minimum) {
      if (!element) {
        return;
      }

      const kind = getManagedBlockKind(element);
      if (kind === "text") {
        const computed = previewFrame.contentWindow.getComputedStyle(element);
        if (computed.display === "inline") {
          element.style.display = "inline-block";
        }
      }

      const numeric = Math.max(minimum, Number(rawValue) || minimum);
      element.style[property] = `${Math.round(numeric)}px`;

      if (property === "height") {
        element.style.minHeight = `${Math.round(numeric)}px`;
      }

      updateToolbarState();
      syncSourceFromPreview();
      scheduleOverlayRefresh();
    }

    function applyTextBlockDimension(property, rawValue) {
      const target = getSelectedResizableTextTarget();
      applyElementDimension(target, property, rawValue, getDimensionMinimumForElement(target, property));
    }

    function applyCodeBlockDimension(property, rawValue) {
      const target = getSelectedResizableCodeTarget();
      applyElementDimension(target, property, rawValue, getDimensionMinimumForElement(target, property));
    }

    function canDeleteSelectedElement() {
      const element = appState.selectedElement;
      if (!element || !element.ownerDocument) {
        return false;
      }

      if (element === element.ownerDocument.body) {
        return false;
      }

      if (element.closest("[data-editor-overlay-root='true']")) {
        return false;
      }

      if (element.matches("[data-editor-page='true']")) {
        return false;
      }

      return true;
    }

    function canDeleteCurrentPage() {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return false;
      }

      const page = ensureCurrentPage(previewDocument, false);
      return Boolean(page);
    }

    function updateToolbarState() {
      const textTarget = getSelectedTextTarget();
      const imageTarget = getSelectedImageTarget();
      const codeTarget = getSelectedCodeBlockTarget();
      const resizableTextTarget = getSelectedResizableTextTarget();
      const resizableCodeTarget = getSelectedResizableCodeTarget();

      textControlsGroup.hidden = !textTarget;
      imageControlsGroup.hidden = !imageTarget;
      codeControlsGroup.hidden = !codeTarget;

      textStyleControls.forEach((control) => {
        control.disabled = !textTarget;
      });

      imageStyleControls.forEach((control) => {
        control.disabled = !imageTarget;
      });

      codeStyleControls.forEach((control) => {
        control.disabled = !codeTarget;
      });

      textSizeControls.forEach((control) => {
        control.disabled = !resizableTextTarget;
      });

      codeSizeControls.forEach((control) => {
        control.disabled = !resizableCodeTarget;
      });

      if (textTarget) {
        const computed = previewFrame.contentWindow.getComputedStyle(textTarget);
        fontFamilyControl.value = matchFontFamilyOption(computed.fontFamily);
        fontSizeControl.value = parseInt(computed.fontSize, 10) || 28;
        fontWeightControl.value = normalizeWeightOption(computed.fontWeight);
        textColorControl.value = toHexColor(computed.color, "#14213d");
        backgroundColorControl.value = toHexColor(computed.backgroundColor, "#ffffff");
        textAlignControl.value = computed.textAlign || "left";
        italicButton.setAttribute("aria-pressed", String(computed.fontStyle === "italic"));
        underlineButton.setAttribute("aria-pressed", String((computed.textDecorationLine || "").includes("underline")));
      } else {
        italicButton.setAttribute("aria-pressed", "false");
        underlineButton.setAttribute("aria-pressed", "false");
      }

      if (imageTarget) {
        const computed = previewFrame.contentWindow.getComputedStyle(imageTarget);
        imageWidthControl.value = Math.max(1, Math.round(parseFloat(imageTarget.style.width || computed.width) || 1));
        imageHeightControl.value = Math.max(1, Math.round(parseFloat(imageTarget.style.height || computed.height) || 1));
        imageRadiusControl.value = Math.max(0, Math.round(parseFloat(computed.borderTopLeftRadius) || 0));
        imageOpacityControl.value = Math.round((parseFloat(computed.opacity) || 1) * 100);
        imageRotateControl.value = Math.round(getTransformValue(imageTarget, "data-editor-rotate"));
        imageObjectFitControl.value = computed.objectFit || "fill";
        imageFilterControl.value = matchImageFilterPreset(imageTarget.style.filter || computed.filter);
      }

      if (resizableTextTarget) {
        textWidthControl.value = String(getElementDimensionPx(resizableTextTarget, "width"));
        textHeightControl.value = String(getElementDimensionPx(resizableTextTarget, "height"));
      } else {
        textWidthControl.value = "";
        textHeightControl.value = "";
      }

      if (codeTarget) {
        const language = normalizeCodeLanguage(
          extractFenceLanguage(codeTarget.getAttribute("data-remark-fence-info")) ||
          codeTarget.getAttribute("data-remark-language") ||
          ""
        );
        const controlLanguage = language === "markup" ? "html" : language;
        codeLanguageControl.value = ["java", "python", "javascript", "c++", "html", "css"].includes(controlLanguage)
          ? controlLanguage
          : "";
      } else {
        codeLanguageControl.value = "";
      }

      if (resizableCodeTarget) {
        codeWidthControl.value = String(getElementDimensionPx(resizableCodeTarget, "width"));
        codeHeightControl.value = String(getElementDimensionPx(resizableCodeTarget, "height"));
      } else {
        codeWidthControl.value = "";
        codeHeightControl.value = "";
      }

      deleteElementButton.disabled = !canDeleteSelectedElement();
      deletePageButton.disabled = !canDeleteCurrentPage();
      deletePageButton.textContent = isRemarkMode() ? "Delete Slide" : "Delete Page";

      updateRemarkMetadataControls();
    }

    function updateRemarkMetadataControls() {
      if (!isRemarkMode()) {
        slideClassControl.disabled = true;
        slideClassControl.value = "";
        return;
      }

      const slide = getCurrentRemarkSlide();
      slideClassControl.disabled = !slide;
      slideClassControl.value = slide ? getSlideDirectiveValue(slide, "class") : "";
    }

    function togglePresenterView() {
      if (!isRemarkMode()) {
        return;
      }

      appState.presenterView = !appState.presenterView;
      persistWorkspacePreference(STORAGE_KEYS.presenterView, appState.presenterView);
      updatePresenterViewUi();
    }

    function updatePresenterViewUi() {
      const isRelevant = isRemarkMode();
      const isVisible = isRelevant && appState.presenterView;
      presenterViewButton.setAttribute("aria-pressed", String(isVisible));
      presenterViewButton.textContent = "Presenter Notes";
      presenterViewButton.disabled = !isRelevant;
      presenterNotesPanel.hidden = !isVisible;
      presenterNotesPanel.setAttribute("aria-hidden", String(!isVisible));
      notesResizeHandle.hidden = !isVisible || window.innerWidth <= 980;
      previewSplit.classList.toggle("is-notes-visible", isVisible);

      if (!isVisible) {
        setPresenterNotesValue("");
        presenterNotesInput.disabled = true;
        if (appState.previewZoomMode !== "manual") {
          applyPreviewZoom();
        } else {
          scheduleOverlayRefresh();
        }
        return;
      }

      const slide = getCurrentRemarkSlide();
      const notes = slide?.notesSource || "";
      setPresenterNotesValue(notes);
      presenterNotesInput.disabled = !slide;
      if (appState.previewZoomMode !== "manual") {
        applyPreviewZoom();
      } else {
        scheduleOverlayRefresh();
      }
    }

    function setPresenterNotesValue(value) {
      appState.isUpdatingNotesInternally = true;
      presenterNotesInput.value = value;
      appState.isUpdatingNotesInternally = false;
    }

    function handlePresenterNotesInput() {
      if (appState.isUpdatingNotesInternally || !isRemarkMode()) {
        return;
      }

      const slide = getCurrentRemarkSlide();
      if (!slide) {
        return;
      }

      slide.notesSource = presenterNotesInput.value;
      setSourceValue(buildRemarkDeckSource(appState.documentModel));
      editorStatus.textContent = "Presenter notes updated";
      setPreviewHint("Presenter notes stay hidden from the audience preview and are preserved in export.");
    }

    function matchFontFamilyOption(computedFamily) {
      const normalized = (computedFamily || "").toLowerCase();
      const options = Array.from(fontFamilyControl.options).map((option) => option.value);
      const match = options.find((value) => {
        const anchor = value.split(",")[0].replace(/['"]/g, "").trim().toLowerCase();
        return normalized.includes(anchor);
      });
      return match || "inherit";
    }

    function normalizeWeightOption(weight) {
      const numeric = parseInt(weight, 10);
      if (!numeric) {
        return "400";
      }

      if (numeric >= 800) {
        return "800";
      }

      if (numeric >= 700) {
        return "700";
      }

      if (numeric >= 600) {
        return "600";
      }

      if (numeric >= 500) {
        return "500";
      }

      return "400";
    }

    function matchImageFilterPreset(filterValue) {
      const normalized = (filterValue || "").trim();
      const match = Object.entries(IMAGE_FILTER_PRESETS).find(([, value]) => value === normalized);
      return match ? match[0] : "none";
    }

    function applyInlineStyleToSelection(property, value) {
      const target = getSelectedTextTarget();
      if (!target) {
        return;
      }

      target.style[property] = value;
      updateToolbarState();
      syncSourceFromPreview();
      scheduleOverlayRefresh();
    }

    function toggleTextStyle(property, activeValue, button) {
      const target = getSelectedTextTarget();
      if (!target) {
        return;
      }

      const computed = previewFrame.contentWindow.getComputedStyle(target);
      const isActive = computed[property] === activeValue;
      target.style[property] = isActive ? "normal" : activeValue;
      button.setAttribute("aria-pressed", String(!isActive));
      syncSourceFromPreview();
      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function toggleTextDecoration() {
      const target = getSelectedTextTarget();
      if (!target) {
        return;
      }

      const computed = previewFrame.contentWindow.getComputedStyle(target);
      const hasUnderline = (computed.textDecorationLine || "").includes("underline");
      target.style.textDecoration = hasUnderline ? "none" : "underline";
      underlineButton.setAttribute("aria-pressed", String(!hasUnderline));
      syncSourceFromPreview();
      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function applyImageStyle(property, value) {
      const image = getSelectedImageTarget();
      if (!image) {
        return;
      }

      image.style[property] = value;
