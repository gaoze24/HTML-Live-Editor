<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Presentation Live Editor</title>
  <style>
    :root {
      color-scheme: light;
      /* Editor chrome design tokens (kept separate from preview iframe content) */
      --app-bg: #f3eee6;
      --app-bg-soft: #f8f3eb;
      --app-bg-ambient: rgba(170, 143, 114, 0.17);
      --app-bg-ambient-soft: rgba(216, 191, 166, 0.13);
      --app-shell-gradient:
        radial-gradient(circle at 12% 10%, rgba(255, 255, 255, 0.75), transparent 32%),
        linear-gradient(148deg, #f4efe7 0%, #eee5da 55%, #e4d7c8 100%);
      --toolbar-bg: rgba(252, 247, 240, 0.9);
      --panel-bg: rgba(253, 248, 241, 0.88);
      --panel-bg-elevated: rgba(255, 252, 247, 0.94);
      --panel-border: rgba(95, 78, 61, 0.14);
      --panel-border-strong: rgba(95, 78, 61, 0.24);
      --primary-text: #2f2821;
      --muted-text: #726456;
      --muted-text-strong: #57493d;
      --control-bg: rgba(255, 251, 246, 0.94);
      --control-bg-hover: rgba(255, 253, 249, 1);
      --control-border: rgba(95, 78, 61, 0.18);
      --control-border-strong: rgba(95, 78, 61, 0.28);
      --chip-bg: rgba(247, 238, 228, 0.82);
      --chip-border: rgba(95, 78, 61, 0.18);
      --accent: #9f744f;
      --accent-strong: #7f5a3b;
      --accent-foreground: #fffbf6;
      --accent-soft: rgba(159, 116, 79, 0.14);
      --accent-ring: rgba(159, 116, 79, 0.22);
      --accent-glow: rgba(159, 116, 79, 0.2);
      --shadow-soft: 0 10px 24px rgba(58, 42, 29, 0.08);
      --shadow: 0 18px 42px rgba(58, 42, 29, 0.11);

      /* Compatibility aliases for existing chrome rules */
      --bg: var(--app-bg);
      --bg-accent: var(--app-bg-ambient);
      --bg-accent-cool: var(--app-bg-ambient-soft);
      --paper: var(--panel-bg);
      --paper-strong: var(--panel-bg-elevated);
      --paper-soft: rgba(255, 251, 246, 0.7);
      --panel: var(--panel-bg);
      --panel-strong: var(--panel-bg-elevated);
      --surface: rgba(65, 50, 37, 0.05);
      --surface-strong: rgba(65, 50, 37, 0.09);
      --border: var(--panel-border);
      --border-strong: var(--panel-border-strong);
      --text: var(--primary-text);
      --muted: var(--muted-text);
      --muted-strong: var(--muted-text-strong);
      --sea: #a08468;
      --sea-soft: rgba(160, 132, 104, 0.13);
      --ink-panel: rgba(250, 244, 236, 0.93);
      --ink-panel-strong: rgba(246, 238, 228, 0.98);
      --ink-border: rgba(95, 78, 61, 0.16);
      --ink-text: #322b23;
      --ink-muted: #7a6a5c;
      --radius-xl: 24px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --control-height: 2.1rem;
      --toolbar-row-height: calc(var(--control-height) + 0.5rem);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: "Aptos", "Segoe UI Variable Text", "Segoe UI", sans-serif;
      background-color: var(--app-bg);
      background: var(--app-shell-gradient);
      color: var(--text);
      overflow: hidden;
    }

    body {
      position: relative;
      min-height: 100dvh;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 10% 12%, var(--bg-accent), transparent 24%),
        radial-gradient(circle at 88% 18%, var(--bg-accent-cool), transparent 30%),
        radial-gradient(circle at 76% 80%, rgba(255, 255, 255, 0.44), transparent 18%);
      filter: blur(8px);
      opacity: 0.74;
    }

    body::after {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.13) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.2;
      mix-blend-mode: soft-light;
    }

    html.is-browser-fullscreen,
    body.is-browser-fullscreen {
      background-color: var(--app-bg);
      background: var(--app-shell-gradient);
    }

    .app.is-browser-fullscreen,
    .app:fullscreen,
    .app:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      background-color: var(--app-bg);
      background: var(--app-shell-gradient);
    }

    .app.is-browser-fullscreen .workspace,
    .app:fullscreen .workspace,
    .app:-webkit-full-screen .workspace,
    .app.is-browser-fullscreen .preview-panel__body,
    .app:fullscreen .preview-panel__body,
    .app:-webkit-full-screen .preview-panel__body {
      min-height: 0;
      height: 100%;
    }

    .app:fullscreen::backdrop,
    .app:-webkit-full-screen::backdrop {
      background-color: var(--app-bg);
      background: var(--app-shell-gradient);
    }

    .app button,
    .app textarea,
    .app select,
    .app input {
      font: inherit;
    }

    .app {
      height: 100dvh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 0.55rem;
      padding: 0.55rem;
      position: relative;
      isolation: isolate;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.42rem;
      min-width: 0;
      padding: 0.58rem 0.68rem;
      border-radius: var(--radius-xl);
      border: 1px solid var(--panel-border);
      background: linear-gradient(145deg, var(--toolbar-bg), rgba(246, 238, 229, 0.84));
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
      z-index: 10;
      animation: shell-rise 520ms ease both;
    }

    .topbar::after {
      content: none;
    }

    .toolbar__label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      width: fit-content;
      padding: 0.34rem 0.58rem;
      border-radius: 999px;
      border: 1px solid var(--control-border);
      background: rgba(255, 251, 246, 0.92);
      color: var(--muted-strong);
      font-size: 0.64rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
      white-space: nowrap;
    }

    .toolbar {
      display: grid;
      grid-template-rows: repeat(2, var(--toolbar-row-height));
      gap: 0.36rem;
      width: 100%;
      min-width: 0;
    }

    .toolbar__row {
      display: flex;
      align-items: stretch;
      gap: 0.38rem;
      min-width: 0;
      min-height: var(--toolbar-row-height);
      height: var(--toolbar-row-height);
      overflow-x: auto;
      overflow-y: clip;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scrollbar-gutter: stable both-edges;
    }

    .toolbar__row::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    .toolbar__row > * {
      flex: 0 0 auto;
    }

    .toolbar__row--context {
      min-height: var(--toolbar-row-height);
      height: var(--toolbar-row-height);
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .toolbar__row--context::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    .toolbar__group {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.32rem;
      align-items: center;
      padding: 0.18rem;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 250, 244, 0.74);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        0 4px 12px rgba(58, 42, 29, 0.06);
      min-width: 0;
      flex: 0 0 auto;
    }

    .toolbar__group[hidden] {
      display: none;
    }

    .toolbar__group--status {
      justify-self: end;
      margin-left: auto;
      background: rgba(247, 239, 230, 0.9);
      border-color: var(--panel-border);
      box-shadow: 0 8px 20px rgba(58, 42, 29, 0.09);
    }

    [hidden] {
      display: none !important;
    }

    #pageControlsGroup {
      flex: 0 0 clamp(12rem, 20vw, 18rem);
      min-width: 12rem;
      max-width: none;
    }

    #pageControlsGroup .toolbar-control {
      width: 100%;
      min-width: 0;
    }

    #pageControlsGroup .toolbar-control span {
      flex: 0 0 auto;
    }

    #pageControlsGroup select {
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      max-width: none;
    }

    .ghost-button,
    .primary-button,
    .toolbar-toggle {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.4rem 0.72rem;
      min-height: var(--control-height);
      font-weight: 650;
      font-size: 0.76rem;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
      transition:
        transform 180ms ease,
        background-color 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease,
        color 180ms ease;
    }

    .ghost-button,
    .toolbar-toggle {
      color: var(--text);
      background: var(--control-bg);
      border-color: var(--control-border);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.86),
        0 2px 8px rgba(58, 42, 29, 0.04);
    }

    .ghost-button:hover,
    .ghost-button:focus-visible,
    .toolbar-toggle:hover,
    .toolbar-toggle:focus-visible {
      border-color: var(--control-border-strong);
      background: var(--control-bg-hover);
      transform: translateY(-0.5px);
    }

    .toolbar-icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: var(--control-height);
      padding: 0.38rem;
      text-decoration: none;
      color: var(--muted-strong);
      flex-shrink: 0;
    }

    .toolbar-icon-button:hover,
    .toolbar-icon-button:focus-visible {
      color: var(--text);
    }

    .toolbar-icon-button svg {
      width: 1rem;
      height: 1rem;
      fill: currentColor;
      display: block;
    }

    .primary-button {
      color: var(--accent-foreground);
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.25),
        0 8px 18px var(--accent-glow);
    }

    .primary-button:hover,
    .primary-button:focus-visible {
      transform: translateY(-0.5px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.26),
        0 10px 22px rgba(95, 67, 43, 0.24);
    }

    .toolbar-toggle[aria-pressed="true"] {
      border-color: rgba(127, 90, 59, 0.3);
      background: var(--accent-soft);
      color: var(--accent-strong);
      box-shadow: none;
    }

    .ghost-button:disabled,
    .primary-button:disabled,
    .toolbar-toggle:disabled,
    .preview-zoom-select:disabled,
    .toolbar-control input:disabled,
    .toolbar-control select:disabled,
    .toolbar-control button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .ghost-button:focus-visible,
    .primary-button:focus-visible,
    .toolbar-toggle:focus-visible,
    .preview-zoom-select:focus-visible,
    .toolbar-control select:focus-visible,
    .toolbar-control input:focus-visible,
    .source-input:focus-visible {
      outline: 2px solid rgba(159, 116, 79, 0.55);
      outline-offset: 2px;
    }

    .toolbar-control {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      min-height: var(--control-height);
      padding: 0.16rem 0.36rem;
      border-radius: 999px;
      border: 1px solid var(--control-border);
      background: rgba(255, 249, 243, 0.74);
      color: var(--muted-strong);
      font-size: 0.72rem;
      line-height: 1;
      min-width: 0;
      flex: 0 0 auto;
    }

    .toolbar-control span {
      font-weight: 700;
      white-space: nowrap;
    }

    .toolbar-control select,
    .toolbar-control input[type="number"],
    .toolbar-control input[type="color"],
    .toolbar-control input[type="text"] {
      height: 1.5rem;
      border: 1px solid var(--control-border);
      border-radius: 999px;
      background: var(--control-bg);
      color: var(--text);
      padding: 0 0.55rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
      font-size: 0.74rem;
      min-width: 0;
    }

    .toolbar-control input[type="number"] {
      width: 4rem;
    }

    .toolbar-control input[type="text"] {
      width: 7.5rem;
    }

    .toolbar-control input[type="color"] {
      width: 2rem;
      min-width: 2rem;
      padding: 0.08rem;
      border-radius: 999px;
      cursor: pointer;
    }

    .toolbar-control select {
      max-width: 8rem;
    }

    .toolbar-control--wide select {
      min-width: 6rem;
    }

    #textControlsGroup,
    #imageControlsGroup,
    #codeControlsGroup {
      min-width: max-content;
    }

    .workspace {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-columns: minmax(18rem, var(--source-pane-size, 31rem)) 0.8rem minmax(0, 1fr);
      gap: 0.75rem;
      transition: grid-template-columns 220ms ease;
      overflow: hidden;
    }

    .workspace.is-collapsed {
      grid-template-columns: 0 0 minmax(0, 1fr);
    }

    .panel {
      height: 100%;
      min-height: 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-radius: var(--radius-xl);
      border: 1px solid var(--panel-border);
      background: linear-gradient(180deg, var(--panel-bg-elevated), var(--panel-bg));
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: shell-rise 620ms ease both;
    }

    .source-panel {
      position: relative;
      border-color: var(--ink-border);
      background:
        radial-gradient(circle at top right, rgba(160, 132, 104, 0.14), transparent 30%),
        linear-gradient(180deg, var(--ink-panel), var(--ink-panel-strong));
      color: var(--ink-text);
      box-shadow: 0 20px 44px rgba(58, 42, 29, 0.13);
      animation-delay: 80ms;
      transition:
        opacity 200ms ease,
        transform 200ms ease,
        border-color 200ms ease;
    }

    .preview-panel {
      animation-delay: 150ms;
    }

    .panel__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.85rem;
      padding: 1rem 1.05rem 0.82rem;
      border-bottom: 1px solid var(--panel-border);
      background: rgba(255, 251, 246, 0.46);
      flex-shrink: 0;
    }

    .source-panel .panel__header {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.08));
      border-bottom-color: rgba(95, 78, 61, 0.14);
    }

    .presenter-notes-panel .panel__header {
      justify-content: flex-start;
      gap: 0.5rem;
      padding-bottom: 0.76rem;
    }

    .panel__header-copy {
      display: grid;
      gap: 0.18rem;
      min-width: 0;
    }

    .panel__kicker {
      color: var(--muted);
      font-size: 0.69rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .source-panel .panel__kicker {
      color: rgba(122, 106, 92, 0.88);
    }

    .panel__header-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.45rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .panel__header h2 {
      margin: 0;
      font-family: "Aptos Display", "Aptos", sans-serif;
      font-weight: 650;
      font-size: 1.05rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .panel__header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.4;
      max-width: 42ch;
    }

    .source-panel .panel__header p {
      color: var(--ink-muted);
    }

    .panel__header p[hidden],
    .helper-row[hidden] {
      display: none;
    }

    .helper-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.34rem 0.62rem;
      border: 1px solid var(--control-border);
      border-radius: 999px;
      background: rgba(159, 116, 79, 0.1);
      color: var(--muted-strong);
      white-space: nowrap;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .toolbar__group--status .helper-pill,
    .source-panel .helper-pill {
      border-color: var(--chip-border);
      background: var(--chip-bg);
      color: var(--ink-text);
    }

    .workspace.is-collapsed .source-panel {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-18px);
      border-color: transparent;
    }

    /* Maximized preview mode - distraction-free */
    .app.is-preview-maximized {
      grid-template-rows: minmax(0, 1fr);
      gap: 0;
      padding: 0;
    }

    .app.is-preview-maximized .topbar {
      display: none;
    }

    .app.is-preview-maximized .workspace {
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      gap: 0;
      height: 100dvh;
    }

    .app.is-preview-maximized .source-panel {
      display: none;
    }

    .app.is-preview-maximized #workspaceResizeHandle {
      display: none;
    }

    .app.is-preview-maximized .preview-panel {
      border-radius: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      height: 100%;
    }

    .app.is-preview-maximized .preview-panel > .panel__header {
      display: none;
    }

    .app.is-preview-maximized .preview-panel__body {
      padding: clamp(0.45rem, 1vw, 0.8rem);
      border-radius: 0;
      height: 100%;
    }

    .app.is-preview-maximized .preview-stage {
      border-radius: calc(var(--radius-xl) + 4px);
      padding: clamp(0.45rem, 1vw, 0.8rem);
    }

    .app.is-preview-maximized .preview-split,
    .app.is-preview-maximized .preview-stage,
    .app.is-preview-maximized .preview-frame {
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .app.is-preview-maximized .presenter-notes-panel,
    .app.is-preview-maximized #notesResizeHandle {
      display: none !important;
    }

    .app.is-preview-maximized .preview-split.is-notes-visible {
      grid-template-rows: minmax(0, 1fr);
    }

    /* Floating toolbar for maximized mode */
    .max-view-toolbar {
      display: none;
      position: absolute;
      top: clamp(0.72rem, 1.5vw, 1rem);
      right: clamp(0.72rem, 1.5vw, 1rem);
      z-index: 5;
      align-items: center;
      justify-content: center;
      gap: 0.38rem;
      max-width: min(calc(100% - 1.2rem), 30rem);
      padding: 0.34rem 0.38rem;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(250, 243, 235, 0.9);
      backdrop-filter: blur(18px);
      box-shadow:
        0 12px 26px rgba(58, 42, 29, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      pointer-events: none;
    }

    .app.is-preview-maximized .max-view-toolbar {
      display: inline-flex;
    }

    .max-view-toolbar > * {
      pointer-events: auto;
    }

    .max-view-toolbar .preview-zoom-controls {
      gap: 0.25rem;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .max-view-toolbar .ghost-button {
      padding: 0.36rem 0.58rem;
      font-size: 0.8rem;
    }

    .max-view-toolbar .preview-zoom-button {
      min-width: 2rem;
      padding-inline: 0.56rem;
    }

    .max-view-toolbar .preview-zoom-select {
      min-width: 6.4rem;
      padding: 0 0.72rem;
      font-size: 0.78rem;
    }

    .max-view-toolbar__actions {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .max-view-toolbar-divider {
      width: 1px;
      height: 1.2rem;
      background: rgba(95, 78, 61, 0.2);
      margin: 0 0.25rem;
    }

    .source-panel__body,
    .preview-panel__body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow: hidden;
      padding: 0.95rem;
    }

    .preview-panel__body {
      gap: 0;
      position: relative;
      background:
        radial-gradient(circle at top center, rgba(159, 116, 79, 0.08), transparent 30%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0));
    }

    .preview-split {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 0.6rem;
    }

    .preview-split.is-notes-visible {
      grid-template-rows: minmax(14rem, 1fr) 0.8rem minmax(10rem, var(--presenter-notes-size, 14rem));
    }

    .pane-divider {
      position: relative;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: col-resize;
      min-width: 0;
      min-height: 0;
      touch-action: none;
      user-select: none;
    }

    .pane-divider::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(95, 78, 61, 0.17), rgba(95, 78, 61, 0.06));
      border: 1px solid rgba(95, 78, 61, 0.18);
      transition: background-color 140ms ease, border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    }

    .pane-divider:hover::before,
    .pane-divider:focus-visible::before,
    .pane-divider.is-dragging::before {
      background: linear-gradient(180deg, rgba(159, 116, 79, 0.3), rgba(159, 116, 79, 0.14));
      border-color: rgba(159, 116, 79, 0.3);
      box-shadow: 0 0 0 4px rgba(159, 116, 79, 0.12);
      transform: scale(1.02);
    }

    .pane-divider--horizontal {
      cursor: row-resize;
    }

    .workspace.is-collapsed #workspaceResizeHandle {
      opacity: 0;
      pointer-events: none;
    }

    .presenter-notes-panel {
      min-height: 0;
      border-radius: var(--radius-lg);
      background: rgba(251, 245, 237, 0.88);
      box-shadow: 0 12px 26px rgba(58, 42, 29, 0.08);
    }

    .presenter-notes-panel .source-panel__body {
      padding-top: 0.65rem;
    }

    .helper-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.45rem;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.74rem;
    }

    #sourceContextHint[hidden] + #sourceStats {
      margin-left: auto;
    }

    .source-input {
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
      height: 100%;
      border: 1px solid var(--control-border);
      border-radius: calc(var(--radius-lg) - 2px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.18)),
        rgba(255, 251, 245, 0.9);
      color: var(--ink-text);
      padding: 1.1rem 1.15rem;
      resize: none;
      line-height: 1.6;
      tab-size: 2;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        0 4px 14px rgba(58, 42, 29, 0.05);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .preview-panel .source-input,
    .presenter-notes-panel .source-input {
      border-color: var(--control-border);
      background: rgba(255, 252, 248, 0.95);
      color: var(--text);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        0 8px 20px rgba(58, 42, 29, 0.06);
    }

    .source-input:focus-visible {
      border-color: rgba(159, 116, 79, 0.38);
      box-shadow: 0 0 0 4px var(--accent-ring);
    }

    .preview-stage {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      border-radius: calc(var(--radius-xl) - 4px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.15)),
        linear-gradient(135deg, rgba(255, 255, 255, 0.52), rgba(238, 228, 216, 0.78));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        0 14px 32px rgba(58, 42, 29, 0.09);
      padding: 0.7rem;
      position: relative;
    }

    .preview-stage::before {
      content: "";
      position: absolute;
      inset: 0.55rem;
      border-radius: calc(var(--radius-xl) - 10px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      pointer-events: none;
    }

    .preview-frame {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      border-radius: calc(var(--radius-xl) - 10px);
      background: #ffffff;
    }

    .preview-zoom-controls {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.22rem;
      border-radius: 999px;
      border: 1px solid var(--control-border);
      background: rgba(255, 250, 244, 0.84);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.88),
        0 8px 18px rgba(58, 42, 29, 0.08);
      min-width: 0;
    }

    .preview-zoom-button,
    .preview-zoom-reset {
      min-height: 1.95rem;
      padding: 0.38rem 0.72rem;
      font-size: 0.76rem;
    }

    .preview-zoom-button {
      min-width: 1.9rem;
      padding-inline: 0.52rem;
    }

    .preview-zoom-select {
      height: 1.95rem;
      min-width: 7.4rem;
      border: 1px solid var(--control-border);
      border-radius: 999px;
      background: var(--control-bg);
      color: var(--text);
      padding: 0 0.72rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
      font-size: 0.76rem;
    }

    .status {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes shell-rise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1260px) {
      #pageControlsGroup {
        flex-basis: 15rem;
      }
    }

    @media (max-width: 980px) {
      .app {
        gap: 0.45rem;
        padding: 0.45rem;
      }

      .topbar {
        padding: 0.48rem 0.52rem;
      }

      .toolbar,
      .toolbar__row {
        gap: 0.34rem;
      }

      #pageControlsGroup {
        flex-basis: 12rem;
        min-width: 12rem;
      }

      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(16rem, 40dvh) minmax(0, 1fr);
      }

      .workspace.is-collapsed {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr);
      }

      #workspaceResizeHandle,
      #notesResizeHandle {
        display: none;
      }

      .workspace.is-collapsed .preview-panel {
        grid-row: 1;
      }

      .source-panel,
      .workspace.is-collapsed .source-panel {
        opacity: 1;
        pointer-events: auto;
        transform: none;
        border-color: var(--ink-border);
      }

      .workspace.is-collapsed .source-panel {
        display: none;
      }

      .app.is-preview-maximized .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr);
        height: 100dvh;
      }

      .app.is-preview-maximized .source-panel {
        display: none;
      }

      .preview-split.is-notes-visible {
        grid-template-rows: minmax(12rem, 1fr) minmax(10rem, auto);
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 0.4rem;
      }

      .topbar {
        padding: 0.42rem 0.45rem;
        border-radius: 18px;
      }

      .panel {
        border-radius: 24px;
      }

      .panel__header,
      .source-panel__body,
      .preview-panel__body {
        padding-inline: 0.8rem;
      }

      .app.is-preview-maximized .preview-panel__body {
        padding: 0.35rem;
      }

      .max-view-toolbar {
        gap: 0.3rem;
        padding: 0.28rem 0.32rem;
        top: 0.5rem;
        right: 0.5rem;
        max-width: calc(100% - 0.9rem);
      }

      .max-view-toolbar .ghost-button {
        padding-inline: 0.48rem;
      }

      .max-view-toolbar .preview-zoom-select {
        min-width: 5.7rem;
        padding-inline: 0.55rem;
      }

      .max-view-toolbar-divider {
        margin-inline: 0.1rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="toolbar" aria-label="Editor toolbar">
        <div class="toolbar__row toolbar__row--primary">
          <span class="toolbar__label">HTML Live Editor</span>

          <div class="toolbar__group">
            <button class="ghost-button" id="toggleSourceButton" type="button" aria-expanded="true" aria-controls="sourcePanel">Hide Source</button>
            <button class="ghost-button" id="importHtmlButton" type="button">Import HTML</button>
            <button class="ghost-button" id="newHtmlButton" type="button">New HTML</button>
            <button class="ghost-button" id="newRemarkButton" type="button">New Remark Deck</button>
            <button class="ghost-button" id="newPageButton" type="button">New Page</button>
            <button class="ghost-button" id="addTextButton" type="button">Add Text</button>
            <button class="ghost-button" id="addImageButton" type="button">Add Image</button>
            <button class="ghost-button" id="addCodeButton" type="button">Add Code</button>
            <button class="primary-button" id="exportButton" type="button">Export HTML</button>
          </div>

          <div class="toolbar__group toolbar__group--status">
            <span class="helper-pill" id="modeBadge">Mode: Normal HTML</span>
            <a

              target="_blank"
              rel="noopener noreferrer"
              aria-label="View project on GitHub"
              title="View on GitHub"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 1.5A10.5 10.5 0 0 0 8.68 22c.53.1.72-.23.72-.52v-1.82c-2.95.64-3.57-1.25-3.57-1.25-.48-1.22-1.18-1.54-1.18-1.54-.97-.66.07-.65.07-.65 1.07.08 1.64 1.1 1.64 1.1.96 1.64 2.51 1.17 3.12.89.1-.69.37-1.17.67-1.44-2.35-.27-4.82-1.17-4.82-5.23 0-1.16.41-2.11 1.1-2.85-.11-.27-.48-1.38.1-2.88 0 0 .9-.29 2.95 1.09a10.3 10.3 0 0 1 5.37 0c2.05-1.38 2.94-1.09 2.94-1.09.59 1.5.22 2.61.11 2.88.68.74 1.09 1.69 1.09 2.85 0 4.07-2.47 4.95-4.83 5.21.38.33.72.98.72 1.98v2.93c0 .29.19.63.73.52A10.5 10.5 0 0 0 12 1.5Z" />
              </svg>
            </a>
          </div>
        </div>

        <div class="toolbar__row toolbar__row--context">
          <div class="toolbar__group" id="pageControlsGroup">
            <label class="toolbar-control toolbar-control--wide">
              <span id="pageSelectLabel">Page</span>
              <select id="pageSelect"></select>
            </label>
          </div>

          <div class="toolbar__group" id="deleteControlsGroup">
            <button class="ghost-button" id="deleteElementButton" type="button" disabled>Delete Element</button>
            <button class="ghost-button" id="deletePageButton" type="button" disabled>Delete Page</button>
          </div>

          <div class="toolbar__group" id="remarkMetaGroup" hidden>
            <label class="toolbar-control">
              <span>Class</span>
              <input id="slideClassControl" type="text" placeholder="middle, center" spellcheck="false">
            </label>
          </div>

          <div class="toolbar__group" id="textControlsGroup" hidden>
            <label class="toolbar-control toolbar-control--wide">
              <span>Font</span>
              <select id="fontFamilyControl">
                <option value="Aptos, 'Segoe UI Variable', 'Segoe UI', sans-serif">Aptos</option>
                <option value="'Trebuchet MS', 'Segoe UI', sans-serif">Trebuchet</option>
                <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                <option value="'Courier New', monospace">Courier</option>
                <option value="inherit">Inherit</option>
              </select>
            </label>

            <label class="toolbar-control">
              <span>Size</span>
              <input id="fontSizeControl" type="number" min="10" max="160" step="1" value="28">
            </label>

            <label class="toolbar-control">
              <span>Width</span>
              <input id="textWidthControl" type="number" min="80" step="1" value="320">
            </label>

            <label class="toolbar-control">
              <span>Height</span>
              <input id="textHeightControl" type="number" min="48" step="1" value="72">
            </label>

            <label class="toolbar-control">
              <span>Weight</span>
              <select id="fontWeightControl">
                <option value="400">400</option>
                <option value="500">500</option>
                <option value="600">600</option>
                <option value="700">700</option>
                <option value="800">800</option>
              </select>
            </label>

            <label class="toolbar-control">
              <span>Text</span>
              <input id="textColorControl" type="color" value="#14213d">
            </label>

            <label class="toolbar-control">
              <span>Bg</span>
              <input id="backgroundColorControl" type="color" value="#ffffff">
            </label>

            <label class="toolbar-control">
              <span>Align</span>
              <select id="textAlignControl">
                <option value="left">Left</option>
                <option value="center">Center</option>
                <option value="right">Right</option>
                <option value="justify">Justify</option>
              </select>
            </label>

            <button class="toolbar-toggle" id="italicButton" type="button" aria-pressed="false">Italic</button>
            <button class="toolbar-toggle" id="underlineButton" type="button" aria-pressed="false">Underline</button>
          </div>

          <div class="toolbar__group" id="imageControlsGroup" hidden>
            <button class="ghost-button" id="replaceImageButton" type="button">Replace</button>

            <label class="toolbar-control">
              <span>Width</span>
              <input id="imageWidthControl" type="number" min="1" step="1" value="320">
            </label>

            <label class="toolbar-control">
              <span>Height</span>
              <input id="imageHeightControl" type="number" min="1" step="1" value="220">
            </label>

            <label class="toolbar-control">
              <span>Radius</span>
              <input id="imageRadiusControl" type="number" min="0" step="1" value="20">
            </label>

            <label class="toolbar-control">
              <span>Opacity</span>
              <input id="imageOpacityControl" type="number" min="0" max="100" step="1" value="100">
            </label>

            <label class="toolbar-control">
              <span>Rotate</span>
              <input id="imageRotateControl" type="number" min="-360" max="360" step="1" value="0">
            </label>

            <label class="toolbar-control">
              <span>Fit</span>
              <select id="imageObjectFitControl">
                <option value="cover">Cover</option>
                <option value="contain">Contain</option>
                <option value="fill">Fill</option>
                <option value="none">None</option>
                <option value="scale-down">Scale Down</option>
              </select>
            </label>

            <label class="toolbar-control">
              <span>Filter</span>
              <select id="imageFilterControl">
                <option value="none">None</option>
                <option value="soft">Soft</option>
                <option value="dramatic">Dramatic</option>
                <option value="grayscale">Grayscale</option>
                <option value="warm">Warm</option>
                <option value="cool">Cool</option>
              </select>
            </label>
          </div>

          <div class="toolbar__group" id="codeControlsGroup" hidden>
            <label class="toolbar-control toolbar-control--wide">
              <span>Language</span>
              <select id="codeLanguageControl">
                <option value="">Plain Text</option>
                <option value="java">Java</option>
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="c++">C++</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
              </select>
            </label>

            <label class="toolbar-control">
              <span>Width</span>
              <input id="codeWidthControl" type="number" min="120" step="1" value="480">
            </label>

            <label class="toolbar-control">
              <span>Height</span>
              <input id="codeHeightControl" type="number" min="96" step="1" value="180">
            </label>
          </div>

          <div class="toolbar__group" id="presenterViewGroup" hidden>
            <button class="toolbar-toggle" id="presenterViewButton" type="button" aria-pressed="false">Presenter Notes</button>
          </div>
        </div>
      </div>
    </header>

    <main class="workspace" id="workspace">
      <section class="panel source-panel" id="sourcePanel">
        <div class="panel__header">
          <div class="panel__header-copy">
            <span class="panel__kicker">Markup</span>
            <h2 id="sourcePanelTitle">Source HTML</h2>
            <p id="sourcePanelDescription" hidden></p>
          </div>
          <span class="helper-pill" id="sanitizationBadge">Safe preview ready</span>
        </div>

        <div class="source-panel__body">
          <div class="helper-row">
            <span id="sourceContextHint" hidden></span>
            <span id="sourceStats">0 characters</span>
          </div>

          <label class="sr-only" for="sourceInput">Editor source</label>
          <textarea class="source-input" id="sourceInput" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
        </div>
      </section>

      <button class="pane-divider pane-divider--vertical" id="workspaceResizeHandle" type="button" aria-label="Resize source and preview panels" title="Drag to resize source and preview panels"></button>

      <section class="panel preview-panel">
        <div class="panel__header">
          <div class="panel__header-copy">
            <span class="panel__kicker">Canvas</span>
            <h2>Live Preview</h2>
            <p id="previewPanelDescription" hidden></p>
          </div>
          <div class="panel__header-actions">
            <div class="preview-zoom-controls" aria-label="Preview zoom controls">
              <button class="ghost-button preview-zoom-button" id="zoomOutButton" type="button" title="Zoom out">-</button>
              <label class="sr-only" for="zoomSelect">Preview zoom</label>
              <select class="preview-zoom-select" id="zoomSelect" aria-label="Preview zoom">
                <option value="50">50%</option>
                <option value="75">75%</option>
                <option value="100" selected>100%</option>
                <option value="125">125%</option>
                <option value="150">150%</option>
                <option value="200">200%</option>
                <option value="fit-width">Fit to Width</option>
                <option value="fit-page">Fit to Page</option>
              </select>
              <button class="ghost-button preview-zoom-button" id="zoomInButton" type="button" title="Zoom in">+</button>
              <button class="ghost-button preview-zoom-reset" id="zoomResetButton" type="button" title="Reset zoom to 100%">100%</button>
            </div>
            <button class="ghost-button" id="fullscreenButton" type="button" aria-pressed="false">Fullscreen</button>
            <button class="ghost-button" id="maximizePreviewButton" type="button" aria-pressed="false">Maximize</button>
            <span class="helper-pill" id="editorStatus">Ready</span>
          </div>
        </div>

        <div class="preview-panel__body">
          <div class="preview-split" id="previewSplit">
            <div class="preview-stage">
              <div class="max-view-toolbar" id="maxViewToolbar" role="toolbar" aria-label="Preview controls" hidden aria-hidden="true">
                <div class="preview-zoom-controls" aria-label="Zoom controls">
                  <button class="ghost-button preview-zoom-button" id="maxZoomOutButton" type="button" title="Zoom out">−</button>
                  <select class="preview-zoom-select" id="maxZoomSelect" aria-label="Preview zoom">
                    <option value="50">50%</option>
                    <option value="75">75%</option>
                    <option value="100" selected>100%</option>
                    <option value="125">125%</option>
                    <option value="150">150%</option>
                    <option value="200">200%</option>
                    <option value="fit-width">Fit Width</option>
                    <option value="fit-page">Fit Page</option>
                  </select>
                  <button class="ghost-button preview-zoom-button" id="maxZoomInButton" type="button" title="Zoom in">+</button>
                </div>
                <span class="max-view-toolbar-divider"></span>
                <div class="max-view-toolbar__actions">
                  <button class="ghost-button" id="maxFullscreenButton" type="button" aria-pressed="false">Fullscreen</button>
                  <button class="ghost-button" id="exitMaxViewButton" type="button">Exit Max View</button>
                </div>
              </div>
              <iframe
                class="preview-frame"
                id="previewFrame"
                title="Editable HTML preview"
                sandbox="allow-same-origin"
              ></iframe>
            </div>

            <button class="pane-divider pane-divider--horizontal" id="notesResizeHandle" type="button" aria-label="Resize slide preview and presenter notes" title="Drag to resize slide preview and presenter notes" hidden></button>

            <section class="panel presenter-notes-panel" id="presenterNotesPanel" hidden>
              <div class="panel__header">
                <div class="panel__header-copy">
                  <span class="panel__kicker">Speaker</span>
                  <h2>Presenter Notes</h2>
                </div>
              </div>
              <div class="source-panel__body">
                <label class="sr-only" for="presenterNotesInput">Presenter notes</label>
                <textarea class="source-input" id="presenterNotesInput" spellcheck="false" autocapitalize="off" autocomplete="off" placeholder="No presenter notes for this slide."></textarea>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>
  </div>

  <input id="imagePicker" type="file" accept="image/*" hidden>
  <input id="htmlImportPicker" type="file" accept=".html,.htm,text/html" hidden>

  <script>
    const STARTER_HTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Presentation</title>
  <style>
    :root {
      --ink: #14213d;
      --muted: #52607a;
      --accent: #ef5b34;
      --panel: #ffffff;
      --page: linear-gradient(135deg, #f6f8fb, #eef3ff);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Aptos Display", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--page);
    }

    .slide {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 4rem 1.5rem;
    }

    .card {
      width: min(960px, 100%);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(20, 33, 61, 0.08);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(20, 33, 61, 0.12);
      padding: clamp(1.5rem, 3vw, 3rem);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 2rem;
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: rgba(239, 91, 52, 0.12);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 1rem 0 0.8rem;
      font-size: clamp(2.2rem, 4vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.04rem;
      line-height: 1.7;
    }

    ul {
      margin: 1.35rem 0 0;
      padding-left: 1.2rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      margin-top: 1.6rem;
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    a,
    button {
      border: 0;
      border-radius: 999px;
      padding: 0.9rem 1.2rem;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #ffffff;
    }

    .secondary {
      background: rgba(20, 33, 61, 0.08);
      color: var(--ink);
    }

    .media img {
      width: 100%;
      border-radius: 24px;
      display: block;

    function handleContextToolbarWheel(event) {
      if (!contextToolbarRow || event.ctrlKey) {
        return;
      }

      const canScrollHorizontally = contextToolbarRow.scrollWidth - contextToolbarRow.clientWidth > 1;
      if (!canScrollHorizontally) {
        return;
      }

      const delta = Math.abs(event.deltaY) >= Math.abs(event.deltaX) ? event.deltaY : event.deltaX;
      if (!delta) {
        return;
      }

      const maxScrollLeft = Math.max(0, contextToolbarRow.scrollWidth - contextToolbarRow.clientWidth);
      const nextScrollLeft = clamp(contextToolbarRow.scrollLeft + delta, 0, maxScrollLeft);
      if (Math.abs(nextScrollLeft - contextToolbarRow.scrollLeft) < 0.5) {
        return;
      }

      contextToolbarRow.scrollLeft = nextScrollLeft;
      event.preventDefault();
    }

    function bindResizeHandles() {
      bindPaneResize(workspaceResizeHandle, {
        axis: "x",
        getContainer: () => workspace,
        isEnabled: () => !workspace.classList.contains("is-collapsed") && window.innerWidth > 980,
        getValue: () => appState.sourcePaneSize,
        getBounds: (rect) => ({
          min: 320,
          max: Math.max(420, rect.width - 360)
        }),
        project: (event, rect) => event.clientX - rect.left,
        apply: (value) => {
          appState.sourcePaneSize = Math.round(value);
          applyWorkspacePreferences();
          if (appState.previewZoomMode !== "manual") {
            applyPreviewZoom();
          } else {
            scheduleOverlayRefresh();
          }
          persistWorkspacePreference(STORAGE_KEYS.sourcePaneSize, appState.sourcePaneSize);
        }

        axis: "y",
        getContainer: () => previewSplit,

        getValue: () => appState.notesPaneSize,
        getBounds: (rect) => ({
          min: 160,

        }),
        project: (event, rect) => rect.bottom - event.clientY,
        apply: (value) => {
          appState.notesPaneSize = Math.round(value);

          if (appState.previewZoomMode !== "manual") {

      });

    function bindPaneResize(handle, options) {
      handle.addEventListener("pointerdown", (event) => {
        if (!options.isEnabled()) {
          return;
        }

        const container = options.getContainer();
        if (!container) {
          return;
        }

        event.preventDefault();
        const rect = container.getBoundingClientRect();
        const bounds = options.getBounds(rect);
        handle.classList.add("is-dragging");
        document.body.style.userSelect = "none";
        handle.setPointerCapture?.(event.pointerId);

        const onMove = (moveEvent) => {
          const projected = options.project(moveEvent, rect);
          const clamped = clamp(projected, bounds.min, bounds.max);
          options.apply(clamped);
        };

        const onUp = () => {
          handle.classList.remove("is-dragging");
          document.body.style.userSelect = "";
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          window.removeEventListener("pointercancel", onUp);
        };

        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
        window.addEventListener("pointercancel", onUp);
      });
    }

    function restoreWorkspacePreferences() {
      appState.sourcePaneSize = readNumberPreference(STORAGE_KEYS.sourcePaneSize, 480);
      appState.notesPaneSize = readNumberPreference(STORAGE_KEYS.notesPaneSize, 224);
      appState.presenterView = readBooleanPreference(STORAGE_KEYS.presenterView, false);
    }

    function applyWorkspacePreferences() {
      const workspaceRect = workspace.getBoundingClientRect();
      const previewSplitRect = previewSplit.getBoundingClientRect();
      const maxSourcePaneSize = workspaceRect.width > 0 ? Math.max(420, workspaceRect.width - 360) : appState.sourcePaneSize;
      const maxNotesPaneSize = previewSplitRect.height > 0 ? Math.max(220, previewSplitRect.height - 220) : appState.notesPaneSize;
      const sourcePaneSize = clamp(appState.sourcePaneSize, 320, maxSourcePaneSize);
      const notesPaneSize = clamp(appState.notesPaneSize, 160, maxNotesPaneSize);

      workspace.style.setProperty("--source-pane-size", `${Math.round(sourcePaneSize)}px`);
      previewSplit.style.setProperty("--presenter-notes-size", `${Math.round(notesPaneSize)}px`);
    }

    function supportsBrowserFullscreen() {
      return document.fullscreenEnabled !== false
        && typeof appElement.requestFullscreen === "function"
        && typeof document.exitFullscreen === "function";
    }

    function isAppInFullscreen() {
      return document.fullscreenElement === appElement;
    }

    function syncFullscreenUi(isFullscreen = isAppInFullscreen()) {
      const isSupported = supportsBrowserFullscreen();
      const label = isFullscreen ? "Exit Fullscreen" : "Fullscreen";

      appState.fullscreenActive = isFullscreen;
      appElement.classList.toggle("is-browser-fullscreen", isFullscreen);
      document.documentElement.classList.toggle("is-browser-fullscreen", isFullscreen);
      document.body.classList.toggle("is-browser-fullscreen", isFullscreen);

      fullscreenButton.hidden = !isSupported;
      maxFullscreenButton.hidden = !isSupported;
      fullscreenButton.disabled = !isSupported;
      maxFullscreenButton.disabled = !isSupported;

      fullscreenButton.setAttribute("aria-pressed", String(isFullscreen));
      maxFullscreenButton.setAttribute("aria-pressed", String(isFullscreen));
      fullscreenButton.textContent = label;
      maxFullscreenButton.textContent = label;
      fullscreenButton.title = label;
      maxFullscreenButton.title = label;
    }

    function syncPreviewZoomOptionLabels(sourceSelect, targetSelect) {
      const sourceOptions = Array.from(sourceSelect.options);
      const targetOptions = new Map(Array.from(targetSelect.options).map((option) => [option.value, option]));

      for (const option of sourceOptions) {
        const mirrorOption = targetOptions.get(option.value);
        if (mirrorOption) {
          mirrorOption.textContent = option.textContent;
        }
      }
    }

    function formatZoomPercentage(scale) {
      return `${Math.round(scale * 100)}%`;
    }

    function getAppliedPreviewZoomScale() {
      return clamp(appState.previewZoomScale || 1, PREVIEW_ZOOM_MIN, PREVIEW_ZOOM_MAX);
    }

    function getPreviewZoomOption(value) {
      return Array.from(zoomSelect.options).find((option) => option.value === value) || null;
    }

    function updatePreviewZoomUi() {
      const scale = getAppliedPreviewZoomScale();
      const fitWidthOption = getPreviewZoomOption("fit-width");
      const fitPageOption = getPreviewZoomOption("fit-page");

      if (fitWidthOption) {
        fitWidthOption.textContent = appState.previewZoomMode === "fit-width"
          ? `Fit to Width (${formatZoomPercentage(scale)})`
          : "Fit to Width";
      }

      if (fitPageOption) {
        fitPageOption.textContent = appState.previewZoomMode === "fit-page"
          ? `Fit to Page (${formatZoomPercentage(scale)})`
          : "Fit to Page";
      }

      if (appState.previewZoomMode === "manual") {
        zoomSelect.value = String(Math.round(scale * 100));
      } else {
        zoomSelect.value = appState.previewZoomMode;
      }

      syncPreviewZoomOptionLabels(zoomSelect, maxZoomSelect);
      maxZoomSelect.value = zoomSelect.value;

      const canZoomOut = PREVIEW_ZOOM_PRESETS.some((preset) => preset < scale - 0.001);
      const canZoomIn = PREVIEW_ZOOM_PRESETS.some((preset) => preset > scale + 0.001);
      zoomResetButton.disabled = appState.previewZoomMode === "manual" && Math.abs(scale - 1) < 0.001;
      zoomOutButton.disabled = !canZoomOut;
      zoomInButton.disabled = !canZoomIn;
      zoomSelect.title = appState.previewZoomMode === "manual"
        ? `Preview zoom ${formatZoomPercentage(scale)}`
        : `${zoomSelect.selectedOptions[0]?.textContent || "Preview zoom"}`;
      maxZoomOutButton.disabled = !canZoomOut;
      maxZoomInButton.disabled = !canZoomIn;
      maxZoomSelect.title = zoomSelect.title;
    }

    function capturePreviewScrollState() {
      const previewDocument = previewFrame.contentDocument;
      const previewWindow = previewFrame.contentWindow;
      if (!previewDocument || !previewWindow) {
        return null;
      }

      const root = previewDocument.documentElement;
      const maxScrollX = Math.max(0, root.scrollWidth - root.clientWidth);
      const maxScrollY = Math.max(0, root.scrollHeight - root.clientHeight);
      return {
        ratioX: maxScrollX > 0 ? previewWindow.scrollX / maxScrollX : 0,
        ratioY: maxScrollY > 0 ? previewWindow.scrollY / maxScrollY : 0
      };
    }

    function restorePreviewScrollState(scrollState) {
      const previewDocument = previewFrame.contentDocument;
      const previewWindow = previewFrame.contentWindow;
      if (!previewDocument || !previewWindow || !scrollState) {
        return;
      }

      const root = previewDocument.documentElement;
      const maxScrollX = Math.max(0, root.scrollWidth - root.clientWidth);
      const maxScrollY = Math.max(0, root.scrollHeight - root.clientHeight);
      previewWindow.scrollTo(maxScrollX * scrollState.ratioX, maxScrollY * scrollState.ratioY);
    }

    function getPreviewZoomReferencePage(previewDocument) {
      if (appState.selectedPage && appState.selectedPage.ownerDocument === previewDocument && previewDocument.contains(appState.selectedPage)) {
        return appState.selectedPage;
      }

      return getPageElements(previewDocument)[0] || previewDocument.body || null;
    }

    function computePreviewZoomScale(previewDocument) {
      if (appState.previewZoomMode === "manual") {
        return getAppliedPreviewZoomScale();
      }

      const page = getPreviewZoomReferencePage(previewDocument);
      if (!page) {
        return 1;
      }

      const currentScale = getAppliedPreviewZoomScale() || 1;
      const rect = page.getBoundingClientRect();
      const unscaledWidth = rect.width > 0 ? rect.width / currentScale : rect.width;
      const unscaledHeight = rect.height > 0 ? rect.height / currentScale : rect.height;
      const viewportWidth = previewDocument.documentElement?.clientWidth || previewFrame.clientWidth || rect.width || 1;
      const viewportHeight = previewDocument.documentElement?.clientHeight || previewFrame.clientHeight || rect.height || 1;
      const inset = 24;
      const widthScale = unscaledWidth > 0 ? (Math.max(80, viewportWidth - inset) / unscaledWidth) : 1;
      const heightScale = unscaledHeight > 0 ? (Math.max(80, viewportHeight - inset) / unscaledHeight) : 1;

      return clamp(
        appState.previewZoomMode === "fit-width" ? widthScale : Math.min(widthScale, heightScale),
        PREVIEW_ZOOM_MIN,
        PREVIEW_ZOOM_MAX
      );
    }

    function ensurePreviewZoomStyle(previewDocument) {
      let zoomStyle = previewDocument.getElementById(PREVIEW_ZOOM_STYLE_ID);
      if (zoomStyle) {
        return zoomStyle;
      }

      zoomStyle = previewDocument.createElement("style");
      zoomStyle.id = PREVIEW_ZOOM_STYLE_ID;
      previewDocument.head.appendChild(zoomStyle);
      return zoomStyle;
    }

    function applyPreviewZoom(options = {}) {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        updatePreviewZoomUi();
        return;
      }

      const scrollState = options.preserveScroll === false ? null : capturePreviewScrollState();
      const scale = computePreviewZoomScale(previewDocument);
      const inverseScale = scale > 0 ? 1 / scale : 1;
      const zoomStyle = ensurePreviewZoomStyle(previewDocument);

      appState.previewZoomScale = scale;
      zoomStyle.textContent = `
        html[data-editor-preview-root="true"] body[data-editor-preview="true"] {
          zoom: ${scale.toFixed(4)};
        }

        html[data-editor-preview-root="true"] [data-editor-overlay-root="true"] {
          zoom: ${inverseScale.toFixed(4)};
        }
      `;

      updatePreviewZoomUi();
      window.requestAnimationFrame(() => {
        restorePreviewScrollState(scrollState);
        scheduleOverlayRefresh();
      });
    }

    function setManualPreviewZoom(scale) {
      appState.previewZoomMode = "manual";
      appState.previewZoomScale = clamp(scale, PREVIEW_ZOOM_MIN, PREVIEW_ZOOM_MAX);
      applyPreviewZoom();
    }

    function resetPreviewZoom() {
      setManualPreviewZoom(1);
    }

    function stepPreviewZoom(direction) {
      const scale = getAppliedPreviewZoomScale();
      const nextScale = direction > 0
        ? (PREVIEW_ZOOM_PRESETS.find((preset) => preset > scale + 0.001) || scale)
        : ([...PREVIEW_ZOOM_PRESETS].reverse().find((preset) => preset < scale - 0.001) || scale);

      setManualPreviewZoom(nextScale);
    }

    function handlePreviewZoomSelect() {
      const value = zoomSelect.value;
      if (value === "fit-width" || value === "fit-page") {
        appState.previewZoomMode = value;
        applyPreviewZoom();
        return;
      }

      const percent = Number(value);
      if (!Number.isFinite(percent) || percent <= 0) {
        updatePreviewZoomUi();
        return;
      }

      setManualPreviewZoom(percent / 100);
    }

    function handleWindowResize() {
      applyWorkspacePreferences();
      updatePresenterViewUi();
    }

    function persistWorkspacePreference(key, value) {
      try {
        localStorage.setItem(key, String(value));
      } catch (error) {
        // Ignore storage failures and keep session-only state.
      }
    }

    function readNumberPreference(key, fallback) {
      try {
        const value = Number(localStorage.getItem(key));
        return Number.isFinite(value) && value > 0 ? value : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function readBooleanPreference(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        if (value === null) {
          return fallback;
        }

        return value === "true";
      } catch (error) {
        return fallback;
      }
    }

    function confirmResetDocument(message) {
      return !hasMeaningfulContent() || window.confirm(message);
    }

    function hasMeaningfulContent() {
      const value = sourceInput.value.trim();
      if (!value) {
        return false;
      }

      if (isRemarkMode()) {
        return value !== DEFAULT_REMARK_SOURCE.trim();
      }

      return value !== STARTER_HTML.trim();
    }

    function isRemarkMode() {
      return appState.documentModel?.mode === "remark-slideshow";
    }

    function setSourceCollapsed(shouldCollapse) {
      if (!shouldCollapse && appState.previewMaximized) {
        setPreviewMaximized(false);
      }
      workspace.classList.toggle("is-collapsed", shouldCollapse);
      toggleSourceButton.setAttribute("aria-expanded", String(!shouldCollapse));
      toggleSourceButton.textContent = shouldCollapse ? "Show Source" : "Hide Source";
      applyWorkspacePreferences();
      if (appState.previewZoomMode !== "manual") {
        applyPreviewZoom();
      } else {
        scheduleOverlayRefresh();
      }
    }

    function togglePreviewMaximized() {
      setPreviewMaximized(!appState.previewMaximized);
    }

    function handleFullscreenChange() {
      const isFullscreen = isAppInFullscreen();
      syncFullscreenUi(isFullscreen);
      applyWorkspacePreferences();

      if (appState.previewZoomMode !== "manual") {
        applyPreviewZoom();
      } else {
        scheduleOverlayRefresh();
      }

      const focusFallback = appState.previewMaximized ? maxFullscreenButton : fullscreenButton;
      const focusTarget = isFullscreen
        ? focusFallback
        : (canRestoreFocus(appState.lastFocusedBeforeFullscreen) ? appState.lastFocusedBeforeFullscreen : focusFallback);

      window.requestAnimationFrame(() => {
        focusTarget?.focus?.({ preventScroll: true });
        if (!isFullscreen) {
          appState.lastFocusedBeforeFullscreen = null;
        }
      });
    }

    async function setBrowserFullscreen(shouldEnter) {
      if (!supportsBrowserFullscreen() || appState.fullscreenActive === shouldEnter) {
        return;
      }

      if (shouldEnter) {
        appState.lastFocusedBeforeFullscreen = document.activeElement instanceof HTMLElement
          ? document.activeElement
          : null;

        try {
          await appElement.requestFullscreen();
        } catch (error) {
          syncFullscreenUi(false);
          editorStatus.textContent = "Fullscreen was blocked by the browser.";
        }
        return;
      }

      if (!document.fullscreenElement) {
        syncFullscreenUi(false);
        return;
      }

      try {
        await document.exitFullscreen();
      } catch (error) {
        syncFullscreenUi(isAppInFullscreen());
        editorStatus.textContent = "Could not exit fullscreen.";
      }
    }

    function toggleBrowserFullscreen() {
      setBrowserFullscreen(!appState.fullscreenActive);
    }

    function syncPreviewMaximizedUi(shouldMaximize) {
      appElement.classList.toggle("is-preview-maximized", shouldMaximize);
      topbar.hidden = shouldMaximize;
      topbar.setAttribute("aria-hidden", String(shouldMaximize));
      previewPanelHeader.hidden = shouldMaximize;
      previewPanelHeader.setAttribute("aria-hidden", String(shouldMaximize));
      maxViewToolbar.hidden = !shouldMaximize;
      maxViewToolbar.setAttribute("aria-hidden", String(!shouldMaximize));
      appState.previewMaximized = shouldMaximize;
      maximizePreviewButton.setAttribute("aria-pressed", String(shouldMaximize));
      maximizePreviewButton.textContent = shouldMaximize ? "Exit Max View" : "Maximize";
      toggleSourceButton.disabled = shouldMaximize;
    }

    function canRestoreFocus(target) {
      return target instanceof HTMLElement
        && target.isConnected
        && !target.closest("[hidden]");
    }

    function setPreviewMaximized(shouldMaximize) {
      if (appState.previewMaximized === shouldMaximize) {
        return;
      }

      if (shouldMaximize) {
        appState.lastFocusedBeforeMaxView = document.activeElement instanceof HTMLElement
          ? document.activeElement
          : null;
        maxZoomSelect.value = zoomSelect.value;
      }

      syncPreviewMaximizedUi(shouldMaximize);
      applyWorkspacePreferences();

      window.requestAnimationFrame(() => {
        if (appState.previewZoomMode !== "manual") {
          applyPreviewZoom();
        } else {
          scheduleOverlayRefresh();
        }

        if (shouldMaximize) {
          exitMaxViewButton.focus({ preventScroll: true });
          return;
        }

        const focusTarget = canRestoreFocus(appState.lastFocusedBeforeMaxView)
          ? appState.lastFocusedBeforeMaxView
          : (appState.fullscreenActive ? fullscreenButton : maximizePreviewButton);
        focusTarget.focus({ preventScroll: true });
        appState.lastFocusedBeforeMaxView = null;
      });
    }

    function createDefaultRemarkModel() {
      return {
        mode: "remark-slideshow",
        doctype: "<!DOCTYPE html>",
        htmlAttributes: ` lang="en"`,
        headHtml: DEFAULT_REMARK_HEAD.trim(),
        bodyTemplate: DEFAULT_REMARK_BODY,
        textareaAttributes: ` id="source"`,
        pageDefaults: createDefaultPageDefaults("remark-slideshow"),
        slides: parseRemarkDeckSource(DEFAULT_REMARK_SOURCE)
      };
    }

    function createNormalModel(rawHtml) {
      return {
        mode: "normal-html",
        pageDefaults: createDefaultPageDefaults("normal-html"),
        rawHtml
      };
    }

    function createDefaultPageDefaults(mode) {
      if (mode === "remark-slideshow") {
        return {
          widthCss: "min(1120px, calc(100% - 32px))",
          minHeightPx: 630,
          paddingCss: "54px 60px",
          backgroundCss: "#ffffff",
          borderCss: "1px solid rgba(20, 33, 61, 0.08)",
          borderRadiusCss: "30px",
          boxShadowCss: "0 18px 52px rgba(15, 23, 42, 0.12)",
          fontFamilyCss: "\"Aptos Display\", \"Segoe UI\", \"Trebuchet MS\", sans-serif",
          colorCss: "#13203a"
        };
      }

      return {
        widthCss: "min(1120px, calc(100% - 32px))",
        minHeightPx: 720,
        paddingCss: "36px",
        backgroundCss: "#ffffff",
        borderCss: "1px solid rgba(20, 33, 61, 0.08)",
        borderRadiusCss: "28px",
        boxShadowCss: "0 28px 80px rgba(20, 33, 61, 0.14)",
        fontFamilyCss: "\"Aptos Display\", \"Segoe UI\", \"Trebuchet MS\", sans-serif",
        colorCss: "#14213d"
      };
    }

    function loadNormalDocument(rawHtml, options = {}) {
      appState.documentModel = createNormalModel(rawHtml);
      appState.exportFileName = options.fileName || "edited_presentation.html";
      setSourceValue(rawHtml);
      renderCurrentDocument();
    }

    function loadRemarkModel(model, options = {}) {
      ensureRemarkSlidesExist(model);
      appState.documentModel = model;
      appState.exportFileName = options.fileName || "remark_deck.html";
      setSourceValue(buildRemarkDeckSource(model));
      renderCurrentDocument();
    }

    function loadRemarkDocumentFromHtml(rawHtml, options = {}) {
      const model = createRemarkModelFromHtml(rawHtml);
      loadRemarkModel(model, { fileName: options.fileName || "remark_deck.html" });
    }

    function setSourceValue(value) {
      appState.isUpdatingSourceInternally = true;
      sourceInput.value = value;
      updateSourceStats();
      appState.isUpdatingSourceInternally = false;
    }

    function setSourcePanelDescription(message) {
      sourcePanelDescription.textContent = message || "";
      sourcePanelDescription.hidden = !message;
    }

    function setSourceContextHint(message) {
      sourceContextHint.textContent = message || "";
      sourceContextHint.hidden = !message;
    }

    function setPreviewPanelDescription(message) {
      previewPanelDescription.textContent = message || "";
      previewPanelDescription.hidden = !message;
    }

    function setPreviewHint(message) {
      void message;
    }

    function updateModeUi() {
      const inRemarkMode = isRemarkMode();
      if (!inRemarkMode && appState.presenterView) {
        appState.presenterView = false;
        persistWorkspacePreference(STORAGE_KEYS.presenterView, false);
      }

      modeBadge.textContent = inRemarkMode ? "Mode: Remark Slideshow" : "Mode: Normal HTML";
      pageSelectLabel.textContent = inRemarkMode ? "Slide" : "Page";
      newPageButton.textContent = inRemarkMode ? "New Slide" : "New Page";
      exportButton.textContent = inRemarkMode ? "Export Deck" : "Export HTML";
      remarkMetaGroup.hidden = !inRemarkMode;
      presenterViewGroup.hidden = !inRemarkMode;

      if (inRemarkMode) {
        sourcePanelTitle.textContent = "Remark Slide Source";
        setSourcePanelDescription("");
        setSourceContextHint("");
        setPreviewPanelDescription("");
      } else {
        sourcePanelTitle.textContent = "Source HTML";
        setSourcePanelDescription("");
        setSourceContextHint("");
        setPreviewPanelDescription("");
      }

      updatePresenterViewUi();
    }

    function handleHtmlImport(event) {
      const file = event.target.files && event.target.files[0];

      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        if (typeof reader.result !== "string") {
          return;
        }

        clearSelection(false);
        appState.selectedPage = null;

        if (detectRemarkHtml(reader.result)) {
          loadRemarkDocumentFromHtml(reader.result, { fileName: file.name || "remark_deck.html" });
          editorStatus.textContent = `Imported ${file.name} in remark mode`;
          setPreviewHint("");
        } else {
          loadNormalDocument(reader.result, { fileName: file.name || "edited_presentation.html" });
          editorStatus.textContent = `Imported ${file.name}`;
          setPreviewHint("Imported HTML is now the preview source. The same sanitizer used for pasted HTML is applied before rendering.");
        }
      };

      reader.readAsText(file);
      htmlImportPicker.value = "";
    }

    function commitSourceInputToModel() {
      window.clearTimeout(appState.renderTimer);
      appState.renderTimer = null;

      const rawValue = sourceInput.value;
      if (isRemarkMode()) {
        const selectedSlide = getCurrentRemarkSlide();
        appState.pendingSelection = {
          remarkSlideId: selectedSlide?.id || null,
          index: getActivePageIndex(),
          previewScrollState: capturePreviewScrollState()
        };
        appState.documentModel.slides = parseRemarkDeckSource(rawValue);
        ensureRemarkSlidesExist(appState.documentModel);
        renderCurrentDocument();
        editorStatus.textContent = "Rendered remark source";
        setPreviewHint("Slide separators, metadata, and markdown-like content have been re-parsed into editable slides.");
        return;
      }

      if (detectRemarkHtml(rawValue)) {
        loadRemarkDocumentFromHtml(rawValue, { fileName: appState.exportFileName || "remark_deck.html" });
        editorStatus.textContent = "Switched to remark slideshow mode";
        setPreviewHint("A remark-style wrapper was detected automatically, so the editor is now treating the file as a slide deck.");
        return;
      }

      appState.documentModel.rawHtml = rawValue;
      renderCurrentDocument();
    }

    function renderCurrentDocument() {
      clearSelection(false);
      appState.selectedPage = null;
      updateModeUi();

      if (isRemarkMode()) {
        renderRemarkPreview();
      } else {
        renderNormalPreview();
      }
    }

    function renderNormalPreview() {
      const rawHtml = appState.documentModel?.rawHtml || "";

      if (detectRemarkHtml(rawHtml)) {
        loadRemarkDocumentFromHtml(rawHtml, { fileName: appState.exportFileName || "remark_deck.html" });
        return;
      }

      const sanitizedDocument = sanitizeHtmlDocument(rawHtml);
      appState.lastDoctype = sanitizedDocument.doctype;
      const previewMarkup = buildPreviewMarkup(sanitizedDocument.document);

      editorStatus.textContent = "Rendering preview";
      setPreviewHint("");
      sanitizationBadge.textContent = buildSanitizationLabel(sanitizedDocument.stats);

      previewFrame.onload = () => {
        decoratePreviewDocument();
        editorStatus.textContent = "Preview ready";
      };

      previewFrame.srcdoc = previewMarkup;
    }

    function renderRemarkPreview() {
      const previewMarkup = buildRemarkPreviewMarkup(appState.documentModel);
      editorStatus.textContent = "Rendering remark preview";
      setPreviewHint("Slides are editable pages. Use the source panel for raw slide structure, or edit visible content directly.");
      sanitizationBadge.textContent = "Remark slideshow mode";

      previewFrame.onload = () => {
        decoratePreviewDocument();
        editorStatus.textContent = "Remark preview ready";
      };

      previewFrame.srcdoc = previewMarkup;
    }

    function sanitizeHtmlDocument(rawHtml) {
      const parser = new DOMParser();
      const documentNode = parser.parseFromString(rawHtml || "", "text/html");
      const stats = createSanitizationStats();
      sanitizeDocumentNode(documentNode, stats);
      ensureDocumentShape(documentNode);

      return {
        document: documentNode,
        doctype: extractDoctype(rawHtml) || serializeDoctype(documentNode),
        stats
      };
    }

    function createSanitizationStats() {
      return {
        scriptsRemoved: 0,
        handlersRemoved: 0,
        dangerousLinksNeutralized: 0,
        refreshTagsRemoved: 0
      };
    }

    function sanitizeDocumentNode(documentNode, stats) {
      documentNode.querySelectorAll("script").forEach((script) => {
        stats.scriptsRemoved += 1;
        script.remove();
      });

      documentNode.querySelectorAll('meta[http-equiv="refresh" i]').forEach((meta) => {
        stats.refreshTagsRemoved += 1;
        meta.remove();
      });

      documentNode.querySelectorAll("*").forEach((element) => {
        Array.from(element.attributes).forEach((attribute) => {
          const name = attribute.name.toLowerCase();
          const value = attribute.value.trim();

          if (name.startsWith("on")) {
            stats.handlersRemoved += 1;
            element.removeAttribute(attribute.name);
          }

          if ((name === "href" || name === "xlink:href") && /^javascript:/i.test(value)) {
            stats.dangerousLinksNeutralized += 1;
            element.setAttribute(attribute.name, "#");
          }
        });
      });
    }

    function sanitizeHtmlFragment(rawHtml) {
      const parser = new DOMParser();
      const documentNode = parser.parseFromString(`<!DOCTYPE html><html><body>${rawHtml || ""}</body></html>`, "text/html");
      const stats = createSanitizationStats();
      sanitizeDocumentNode(documentNode, stats);
      return {
        html: documentNode.body.innerHTML,
        stats
      };
    }

    function ensureDocumentShape(documentNode) {
      if (!documentNode.head) {
        const head = documentNode.createElement("head");
        documentNode.documentElement.insertBefore(head, documentNode.body || null);
      }

      if (!documentNode.body) {
        const body = documentNode.createElement("body");
        documentNode.documentElement.appendChild(body);
      }
    }

    function extractDoctype(rawHtml) {
      const match = String(rawHtml || "").match(/^\s*(<!doctype[^>]+>)/i);
      return match ? match[1] : "";
    }

    function serializeDoctype(documentNode) {
      const doctype = documentNode.doctype;

      if (!doctype) {
        return "<!DOCTYPE html>";
      }

      if (doctype.publicId && doctype.systemId) {
        return `<!DOCTYPE ${doctype.name} PUBLIC "${doctype.publicId}" "${doctype.systemId}">`;
      }

      if (doctype.publicId) {
        return `<!DOCTYPE ${doctype.name} PUBLIC "${doctype.publicId}">`;
      }

      if (doctype.systemId) {
        return `<!DOCTYPE ${doctype.name} SYSTEM "${doctype.systemId}">`;
      }

      return `<!DOCTYPE ${doctype.name}>`;
    }

    function buildPreviewMarkup(documentNode) {
      const previewDocument = documentNode.cloneNode(true);
      const editorStyleRange = previewDocument.createRange();
      const styleFragment = editorStyleRange.createContextualFragment(EDITOR_STYLE);
      previewDocument.head.appendChild(styleFragment);
      return `${appState.lastDoctype}\n${previewDocument.documentElement.outerHTML}`;
    }

    function buildRemarkPreviewMarkup(model) {
      const slidesMarkup = model.slides.map((slide, index) => {
        return buildRemarkSlideMarkup(slide, index);
      }).join("\n");

      return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remark Preview</title>
  ${EDITOR_STYLE}
</head>
<body data-editor-preview="true" data-editor-multipage="true" data-editor-mode="remark-slideshow">
${slidesMarkup}
</body>
</html>`;
    }

    function buildRemarkSlideMarkup(slide, index) {
      const classes = extractRemarkClasses(getSlideDirectiveValue(slide, "class"));
      const classAttr = classes.length ? ` class="remark-editor-slide ${classes.join(" ")}"` : ` class="remark-editor-slide"`;
      const content = renderRemarkSlideBody(slide.bodySource || "");

      return `<section${classAttr} data-remark-slide-page="true" data-remark-slide-id="${escapeHtmlAttribute(slide.id)}" aria-label="Slide ${index + 1}">
${content || '<p data-remark-block="paragraph" data-remark-empty="true">Empty slide</p>'}
</section>`;
    }

    function applyCodeSyntaxHighlighting(previewDocument, options = {}) {
      if (!previewDocument) {
        return;
      }

      const candidates = new Set();
      previewDocument.querySelectorAll("pre").forEach((preElement) => {
        if (isHighlightableCodePre(preElement)) {
          candidates.add(preElement);
        }
      });

      candidates.forEach((preElement) => {
        highlightPreviewCodeBlock(preElement, options);
      });
    }

    function isHighlightableCodePre(preElement) {
      return isCodePreElement(preElement);
    }

    function isCodePreElement(preElement) {
      return Boolean(preElement && preElement.tagName === "PRE");
    }

    function resolveCodeBlockFromElement(element) {
      if (!element) {
        return null;
      }

      const preElement = element.closest("pre");
      return isHighlightableCodePre(preElement) ? preElement : null;
    }

    function ensureUnifiedCodeBlockStructure(preElement) {
      if (!preElement || preElement.tagName !== "PRE") {
        return;
      }

      const directCode = preElement.firstElementChild;
      if (directCode && directCode.tagName === "CODE" && preElement.children.length === 1) {
        preElement.textContent = directCode.textContent || "";
      }
    }

    function isCodeBlockFocused(preElement) {
      const activeElement = preElement?.ownerDocument?.activeElement;
      return Boolean(activeElement && (activeElement === preElement || preElement.contains(activeElement)));
    }

    function readCodeBlockContent(preElement) {
      return ((preElement.innerText || preElement.textContent) || "").replace(/\r\n?/g, "\n");
    }

    function getCodeBlockSelectionOffsets(preElement) {
      const selection = preElement?.ownerDocument?.defaultView?.getSelection?.();
      if (!selection || !selection.rangeCount) {
        return null;
      }

      const range = selection.getRangeAt(0);
      if (!preElement.contains(range.startContainer) || !preElement.contains(range.endContainer)) {
        return null;
      }

      const startRange = range.cloneRange();
      startRange.selectNodeContents(preElement);
      startRange.setEnd(range.startContainer, range.startOffset);

      const endRange = range.cloneRange();
      endRange.selectNodeContents(preElement);
