<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Presentation Live Editor</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f7fb;
      --bg-accent: rgba(15, 123, 255, 0.12);
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --surface: rgba(8, 15, 26, 0.04);
      --surface-strong: rgba(8, 15, 26, 0.08);
      --border: rgba(15, 23, 42, 0.12);
      --border-strong: rgba(15, 23, 42, 0.18);
      --text: #182033;
      --muted: #5d6b84;
      --accent: #0f7bff;
      --accent-strong: #095fd4;
      --accent-soft: rgba(15, 123, 255, 0.12);
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 10px;
      --control-height: 2.15rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09111c;
        --bg-accent: rgba(88, 166, 255, 0.12);
        --panel: rgba(12, 19, 31, 0.86);
        --panel-strong: rgba(15, 23, 37, 0.94);
        --surface: rgba(255, 255, 255, 0.03);
        --surface-strong: rgba(255, 255, 255, 0.06);
        --border: rgba(148, 163, 184, 0.16);
        --border-strong: rgba(148, 163, 184, 0.24);
        --text: #e6edf9;
        --muted: #9aa8c2;
        --accent: #58a6ff;
        --accent-strong: #7ec0ff;
        --accent-soft: rgba(88, 166, 255, 0.16);
        --shadow: 0 18px 45px rgba(2, 6, 23, 0.4);
        --shadow-soft: 0 10px 30px rgba(2, 6, 23, 0.3);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: "Aptos", "Segoe UI Variable", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, var(--bg-accent), transparent 36%),
        radial-gradient(circle at bottom right, rgba(63, 185, 80, 0.08), transparent 26%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.32;
      mix-blend-mode: soft-light;
    }

    .app button,
    .app textarea,
    .app select,
    .app input {
      font: inherit;
    }

    .app {
      height: 100dvh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      position: relative;
      isolation: isolate;
    }

    .topbar {
      display: flex;
      align-items: stretch;
      min-width: 0;
      padding: 0.5rem 0.75rem;
      background: rgba(10, 16, 27, 0.08);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.07);
      position: relative;
      z-index: 10;
    }

    .toolbar__label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.32rem 0.62rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: var(--shadow-soft);
      white-space: nowrap;
    }

    .toolbar {
      display: grid;
      grid-template-rows: repeat(2, minmax(0, auto));
      gap: 0.45rem;
      width: 100%;
      min-width: 0;
    }

    .toolbar__row {
      display: flex;
      align-items: stretch;
      gap: 0.45rem;
      min-width: 0;
      min-height: calc(var(--control-height) + 0.6rem);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border-strong) transparent;
    }

    .toolbar__row::-webkit-scrollbar {
      height: 0.45rem;
    }

    .toolbar__row::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 999px;
    }

    .toolbar__row::-webkit-scrollbar-track {
      background: transparent;
    }

    .toolbar__row > * {
      flex: 0 0 auto;
    }

    .toolbar__group {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.35rem;
      align-items: center;
      padding: 0.25rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow-soft);
      min-width: 0;
      flex: 0 0 auto;
    }

    .toolbar__group[hidden] {
      display: none;
    }

    .toolbar__group--status {
      margin-left: auto;
    }

    [hidden] {
      display: none !important;
    }

    #pageControlsGroup {
      flex: 0 0 clamp(14rem, 24vw, 22rem);
      min-width: 14rem;
      max-width: none;
    }

    #pageControlsGroup .toolbar-control {
      width: 100%;
      min-width: 0;
    }

    #pageControlsGroup .toolbar-control span {
      flex: 0 0 auto;
    }

    #pageControlsGroup select {
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      max-width: none;
    }

    .ghost-button,
    .primary-button,
    .toolbar-toggle {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.45rem 0.8rem;
      min-height: var(--control-height);
      font-weight: 600;
      font-size: 0.8rem;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
      transition:
        transform 160ms ease,
        background-color 160ms ease,
        border-color 160ms ease,
        box-shadow 160ms ease,
        color 160ms ease;
    }

    .ghost-button,
    .toolbar-toggle {
      color: var(--text);
      background: var(--panel);
      border-color: var(--border);
      box-shadow: var(--shadow-soft);
    }

    .ghost-button:hover,
    .ghost-button:focus-visible,
    .toolbar-toggle:hover,
    .toolbar-toggle:focus-visible {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .primary-button {
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 10px 22px rgba(15, 123, 255, 0.2);
    }

    .primary-button:hover,
    .primary-button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(15, 123, 255, 0.24);
    }

    .toolbar-toggle[aria-pressed="true"] {
      border-color: rgba(15, 123, 255, 0.32);
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .toolbar-toggle:disabled,
    .toolbar-control input:disabled,
    .toolbar-control select:disabled,
    .toolbar-control button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .ghost-button:focus-visible,
    .primary-button:focus-visible,
    .toolbar-toggle:focus-visible,
    .toolbar-control select:focus-visible,
    .toolbar-control input:focus-visible,
    .source-input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .toolbar-control {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-height: var(--control-height);
      padding: 0.22rem 0.42rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(8, 15, 26, 0.03);
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1;
      min-width: 0;
      flex: 0 0 auto;
    }

    .toolbar-control span {
      font-weight: 600;
      white-space: nowrap;
    }

    .toolbar-control select,
    .toolbar-control input[type="number"],
    .toolbar-control input[type="color"],
    .toolbar-control input[type="text"] {
      height: 1.6rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-strong);
      color: var(--text);
      padding: 0 0.6rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      font-size: 0.76rem;
      min-width: 0;
    }

    .toolbar-control input[type="number"] {
      width: 4rem;
    }

    .toolbar-control input[type="text"] {
      width: 8.5rem;
    }

    .toolbar-control input[type="color"] {
      width: 2rem;
      min-width: 2rem;
      padding: 0.08rem;
      border-radius: 999px;
      cursor: pointer;
    }

    .toolbar-control select {
      max-width: 8.75rem;
    }

    .toolbar-control--wide select {
      min-width: 6.8rem;
    }

    #textControlsGroup,
    #imageControlsGroup {
      min-width: max-content;
    }

    .workspace {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-columns: minmax(18rem, var(--source-pane-size, 30rem)) 0.7rem minmax(0, 1fr);
      gap: 0.4rem;
      padding: 0.75rem;
      transition: grid-template-columns 220ms ease;
      overflow: hidden;
    }

    .workspace.is-collapsed {
      grid-template-columns: 0 0 minmax(0, 1fr);
    }

    .panel {
      height: 100%;
      min-height: 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.62rem 0.84rem 0.56rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel-strong);
      flex-shrink: 0;
    }

    .panel__header h2 {
      margin: 0 0 0.16rem;
      font-size: 0.92rem;
      line-height: 1.2;
    }

    .panel__header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.35;
    }

    .panel__header p[hidden],
    .helper-row[hidden] {
      display: none;
    }

    .helper-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.28rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(15, 123, 255, 0.08);
      color: var(--muted);
      white-space: nowrap;
      font-size: 0.72rem;
    }

    .source-panel {
      position: relative;
      transition:
        opacity 200ms ease,
        transform 200ms ease,
        border-color 200ms ease;
    }

    .workspace.is-collapsed .source-panel {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-18px);
      border-color: transparent;
    }

    .source-panel__body,
    .preview-panel__body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow: hidden;
      padding: 0.68rem;
    }

    .preview-panel__body {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 32%),
        rgba(15, 23, 42, 0.025);
    }

    .preview-split {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 0.4rem;
    }

    .preview-split.is-notes-visible {
      grid-template-rows: minmax(14rem, 1fr) 0.7rem minmax(10rem, var(--presenter-notes-size, 14rem));
    }

    .pane-divider {
      position: relative;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: col-resize;
      min-width: 0;
      min-height: 0;
      touch-action: none;
      user-select: none;
    }

    .pane-divider::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(15, 123, 255, 0.16), rgba(15, 123, 255, 0.08));
      border: 1px solid rgba(15, 123, 255, 0.16);
      transition: background-color 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .pane-divider:hover::before,
    .pane-divider:focus-visible::before,
    .pane-divider.is-dragging::before {
      background: linear-gradient(180deg, rgba(15, 123, 255, 0.28), rgba(15, 123, 255, 0.16));
      border-color: rgba(15, 123, 255, 0.28);
      transform: scale(1.02);
    }

    .pane-divider--horizontal {
      cursor: row-resize;
    }

    .workspace.is-collapsed #workspaceResizeHandle {
      opacity: 0;
      pointer-events: none;
    }

    .presenter-notes-panel {
      min-height: 0;
    }

    .presenter-notes-panel .source-panel__body {
      padding-top: 0.65rem;
    }

    .helper-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.72rem;
    }

    #sourceContextHint[hidden] + #sourceStats {
      margin-left: auto;
    }

    .source-input {
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: rgba(8, 15, 26, 0.05);
      color: var(--text);
      padding: 1rem;
      resize: none;
      line-height: 1.55;
      tab-size: 2;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .preview-stage {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background:
        radial-gradient(circle at top center, rgba(15, 123, 255, 0.07), transparent 32%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(15, 23, 42, 0.03));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .preview-frame {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      border-radius: inherit;
      background: #ffffff;
    }

    .status {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1260px) {
      #pageControlsGroup {
        flex-basis: 18rem;
      }
    }

    @media (max-width: 980px) {
      .topbar {
        padding: 0.45rem 0.55rem;
      }

      .toolbar,
      .toolbar__row {
        gap: 0.35rem;
      }

      #pageControlsGroup {
        flex-basis: 13rem;
        min-width: 13rem;
      }

      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(16rem, 38dvh) minmax(0, 1fr);
      }

      .workspace.is-collapsed {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr);
      }

      #workspaceResizeHandle,
      #notesResizeHandle {
        display: none;
      }

      .workspace.is-collapsed .preview-panel {
        grid-row: 1;
      }

      .source-panel,
      .workspace.is-collapsed .source-panel {
        opacity: 1;
        pointer-events: auto;
        transform: none;
        border-color: var(--border);
      }

      .workspace.is-collapsed .source-panel {
        display: none;
      }

      .preview-split.is-notes-visible {
        grid-template-rows: minmax(12rem, 1fr) minmax(10rem, auto);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="toolbar" aria-label="Editor toolbar">
        <div class="toolbar__row toolbar__row--primary">
          <span class="toolbar__label">Live HTML Editor</span>

          <div class="toolbar__group">
            <button class="ghost-button" id="toggleSourceButton" type="button" aria-expanded="true" aria-controls="sourcePanel">Hide Source</button>
            <button class="ghost-button" id="importHtmlButton" type="button">Import HTML</button>
            <button class="ghost-button" id="newHtmlButton" type="button">New HTML</button>
            <button class="ghost-button" id="newRemarkButton" type="button">New Remark Deck</button>
            <button class="ghost-button" id="newPageButton" type="button">New Page</button>
            <button class="ghost-button" id="addTextButton" type="button">Add Text</button>
            <button class="ghost-button" id="addImageButton" type="button">Add Image</button>
            <button class="primary-button" id="exportButton" type="button">Export HTML</button>
          </div>

          <div class="toolbar__group toolbar__group--status">
            <span class="helper-pill" id="modeBadge">Mode: Normal HTML</span>
          </div>
        </div>

        <div class="toolbar__row toolbar__row--context">
          <div class="toolbar__group" id="pageControlsGroup">
            <label class="toolbar-control toolbar-control--wide">
              <span id="pageSelectLabel">Page</span>
              <select id="pageSelect"></select>
            </label>
          </div>

          <div class="toolbar__group" id="deleteControlsGroup">
            <button class="ghost-button" id="deleteElementButton" type="button" disabled>Delete Element</button>
            <button class="ghost-button" id="deletePageButton" type="button" disabled>Delete Page</button>
          </div>

          <div class="toolbar__group" id="remarkMetaGroup" hidden>
            <label class="toolbar-control">
              <span>Class</span>
              <input id="slideClassControl" type="text" placeholder="middle, center" spellcheck="false">
            </label>
          </div>

          <div class="toolbar__group" id="textControlsGroup" hidden>
            <label class="toolbar-control toolbar-control--wide">
              <span>Font</span>
              <select id="fontFamilyControl">
                <option value="Aptos, 'Segoe UI Variable', 'Segoe UI', sans-serif">Aptos</option>
                <option value="'Trebuchet MS', 'Segoe UI', sans-serif">Trebuchet</option>
                <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                <option value="'Courier New', monospace">Courier</option>
                <option value="inherit">Inherit</option>
              </select>
            </label>

            <label class="toolbar-control">
              <span>Size</span>
              <input id="fontSizeControl" type="number" min="10" max="160" step="1" value="28">
            </label>

            <label class="toolbar-control">
              <span>Weight</span>
              <select id="fontWeightControl">
                <option value="400">400</option>
                <option value="500">500</option>
                <option value="600">600</option>
                <option value="700">700</option>
                <option value="800">800</option>
              </select>
            </label>

            <label class="toolbar-control">
              <span>Text</span>
              <input id="textColorControl" type="color" value="#14213d">
            </label>

            <label class="toolbar-control">
              <span>Bg</span>
              <input id="backgroundColorControl" type="color" value="#ffffff">
            </label>

            <label class="toolbar-control">
              <span>Align</span>
              <select id="textAlignControl">
                <option value="left">Left</option>
                <option value="center">Center</option>
                <option value="right">Right</option>
                <option value="justify">Justify</option>
              </select>
            </label>

            <button class="toolbar-toggle" id="italicButton" type="button" aria-pressed="false">Italic</button>
            <button class="toolbar-toggle" id="underlineButton" type="button" aria-pressed="false">Underline</button>
          </div>

          <div class="toolbar__group" id="imageControlsGroup" hidden>
            <button class="ghost-button" id="replaceImageButton" type="button">Replace</button>

            <label class="toolbar-control">
              <span>Width</span>
              <input id="imageWidthControl" type="number" min="1" step="1" value="320">
            </label>

            <label class="toolbar-control">
              <span>Height</span>
              <input id="imageHeightControl" type="number" min="1" step="1" value="220">
            </label>

            <label class="toolbar-control">
              <span>Radius</span>
              <input id="imageRadiusControl" type="number" min="0" step="1" value="20">
            </label>

            <label class="toolbar-control">
              <span>Opacity</span>
              <input id="imageOpacityControl" type="number" min="0" max="100" step="1" value="100">
            </label>

            <label class="toolbar-control">
              <span>Rotate</span>
              <input id="imageRotateControl" type="number" min="-360" max="360" step="1" value="0">
            </label>

            <label class="toolbar-control">
              <span>Fit</span>
              <select id="imageObjectFitControl">
                <option value="cover">Cover</option>
                <option value="contain">Contain</option>
                <option value="fill">Fill</option>
                <option value="none">None</option>
                <option value="scale-down">Scale Down</option>
              </select>
            </label>

            <label class="toolbar-control">
              <span>Filter</span>
              <select id="imageFilterControl">
                <option value="none">None</option>
                <option value="soft">Soft</option>
                <option value="dramatic">Dramatic</option>
                <option value="grayscale">Grayscale</option>
                <option value="warm">Warm</option>
                <option value="cool">Cool</option>
              </select>
            </label>
          </div>

          <div class="toolbar__group" id="presenterViewGroup" hidden>
            <button class="toolbar-toggle" id="presenterViewButton" type="button" aria-pressed="false">Presenter View</button>
          </div>
        </div>
      </div>
    </header>

    <main class="workspace" id="workspace">
      <section class="panel source-panel" id="sourcePanel">
        <div class="panel__header">
          <div>
            <h2 id="sourcePanelTitle">Source HTML</h2>
            <p id="sourcePanelDescription" hidden></p>
          </div>
          <span class="helper-pill" id="sanitizationBadge">Safe preview ready</span>
        </div>

        <div class="source-panel__body">
          <div class="helper-row">
            <span id="sourceContextHint" hidden></span>
            <span id="sourceStats">0 characters</span>
          </div>

          <label class="sr-only" for="sourceInput">Editor source</label>
          <textarea class="source-input" id="sourceInput" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
        </div>
      </section>

      <button class="pane-divider pane-divider--vertical" id="workspaceResizeHandle" type="button" aria-label="Resize source and preview panels" title="Drag to resize source and preview panels"></button>

      <section class="panel preview-panel">
        <div class="panel__header">
          <div>
            <h2>Live Preview</h2>
            <p id="previewPanelDescription" hidden></p>
          </div>
          <span class="helper-pill" id="editorStatus">Ready</span>
        </div>

        <div class="preview-panel__body">
          <div class="helper-row" id="previewHintRow" hidden>
            <span class="status" id="previewHint"></span>
          </div>

    function bindResizeHandles() {
      bindPaneResize(workspaceResizeHandle, {
        axis: "x",
        getContainer: () => workspace,
        isEnabled: () => !workspace.classList.contains("is-collapsed") && window.innerWidth > 980,
        getValue: () => appState.sourcePaneSize,
        getBounds: (rect) => ({
          min: 320,
          max: Math.max(420, rect.width - 360)
        }),
        project: (event, rect) => event.clientX - rect.left,
        apply: (value) => {
          appState.sourcePaneSize = Math.round(value);
          applyWorkspacePreferences();
          persistWorkspacePreference(STORAGE_KEYS.sourcePaneSize, appState.sourcePaneSize);
        }
      });

      bindPaneResize(notesResizeHandle, {
        axis: "y",
        getContainer: () => previewSplit,
        isEnabled: () => isRemarkMode() && appState.presenterView && window.innerWidth > 980,
        getValue: () => appState.notesPaneSize,
        getBounds: (rect) => ({
          min: 160,
          max: Math.max(220, rect.height - 220)
        }),
        project: (event, rect) => rect.bottom - event.clientY,
        apply: (value) => {
          appState.notesPaneSize = Math.round(value);
          applyWorkspacePreferences();
          persistWorkspacePreference(STORAGE_KEYS.notesPaneSize, appState.notesPaneSize);
        }
      });
    }

    function bindPaneResize(handle, options) {
      handle.addEventListener("pointerdown", (event) => {
        if (!options.isEnabled()) {
          return;
        }

        const container = options.getContainer();
        if (!container) {
          return;
        }

        event.preventDefault();
        const rect = container.getBoundingClientRect();
        const bounds = options.getBounds(rect);
        handle.classList.add("is-dragging");
        document.body.style.userSelect = "none";
        handle.setPointerCapture?.(event.pointerId);

        const onMove = (moveEvent) => {
          const projected = options.project(moveEvent, rect);
          const clamped = clamp(projected, bounds.min, bounds.max);
          options.apply(clamped);
        };

        const onUp = () => {
          handle.classList.remove("is-dragging");
          document.body.style.userSelect = "";
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          window.removeEventListener("pointercancel", onUp);
        };

        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
        window.addEventListener("pointercancel", onUp);
      });
    }

    function restoreWorkspacePreferences() {
      appState.sourcePaneSize = readNumberPreference(STORAGE_KEYS.sourcePaneSize, 480);
      appState.notesPaneSize = readNumberPreference(STORAGE_KEYS.notesPaneSize, 224);
      appState.presenterView = readBooleanPreference(STORAGE_KEYS.presenterView, false);
    }

    function applyWorkspacePreferences() {
      const workspaceRect = workspace.getBoundingClientRect();
      const previewSplitRect = previewSplit.getBoundingClientRect();
      const maxSourcePaneSize = workspaceRect.width > 0 ? Math.max(420, workspaceRect.width - 360) : appState.sourcePaneSize;
      const maxNotesPaneSize = previewSplitRect.height > 0 ? Math.max(220, previewSplitRect.height - 220) : appState.notesPaneSize;
      const sourcePaneSize = clamp(appState.sourcePaneSize, 320, maxSourcePaneSize);
      const notesPaneSize = clamp(appState.notesPaneSize, 160, maxNotesPaneSize);

      workspace.style.setProperty("--source-pane-size", `${Math.round(sourcePaneSize)}px`);
      previewSplit.style.setProperty("--presenter-notes-size", `${Math.round(notesPaneSize)}px`);
    }

    function handleWindowResize() {
      applyWorkspacePreferences();
      updatePresenterViewUi();
      scheduleOverlayRefresh();
    }

    function persistWorkspacePreference(key, value) {
      try {
        localStorage.setItem(key, String(value));
      } catch (error) {
        // Ignore storage failures and keep session-only state.
      }
    }

    function readNumberPreference(key, fallback) {
      try {
        const value = Number(localStorage.getItem(key));
        return Number.isFinite(value) && value > 0 ? value : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function readBooleanPreference(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        if (value === null) {
          return fallback;
        }

        return value === "true";
      } catch (error) {
        return fallback;
      }
    }

    function confirmResetDocument(message) {
      return !hasMeaningfulContent() || window.confirm(message);
    }

    function hasMeaningfulContent() {
      const value = sourceInput.value.trim();
      if (!value) {
        return false;
      }

      if (isRemarkMode()) {
        return value !== DEFAULT_REMARK_SOURCE.trim();
      }

      return value !== STARTER_HTML.trim();
    }

    function isRemarkMode() {
      return appState.documentModel?.mode === "remark-slideshow";
    }

    function setSourceCollapsed(shouldCollapse) {
      workspace.classList.toggle("is-collapsed", shouldCollapse);
      toggleSourceButton.setAttribute("aria-expanded", String(!shouldCollapse));
      toggleSourceButton.textContent = shouldCollapse ? "Show Source" : "Hide Source";

    function createDefaultRemarkModel() {

      }

      return {
        widthCss: "min(1120px, calc(100% - 32px))",
        minHeightPx: 720,
        paddingCss: "36px",
        backgroundCss: "#ffffff",
        borderCss: "1px solid rgba(20, 33, 61, 0.08)",

        setPreviewPanelDescription("");

        setSourceContextHint("");

    function handleHtmlImport(event) {
      const file = event.target.files && event.target.files[0];

      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        if (typeof reader.result !== "string") {
          return;
        }

        clearSelection(false);
        appState.selectedPage = null;

        if (detectRemarkHtml(reader.result)) {
          loadRemarkDocumentFromHtml(reader.result, { fileName: file.name || "remark_deck.html" });
          editorStatus.textContent = `Imported ${file.name} in remark mode`;
          setPreviewHint("");
        } else {
          loadNormalDocument(reader.result, { fileName: file.name || "edited_presentation.html" });
          editorStatus.textContent = `Imported ${file.name}`;
          setPreviewHint("Imported HTML is now the preview source. The same sanitizer used for pasted HTML is applied before rendering.");
        }
      };

      reader.readAsText(file);
      htmlImportPicker.value = "";
    }

    function commitSourceInputToModel() {
      window.clearTimeout(appState.renderTimer);
      appState.renderTimer = null;

      const rawValue = sourceInput.value;
      if (isRemarkMode()) {
        const selectedSlide = getCurrentRemarkSlide();
        appState.pendingSelection = {
          remarkSlideId: selectedSlide?.id || null,
          index: getActivePageIndex()
        };
        appState.documentModel.slides = parseRemarkDeckSource(rawValue);
        ensureRemarkSlidesExist(appState.documentModel);
        renderCurrentDocument();
        editorStatus.textContent = "Rendered remark source";
        setPreviewHint("Slide separators, metadata, and markdown-like content have been re-parsed into editable slides.");
        return;
      }

      if (detectRemarkHtml(rawValue)) {
        loadRemarkDocumentFromHtml(rawValue, { fileName: appState.exportFileName || "remark_deck.html" });
        editorStatus.textContent = "Switched to remark slideshow mode";
        setPreviewHint("A remark-style wrapper was detected automatically, so the editor is now treating the file as a slide deck.");
        return;
      }

      appState.documentModel.rawHtml = rawValue;
      renderCurrentDocument();
    }

    function renderCurrentDocument() {
      clearSelection(false);
      appState.selectedPage = null;
      updateModeUi();

      if (isRemarkMode()) {
        renderRemarkPreview();
      } else {
        renderNormalPreview();
      }

    function renderNormalPreview() {
      const rawHtml = appState.documentModel?.rawHtml || "";

      if (detectRemarkHtml(rawHtml)) {
        loadRemarkDocumentFromHtml(rawHtml, { fileName: appState.exportFileName || "remark_deck.html" });
        return;
      }

      const sanitizedDocument = sanitizeHtmlDocument(rawHtml);
      appState.lastDoctype = sanitizedDocument.doctype;
      const previewMarkup = buildPreviewMarkup(sanitizedDocument.document);

      editorStatus.textContent = "Rendering preview";
      setPreviewHint("");
      sanitizationBadge.textContent = buildSanitizationLabel(sanitizedDocument.stats);

      previewFrame.onload = () => {
        decoratePreviewDocument();
        editorStatus.textContent = "Preview ready";
      };

      previewFrame.srcdoc = previewMarkup;
    }

    function renderRemarkPreview() {
      const previewMarkup = buildRemarkPreviewMarkup(appState.documentModel);
      editorStatus.textContent = "Rendering remark preview";
      setPreviewHint("Slides are editable pages. Use the source panel for raw slide structure, or edit visible content directly.");
      sanitizationBadge.textContent = "Remark slideshow mode";

      previewFrame.onload = () => {
        decoratePreviewDocument();
        editorStatus.textContent = "Remark preview ready";
      };

      previewFrame.srcdoc = previewMarkup;
    }

    function sanitizeHtmlDocument(rawHtml) {
      const parser = new DOMParser();
      const documentNode = parser.parseFromString(rawHtml || "", "text/html");
      const stats = createSanitizationStats();
      sanitizeDocumentNode(documentNode, stats);
      ensureDocumentShape(documentNode);

      return {
        document: documentNode,
        doctype: extractDoctype(rawHtml) || serializeDoctype(documentNode),
        stats
      };
    }

    function createSanitizationStats() {
      return {
        scriptsRemoved: 0,
        handlersRemoved: 0,
        dangerousLinksNeutralized: 0,
        refreshTagsRemoved: 0
      };
    }

    function sanitizeDocumentNode(documentNode, stats) {
      documentNode.querySelectorAll("script").forEach((script) => {
        stats.scriptsRemoved += 1;
        script.remove();
      });

      documentNode.querySelectorAll('meta[http-equiv="refresh" i]').forEach((meta) => {
        stats.refreshTagsRemoved += 1;
        meta.remove();
      });

      documentNode.querySelectorAll("*").forEach((element) => {
        Array.from(element.attributes).forEach((attribute) => {
          const name = attribute.name.toLowerCase();
          const value = attribute.value.trim();

          if (name.startsWith("on")) {
            stats.handlersRemoved += 1;
            element.removeAttribute(attribute.name);
          }

          if ((name === "href" || name === "xlink:href") && /^javascript:/i.test(value)) {
            stats.dangerousLinksNeutralized += 1;
            element.setAttribute(attribute.name, "#");
          }
        });
      });
    }

    function sanitizeHtmlFragment(rawHtml) {
      const parser = new DOMParser();
      const documentNode = parser.parseFromString(`<!DOCTYPE html><html><body>${rawHtml || ""}</body></html>`, "text/html");
      const stats = createSanitizationStats();
      sanitizeDocumentNode(documentNode, stats);
      return {
        html: documentNode.body.innerHTML,
        stats
      };
    }

    function ensureDocumentShape(documentNode) {
      if (!documentNode.head) {
        const head = documentNode.createElement("head");
        documentNode.documentElement.insertBefore(head, documentNode.body || null);
      }

      if (!documentNode.body) {
        const body = documentNode.createElement("body");
        documentNode.documentElement.appendChild(body);
      }
    }

    function extractDoctype(rawHtml) {
      const match = String(rawHtml || "").match(/^\s*(<!doctype[^>]+>)/i);
      return match ? match[1] : "";
    }

    function serializeDoctype(documentNode) {
      const doctype = documentNode.doctype;

      if (!doctype) {
        return "<!DOCTYPE html>";
      }

      if (doctype.publicId && doctype.systemId) {
        return `<!DOCTYPE ${doctype.name} PUBLIC "${doctype.publicId}" "${doctype.systemId}">`;
      }

      if (doctype.publicId) {
        return `<!DOCTYPE ${doctype.name} PUBLIC "${doctype.publicId}">`;
      }

      if (doctype.systemId) {
        return `<!DOCTYPE ${doctype.name} SYSTEM "${doctype.systemId}">`;
      }

      return `<!DOCTYPE ${doctype.name}>`;
    }

    function buildPreviewMarkup(documentNode) {
      const previewDocument = documentNode.cloneNode(true);
      const editorStyleRange = previewDocument.createRange();
      const styleFragment = editorStyleRange.createContextualFragment(EDITOR_STYLE);
      previewDocument.head.appendChild(styleFragment);
      return `${appState.lastDoctype}\n${previewDocument.documentElement.outerHTML}`;
    }

    function buildRemarkPreviewMarkup(model) {
      const slidesMarkup = model.slides.map((slide, index) => {
        return buildRemarkSlideMarkup(slide, index);
      }).join("\n");

      return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remark Preview</title>
  ${EDITOR_STYLE}
</head>
<body data-editor-preview="true" data-editor-multipage="true" data-editor-mode="remark-slideshow">
${slidesMarkup}
</body>
</html>`;
    }

    function buildRemarkSlideMarkup(slide, index) {
      const classes = extractRemarkClasses(getSlideDirectiveValue(slide, "class"));
      const classAttr = classes.length ? ` class="remark-editor-slide ${classes.join(" ")}"` : ` class="remark-editor-slide"`;
      const content = renderRemarkSlideBody(slide.bodySource || "");

      return `<section${classAttr} data-remark-slide-page="true" data-remark-slide-id="${escapeHtmlAttribute(slide.id)}" aria-label="Slide ${index + 1}">
${content || '<p data-remark-block="paragraph" data-remark-empty="true">Empty slide</p>'}
</section>`;
    }

    function decoratePreviewDocument() {
      const previewDocument = previewFrame.contentDocument;

      if (!previewDocument) {
        return;
      }

      previewDocument.documentElement.setAttribute("data-editor-preview-root", "true");
      previewDocument.body.setAttribute("data-editor-preview", "true");
      previewDocument.body.setAttribute("data-editor-mode", isRemarkMode() ? "remark-slideshow" : "normal-html");
      initializePageModel(previewDocument);
      syncDocumentPageDefaultsFromPreview(previewDocument);
      applyDocumentPageDefaults(previewDocument);
      markInteractiveNodes(previewDocument);
      ensureEditorOverlay(previewDocument);
      bindPreviewEvents(previewDocument);

      const initialPage = resolvePendingPage(previewDocument) || ensureCurrentPage(previewDocument, true);
      if (initialPage) {
        setCurrentPage(initialPage, { scroll: false });
      }

      updatePagePicker(previewDocument);
      updateToolbarState();
      refreshSelectionOverlay();
      appState.pendingSelection = null;
    }

    function initializePageModel(previewDocument) {
      if (isRemarkMode()) {
        initializeRemarkPageModel(previewDocument);
        return;
      }

      const body = previewDocument.body;
      const pages = findPageRoots(previewDocument);

      body.removeAttribute("data-editor-multipage");
      body.removeAttribute("data-editor-page");
      body.removeAttribute("data-editor-page-kind");
      body.removeAttribute("data-editor-page-label");
      body.removeAttribute("data-editor-page-id");
      body.removeAttribute("data-editor-page-active");

      previewDocument.querySelectorAll("[data-editor-page='true']").forEach((page) => {
        if (page !== body) {
          page.removeAttribute("data-editor-page");
          page.removeAttribute("data-editor-page-kind");
          page.removeAttribute("data-editor-page-label");
          page.removeAttribute("data-editor-page-active");
        }
      });

      if (!pages.length) {
        markPage(body, 0, "implicit");
        applySlideTypographyBaseline(previewDocument, [body], false);
        return;
      }

      if (pages.length > 1) {
        body.setAttribute("data-editor-multipage", "true");
      }

      pages.forEach((page, index) => {
        const kind = page.hasAttribute("data-builder-page") ? "builder" : "explicit";
        markPage(page, index, kind);
      });

      applySlideTypographyBaseline(previewDocument, pages, shouldApplySlideTypographyBaseline(previewDocument, pages));
    }

    function initializeRemarkPageModel(previewDocument) {
      const body = previewDocument.body;
      body.setAttribute("data-editor-multipage", "true");
      const pages = Array.from(previewDocument.querySelectorAll("[data-remark-slide-page='true']"));

      previewDocument.querySelectorAll("[data-editor-page='true']").forEach((page) => {
        page.removeAttribute("data-editor-page");
        page.removeAttribute("data-editor-page-kind");
        page.removeAttribute("data-editor-page-label");
        page.removeAttribute("data-editor-page-active");
      });

      pages.forEach((page, index) => {
        markPage(page, index, "remark");
      });
    }

    function resolvePendingPage(previewDocument) {
      const pending = appState.pendingSelection;
      if (!pending) {
        return null;
      }

      const pages = getPageElements(previewDocument);
      if (!pages.length) {
        return null;
      }

      if (pending.remarkSlideId) {
        const match = pages.find((page) => page.getAttribute("data-remark-slide-id") === pending.remarkSlideId);
        if (match) {
          return match;
        }
      }

      if (typeof pending.index === "number" && pending.index >= 0) {
        return pages[Math.min(pending.index, pages.length - 1)] || null;
      }

      if (pending.pageId) {
        return pages.find((page) => page.getAttribute("data-editor-page-id") === pending.pageId) || null;
      }

      return null;
    }

    function shouldApplySlideTypographyBaseline(previewDocument, pages) {
      if (pages.length < 2) {
        return false;
      }

      if (previewDocument.querySelector("style, link[rel='stylesheet']")) {
        return false;
      }

      return !previewDocument.querySelector(
        "[style*='font-size'], [style*='font-family'], [style*='font-weight'], [style*='line-height'], [style*='letter-spacing']"
      );
    }

    function applySlideTypographyBaseline(previewDocument, pages, shouldApply) {
      previewDocument.querySelectorAll("[data-editor-slide-baseline='true']").forEach((page) => {
        page.removeAttribute("data-editor-slide-baseline");
      });

      if (!shouldApply) {
        return;
      }

      pages.forEach((page) => {
        page.setAttribute("data-editor-slide-baseline", "true");
      });
    }

    function findPageRoots(previewDocument) {
      const children = Array.from(previewDocument.body.children).filter((child) => {
        return !child.matches("[data-editor-overlay-root='true'], script, style");
      });

      if (!children.length) {
        return [];
      }

      const explicit = children.filter((child) => {
        const hints = [
          child.id,
          child.className,
          child.getAttribute("data-page"),
          child.getAttribute("data-slide"),
          child.getAttribute("aria-label")
        ].filter(Boolean).join(" ");

        return child.hasAttribute("data-builder-page") || PAGE_HINT_PATTERN.test(hints);
      });

      if (explicit.length >= 2) {
        return explicit;
      }

      if (explicit.length === 1 && children.length === 1) {
        return explicit;
      }

      if (!explicit.length && children.length >= 2 && children.every(isStructuralPageSized)) {
        return children;
      }

      return explicit;
    }

    function isStructuralPageSized(element) {
      if (!["SECTION", "ARTICLE", "DIV", "MAIN"].includes(element.tagName)) {
        return false;
      }

      const computed = previewFrame.contentWindow.getComputedStyle(element);
      const rect = element.getBoundingClientRect();
      const breakAfter = `${computed.breakAfter || ""} ${computed.pageBreakAfter || ""}`;

      return rect.height >= 480 || /page|always/i.test(breakAfter);
    }

    function markPage(page, index, kind) {
      page.setAttribute("data-editor-page", "true");
      page.setAttribute("data-editor-page-kind", kind);
      page.setAttribute("data-editor-page-label", `${isRemarkMode() ? "Slide" : "Page"} ${index + 1}`);

      if (!page.getAttribute("data-editor-page-id")) {
        appState.pageCounter += 1;
        page.setAttribute("data-editor-page-id", `page-${appState.pageCounter}`);
      }

      if (page !== page.ownerDocument.body) {
        const computed = previewFrame.contentWindow.getComputedStyle(page);
        if (computed.position === "static") {
          page.style.position = "relative";
        }
      }
    }

    function markInteractiveNodes(previewDocument) {
      const nodes = [previewDocument.body, ...previewDocument.body.querySelectorAll("*")];

      nodes.forEach((element) => {
        if (element.matches("[data-editor-overlay-root='true'], [data-editor-overlay-root='true'] *")) {
          return;
        }

        element.removeAttribute("data-editor-selectable");
        element.removeAttribute("data-editor-text-editable");
        element.removeAttribute("data-editor-image");

        if (element !== previewDocument.body) {
          element.removeAttribute("contenteditable");
          element.removeAttribute("spellcheck");
        }

        if (element.tagName === "IMG") {
          element.setAttribute("data-editor-selectable", "true");
          element.setAttribute("data-editor-image", "true");
          return;
        }

        if (element !== previewDocument.body && isTextEditableElement(element)) {
          element.setAttribute("data-editor-selectable", "true");
          element.setAttribute("data-editor-text-editable", "true");
          element.setAttribute("contenteditable", "true");
          element.setAttribute("spellcheck", "false");
          return;
        }

        if (element !== previewDocument.body && isSelectableElement(element)) {
          element.setAttribute("data-editor-selectable", "true");
        }
      });
    }

    function isTextEditableElement(element) {
      if (!TEXT_EDITABLE_TAGS.has(element.tagName)) {
        return false;
      }

      if (element.matches("[data-editor-page='true']")) {
        return false;
      }

      if (element.closest("[data-editor-text-editable='true']")) {
        return false;
      }

      if (INLINE_FORMATTING_TAGS.has(element.tagName) && element.parentElement?.matches("[data-editor-text-editable='true']")) {
        return false;
      }

      const text = element.textContent.replace(/\s+/g, " ").trim();
      if (!text && element.tagName !== "PRE" && element.tagName !== "CODE") {
        return false;
      }

      if (element.tagName === "DIV") {
        return hasMeaningfulDirectText(element) &&
          !element.querySelector(STRUCTURAL_DESCENDANTS.map((tag) => tag.toLowerCase()).join(","));
      }

      if (/^H[1-6]$/.test(element.tagName) || element.tagName === "P" || element.tagName === "LI" || element.tagName === "BLOCKQUOTE") {
        return !element.querySelector("p, h1, h2, h3, h4, h5, h6, li, blockquote");
      }

      return true;
    }

    function hasMeaningfulDirectText(element) {
      return Array.from(element.childNodes).some((child) => {
        return child.nodeType === Node.TEXT_NODE && child.textContent.trim();
      });
    }

    function isSelectableElement(element) {
      if (NON_SELECTABLE_TAGS.has(element.tagName)) {
        return false;
      }

      if (element.matches("[data-editor-page='true']")) {
        return true;
      }

      if (INLINE_FORMATTING_TAGS.has(element.tagName) && element.closest("[data-editor-text-editable='true']")) {
        return false;
      }

      const computed = previewFrame.contentWindow.getComputedStyle(element);
      if (computed.display === "none" || computed.visibility === "hidden") {
        return false;
      }

      const meaningfulText = element.textContent.replace(/\s+/g, " ").trim();
      const hasRenderableChild = Array.from(element.children).some((child) => {
        return !NON_SELECTABLE_TAGS.has(child.tagName) && child.getBoundingClientRect().width + child.getBoundingClientRect().height > 0;
      });

      return Boolean(meaningfulText || hasRenderableChild);
    }

    function ensureEditorOverlay(previewDocument) {
      if (previewDocument.querySelector("[data-editor-overlay-root='true']")) {
        return;
      }

      const root = previewDocument.createElement("div");
      root.setAttribute("data-editor-overlay-root", "true");
      root.innerHTML = `
        <div data-editor-guide-layer="true"></div>
        <div data-editor-selection-box="true">
          <button type="button" data-editor-move-handle="true">Move</button>
        </div>
      `;
      previewDocument.body.appendChild(root);
    }

    function renderAlignmentGuides(previewDocument, guides) {
      const guideLayer = previewDocument?.querySelector("[data-editor-guide-layer='true']");
      if (!guideLayer) {
        appState.activeAlignmentGuides = null;
        return;
      }

      if (!Array.isArray(guides) || !guides.length) {
        appState.activeAlignmentGuides = null;
        guideLayer.replaceChildren();
        return;
      }

      appState.activeAlignmentGuides = guides.map((guide) => ({ ...guide }));
      const nodes = guides.map((guide) => {
        const line = previewDocument.createElement("div");
        const start = Math.round(Math.min(guide.start, guide.end));
        const end = Math.round(Math.max(guide.start, guide.end));
        line.setAttribute("data-editor-guide-line", "true");
        line.setAttribute("data-axis", guide.axis);

        if (guide.axis === "x") {
          line.style.left = `${Math.round(guide.position - ALIGNMENT_GUIDE_THICKNESS / 2)}px`;
          line.style.top = `${start}px`;
          line.style.width = `${ALIGNMENT_GUIDE_THICKNESS}px`;
          line.style.height = `${Math.max(1, end - start)}px`;
        } else {
          line.style.left = `${start}px`;
          line.style.top = `${Math.round(guide.position - ALIGNMENT_GUIDE_THICKNESS / 2)}px`;
          line.style.width = `${Math.max(1, end - start)}px`;
          line.style.height = `${ALIGNMENT_GUIDE_THICKNESS}px`;
        }

        return line;
      });

      guideLayer.replaceChildren(...nodes);
    }

    function clearAlignmentGuides(previewDocument = previewFrame.contentDocument) {
      appState.activeAlignmentGuides = null;
      previewDocument?.querySelector("[data-editor-guide-layer='true']")?.replaceChildren();
    }

    function bindPreviewEvents(previewDocument) {
      previewDocument.addEventListener("click", handlePreviewClick);
      previewDocument.addEventListener("dblclick", handlePreviewDoubleClick);
      previewDocument.addEventListener("pointerdown", handlePreviewPointerDown);
      previewDocument.addEventListener("input", handlePreviewMutation);
      previewDocument.addEventListener("blur", handlePreviewMutation, true);
      previewDocument.addEventListener("keydown", handlePreviewKeydown);
      previewDocument.addEventListener("submit", (event) => event.preventDefault());
      previewDocument.addEventListener("scroll", scheduleOverlayRefresh, true);
      previewFrame.contentWindow.addEventListener("resize", scheduleOverlayRefresh);
    }

    function handlePreviewClick(event) {
      const target = getEventTargetElement(event);
      const previewDocument = previewFrame.contentDocument;

      if (!target || !previewDocument) {
        return;
      }

      if (target.closest("[data-editor-overlay-root='true']")) {
        return;
      }

      const link = target.closest("a");
      if (link) {
        event.preventDefault();
      }

      const button = target.closest("button");
      if (button) {
        event.preventDefault();
      }

      const selectable = target.closest("[data-editor-selectable='true']");
      const page = getElementPage(target);

      if (page) {
        setCurrentPage(page, { scroll: false });
      }

      if (selectable) {
        selectElement(selectable);
        return;
      }

      clearSelection(false);

      if (page) {
        setCurrentPage(page, { scroll: false });
      }

      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function handlePreviewDoubleClick(event) {
      const target = getEventTargetElement(event);

      if (!target) {
        return;
      }

      const image = target.closest("img[data-editor-image='true']");
      if (!image) {
        return;
      }

      event.preventDefault();
      selectElement(image);
      replaceSelectedImage();
    }

    function handlePreviewPointerDown(event) {
      const target = getEventTargetElement(event);

      if (!target) {
        return;
      }

      const handle = target.closest("[data-editor-move-handle='true']");
      if (!handle || !appState.selectedElement) {
        return;
      }

      startElementDrag(appState.selectedElement, event);
    }

    function handlePreviewKeydown(event) {
      if (event.key === "Tab") {
        const target = event.target;
        if (target && target.nodeType === 1 && target.matches("[data-editor-text-editable='true']")) {
          event.preventDefault();
          setPreviewHint("Tab stays inside the current text element so typing remains predictable.");
        }
      }

      handleDeleteShortcut(event);
    }

    function handleAppKeydown(event) {
      handleDeleteShortcut(event);
    }

    function handleDeleteShortcut(event) {
      if (event.defaultPrevented || !isDeletionKey(event)) {
        return;
      }

      if (shouldIgnoreDeleteShortcut(event)) {
        return;
      }

      if (!canDeleteSelectedElement()) {
        return;
      }

      event.preventDefault();
      deleteSelectedElement();
    }

    function isDeletionKey(event) {
      return event.key === "Delete" || event.key === "Backspace";
    }

    function shouldIgnoreDeleteShortcut(event) {
      if (event.metaKey || event.ctrlKey || event.altKey) {
        return true;
      }

      const target = event.target;
      if (!target || target.nodeType !== 1) {
        return false;
      }

      if (target.matches("input, textarea, select")) {
        return true;
      }

      if (target.isContentEditable) {
        return true;
      }

      return false;
    }

    function handlePreviewMutation() {
      window.clearTimeout(appState.previewSyncTimer);
      appState.previewSyncTimer = window.setTimeout(syncSourceFromPreview, 90);
      updatePagePicker(previewFrame.contentDocument);
      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function getEventTargetElement(event) {
      if (event.target && event.target.nodeType === 1) {
        return event.target;
      }

      return event.target && event.target.parentElement ? event.target.parentElement : null;
    }

    function clearSelection(syncToolbar = true) {
      if (appState.selectedElement && typeof appState.selectedElement.removeAttribute === "function") {
        appState.selectedElement.removeAttribute("data-editor-selected");
      }

      appState.selectedElement = null;

      if (syncToolbar) {
        updateToolbarState();
      }

      scheduleOverlayRefresh();
    }

    function selectElement(element) {
      if (!element) {
        clearSelection();
        return;
      }

      if (appState.selectedElement === element) {
        setCurrentPage(getElementPage(element), { scroll: false });
        updateToolbarState();
        scheduleOverlayRefresh();
        return;
      }

      if (appState.selectedElement) {
        appState.selectedElement.removeAttribute("data-editor-selected");
      }

      appState.selectedElement = element;
      appState.selectedElement.setAttribute("data-editor-selected", "true");
      setCurrentPage(getElementPage(element), { scroll: false });
      updateToolbarState();
      scheduleOverlayRefresh();
    }

    function setCurrentPage(page, options = {}) {
      const previewDocument = previewFrame.contentDocument;

      if (!previewDocument || !page) {
        return;
      }

      const allPages = getPageElements(previewDocument);
      allPages.forEach((candidate) => candidate.removeAttribute("data-editor-page-active"));

      appState.selectedPage = page;
      page.setAttribute("data-editor-page-active", "true");

      updatePagePicker(previewDocument);
      updateToolbarState();
      updatePresenterViewUi();

      if (options.scroll) {
        page.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function getPageElements(previewDocument) {
      return Array.from(previewDocument.querySelectorAll("[data-editor-page='true']"));
    }

    function getElementPage(element) {
      if (!element || !element.ownerDocument) {
        return null;
      }

      return element.closest("[data-editor-page='true']") ||
        (element.ownerDocument.body.hasAttribute("data-editor-page") ? element.ownerDocument.body : null);
    }

    function ensureCurrentPage(previewDocument, createIfMissing) {
      if (!previewDocument) {
        return null;
      }

      if (appState.selectedElement) {
        const selectedPage = getElementPage(appState.selectedElement);
        if (selectedPage) {
          return selectedPage;
        }
      }

      if (appState.selectedPage && appState.selectedPage.ownerDocument === previewDocument && previewDocument.contains(appState.selectedPage)) {
        return appState.selectedPage;
      }

      const pages = getPageElements(previewDocument);
      if (pages.length) {
        return pages[0];
      }

      if (!createIfMissing) {
        return null;
      }

      if (isRemarkMode()) {
        createNewRemarkSlide();
        return null;
      }

      initializePageModel(previewDocument);
      return previewDocument.body;
    }

    function updatePagePicker(previewDocument) {
      if (!previewDocument) {
        return;
      }

      const pages = getPageElements(previewDocument);
      const activeId = appState.selectedPage?.getAttribute("data-editor-page-id") || pages[0]?.getAttribute("data-editor-page-id") || "";

      pageSelect.innerHTML = "";

      pages.forEach((page, index) => {
        const option = document.createElement("option");
        const pageId = page.getAttribute("data-editor-page-id");
        option.value = pageId;
        option.textContent = buildPageOptionLabel(page, index);
        pageSelect.appendChild(option);
      });

      pageSelect.disabled = pages.length <= 1;

      if (activeId) {
        pageSelect.value = activeId;
      }
    }

    function buildPageOptionLabel(page, index) {
      const noun = isRemarkMode() ? "Slide" : "Page";
      const heading = page.querySelector("h1, h2, h3");
      const headingText = heading ? heading.textContent.replace(/\s+/g, " ").trim().slice(0, 28) : "";
      return headingText ? `${noun} ${index + 1}: ${headingText}` : `${noun} ${index + 1}`;
    }

    function getActivePageIndex() {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return 0;
      }

      const pages = getPageElements(previewDocument);
      if (!pages.length) {
        return 0;
      }

      const active = appState.selectedPage || pages[0];
      const index = pages.indexOf(active);
      return index >= 0 ? index : 0;
    }

    function scheduleOverlayRefresh() {
      if (appState.overlaySyncFrame) {
        return;
      }

      appState.overlaySyncFrame = window.requestAnimationFrame(() => {
        appState.overlaySyncFrame = null;
        refreshSelectionOverlay();
      });
    }

    function refreshSelectionOverlay() {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return;
      }

      const selectionBox = previewDocument.querySelector("[data-editor-selection-box='true']");
      const moveHandle = previewDocument.querySelector("[data-editor-move-handle='true']");

      if (!selectionBox || !moveHandle) {
        return;
      }

      if (!appState.selectedElement || !previewDocument.contains(appState.selectedElement)) {
        selectionBox.removeAttribute("data-visible");
        selectionBox.style.left = "";
        selectionBox.style.top = "";
        selectionBox.style.width = "";
        selectionBox.style.height = "";
        clearAlignmentGuides(previewDocument);
        return;
      }

      const rect = appState.selectedElement.getBoundingClientRect();
      if (!rect.width || !rect.height) {
        selectionBox.removeAttribute("data-visible");
        clearAlignmentGuides(previewDocument);
        return;
      }

      const padding = 4;
      selectionBox.setAttribute("data-visible", "true");
      selectionBox.style.left = `${Math.round(rect.left - padding)}px`;
      selectionBox.style.top = `${Math.round(rect.top - padding)}px`;
      selectionBox.style.width = `${Math.round(rect.width + padding * 2)}px`;
      selectionBox.style.height = `${Math.round(rect.height + padding * 2)}px`;
      moveHandle.hidden = !canDragElement(appState.selectedElement);
    }

    function canDragElement(element) {
      if (!element || !element.ownerDocument) {
        return false;
      }

      return element !== element.ownerDocument.body;
    }

    function createRectSnapshot(rect) {
      const left = rect.left;
      const top = rect.top;
      const width = rect.width;
      const height = rect.height;
      return {
        left,
        top,
        width,
        height,
        right: left + width,
        bottom: top + height,
        centerX: left + width / 2,
        centerY: top + height / 2
      };
    }

    function offsetRectSnapshot(rect, deltaX, deltaY) {
      return {
        left: rect.left + deltaX,
        top: rect.top + deltaY,
        width: rect.width,
        height: rect.height,
        right: rect.right + deltaX,
        bottom: rect.bottom + deltaY,
        centerX: rect.centerX + deltaX,
        centerY: rect.centerY + deltaY
      };
    }

    function getRectMetric(rect, axis, key) {
      if (axis === "x") {
        if (key === "left") {
          return rect.left;
        }

        if (key === "right") {
          return rect.right;
        }

        return rect.centerX;
      }

      if (key === "top") {
        return rect.top;
      }

      if (key === "bottom") {
        return rect.bottom;
      }

      return rect.centerY;
    }

    function collectAlignmentSiblings(draggedElement, page) {
      return Array.from(page.querySelectorAll("[data-editor-selectable='true']")).reduce((result, candidate) => {
        if (
          candidate === draggedElement ||
          candidate.matches("[data-editor-page='true']") ||
          candidate.closest("[data-editor-overlay-root='true']") ||
          draggedElement.contains(candidate) ||
          candidate.contains(draggedElement)
        ) {
          return result;
        }

        const rect = createRectSnapshot(candidate.getBoundingClientRect());
        if (!rect.width || !rect.height) {
          return result;
        }

        result.push({ rect });
        return result;
      }, []);
    }

    function buildDragAlignmentContext(draggedElement, boundary) {
      const page = draggedElement.matches("[data-editor-page='true']")
        ? boundary
        : (getElementPage(draggedElement) || boundary);

      if (!page) {
        return null;
      }

      const pageRect = createRectSnapshot(page.getBoundingClientRect());
      const computed = previewFrame.contentWindow.getComputedStyle(page);
      return {
        pageRect,
        safeBounds: {
          left: pageRect.left + (Number.parseFloat(computed.paddingLeft) || 0),
          right: pageRect.right - (Number.parseFloat(computed.paddingRight) || 0),
          top: pageRect.top + (Number.parseFloat(computed.paddingTop) || 0),
          bottom: pageRect.bottom - (Number.parseFloat(computed.paddingBottom) || 0)
        },
        siblingRects: draggedElement.matches("[data-editor-page='true']") ? [] : collectAlignmentSiblings(draggedElement, page)
      };
    }

    function createAlignmentCandidate(axis, matchKey, currentValue, targetValue, priority, options = {}) {
      const diff = targetValue - currentValue;
      if (Math.abs(diff) > ALIGNMENT_SNAP_THRESHOLD) {
        return null;
      }

      return {
        axis,
        matchKey,
        position: targetValue,
        diff,
        priority,
        scope: options.scope || "page",
        siblingRect: options.siblingRect || null
      };
    }

    function pickBetterAlignmentCandidate(current, candidate) {
      if (!candidate) {
        return current;
      }

      if (!current) {
        return candidate;
      }

      const candidateDistance = Math.abs(candidate.diff);
      const currentDistance = Math.abs(current.diff);
      if (candidateDistance < currentDistance - 0.01) {
        return candidate;
      }

      if (candidateDistance <= currentDistance + 0.01 && candidate.priority < current.priority) {
        return candidate;
      }

      return current;
    }

    function findBestAlignment(axis, movingRect, alignmentContext) {
      if (!alignmentContext) {
        return null;
      }

      const isHorizontal = axis === "x";
      const pageTargets = isHorizontal
        ? {
          left: alignmentContext.safeBounds.left,
          center: alignmentContext.pageRect.centerX,
          right: alignmentContext.safeBounds.right
        }
        : {
          top: alignmentContext.safeBounds.top,
          center: alignmentContext.pageRect.centerY,
          bottom: alignmentContext.safeBounds.bottom
        };
      const keys = isHorizontal ? ["left", "center", "right"] : ["top", "center", "bottom"];

      return keys.reduce((best, key) => {
        const currentValue = getRectMetric(movingRect, axis, key);
        const pagePriority = key === "center" ? 0 : 2;
        let nextBest = pickBetterAlignmentCandidate(
          best,
          createAlignmentCandidate(axis, key, currentValue, pageTargets[key], pagePriority, { scope: "page" })
        );

        alignmentContext.siblingRects.forEach(({ rect }) => {
          const targetValue = getRectMetric(rect, axis, key);
          const priority = key === "center" ? 1 : 3;
          nextBest = pickBetterAlignmentCandidate(
            nextBest,
            createAlignmentCandidate(axis, key, currentValue, targetValue, priority, {
              scope: "sibling",
              siblingRect: rect
            })
          );
        });

        return nextBest;
      }, null);
    }

    function isAlignmentSatisfied(candidate, rect) {
      if (!candidate) {
        return false;
      }

      return Math.abs(candidate.position - getRectMetric(rect, candidate.axis, candidate.matchKey)) <= 0.75;
    }

    function buildAlignmentGuide(candidate, movingRect, alignmentContext) {
      if (!candidate || !alignmentContext) {
        return null;
      }

      if (candidate.axis === "x") {
        return {
          axis: "x",
          position: candidate.position,
          start: candidate.scope === "page"
            ? alignmentContext.pageRect.top
            : Math.min(movingRect.top, candidate.siblingRect?.top ?? movingRect.top),
          end: candidate.scope === "page"
            ? alignmentContext.pageRect.bottom
            : Math.max(movingRect.bottom, candidate.siblingRect?.bottom ?? movingRect.bottom)
        };
      }

      return {
        axis: "y",
        position: candidate.position,
        start: candidate.scope === "page"
          ? alignmentContext.pageRect.left
          : Math.min(movingRect.left, candidate.siblingRect?.left ?? movingRect.left),
        end: candidate.scope === "page"
          ? alignmentContext.pageRect.right
          : Math.max(movingRect.right, candidate.siblingRect?.right ?? movingRect.right)
      };
    }

    function resolveDragAlignment(proposedX, proposedY, dragState) {
      const previewRect = offsetRectSnapshot(
        dragState.startRect,
        proposedX - dragState.startTranslateX,
        proposedY - dragState.startTranslateY
      );
      const xCandidate = findBestAlignment("x", previewRect, dragState.alignmentContext);
      const yCandidate = findBestAlignment("y", previewRect, dragState.alignmentContext);
      const nextX = Math.round(clamp(proposedX + (xCandidate?.diff || 0), dragState.minX, dragState.maxX));
      const nextY = Math.round(clamp(proposedY + (yCandidate?.diff || 0), dragState.minY, dragState.maxY));
      const resolvedRect = offsetRectSnapshot(
        dragState.startRect,
        nextX - dragState.startTranslateX,
        nextY - dragState.startTranslateY
      );
      const resolvedX = isAlignmentSatisfied(xCandidate, resolvedRect) ? xCandidate : null;
      const resolvedY = isAlignmentSatisfied(yCandidate, resolvedRect) ? yCandidate : null;

      return {
        nextX,
        nextY,
        guides: [
          buildAlignmentGuide(resolvedX, resolvedRect, dragState.alignmentContext),
          buildAlignmentGuide(resolvedY, resolvedRect, dragState.alignmentContext)
        ].filter(Boolean)
      };
    }

    function startElementDrag(element, pointerEvent) {
      if (!canDragElement(element)) {
        return;
      }

      const previewDocument = previewFrame.contentDocument;
      const boundary = getDragBoundary(element);

      if (!previewDocument || !boundary) {
        return;
      }

      pointerEvent.preventDefault();
      ensureTransformState(element);

      const startX = pointerEvent.clientX;
      const startY = pointerEvent.clientY;
      const startTranslateX = getTransformValue(element, "data-editor-translate-x");
      const startTranslateY = getTransformValue(element, "data-editor-translate-y");
      const startRect = createRectSnapshot(element.getBoundingClientRect());
      const boundaryRect = createRectSnapshot(boundary.getBoundingClientRect());
      const alignmentContext = buildDragAlignmentContext(element, boundary);
      const padding = 8;

      element.setAttribute("data-editor-dragging", "true");
      previewDocument.body.style.userSelect = "none";
      clearAlignmentGuides(previewDocument);

      const onMove = (moveEvent) => {
        const deltaX = moveEvent.clientX - startX;
        const deltaY = moveEvent.clientY - startY;

        const minX = startTranslateX + (boundaryRect.left + padding - startRect.left);
        const maxX = startTranslateX + (boundaryRect.right - padding - startRect.right);
        const minY = startTranslateY + (boundaryRect.top + padding - startRect.top);
        const maxY = startTranslateY + (boundaryRect.bottom - padding - startRect.bottom);

        const nextX = clamp(startTranslateX + deltaX, minX, maxX);
        const nextY = clamp(startTranslateY + deltaY, minY, maxY);
        const resolvedDrag = resolveDragAlignment(nextX, nextY, {
          startRect,
          startTranslateX,
          startTranslateY,
          minX,
          maxX,
          minY,
          maxY,
          alignmentContext
        });

        element.setAttribute("data-editor-translate-x", String(resolvedDrag.nextX));
        element.setAttribute("data-editor-translate-y", String(resolvedDrag.nextY));
        applyManagedTransform(element);
        renderAlignmentGuides(previewDocument, resolvedDrag.guides);
        scheduleOverlayRefresh();
      };

      const onUp = () => {
        element.removeAttribute("data-editor-dragging");
        previewDocument.body.style.userSelect = "";
        clearAlignmentGuides(previewDocument);
        previewDocument.removeEventListener("pointermove", onMove);
        previewDocument.removeEventListener("pointerup", onUp);
        previewDocument.removeEventListener("pointercancel", onUp);
        syncSourceFromPreview();
      };

      previewDocument.addEventListener("pointermove", onMove);
      previewDocument.addEventListener("pointerup", onUp);
      previewDocument.addEventListener("pointercancel", onUp);
    }

    function getDragBoundary(element) {
      if (element.matches("[data-editor-page='true']")) {
        return element.ownerDocument.body;
      }

      return getElementPage(element) || element.ownerDocument.body;
    }

    function clamp(value, min, max) {
      if (min > max) {
        return value;
      }

      return Math.min(Math.max(value, min), max);
    }

    function ensureTransformState(element) {
      if (!element.hasAttribute("data-editor-base-transform")) {
        const computedTransform = previewFrame.contentWindow.getComputedStyle(element).transform;
        element.setAttribute("data-editor-base-transform", computedTransform && computedTransform !== "none" ? computedTransform : "");
      }

      if (!element.hasAttribute("data-editor-translate-x")) {
        element.setAttribute("data-editor-translate-x", "0");
      }

      if (!element.hasAttribute("data-editor-translate-y")) {
        element.setAttribute("data-editor-translate-y", "0");
      }

      if (!element.hasAttribute("data-editor-rotate")) {
        element.setAttribute("data-editor-rotate", "0");
      }
    }

    function getTransformValue(element, attributeName) {
      return Number.parseFloat(element.getAttribute(attributeName) || "0") || 0;
    }

    function applyManagedTransform(element) {
      const baseTransform = element.getAttribute("data-editor-base-transform") || "";
      const translateX = getTransformValue(element, "data-editor-translate-x");
      const translateY = getTransformValue(element, "data-editor-translate-y");
      const rotate = getTransformValue(element, "data-editor-rotate");
      const parts = [];

      if (baseTransform) {
        parts.push(baseTransform);
      }

      if (translateX || translateY) {
        parts.push(`translate(${translateX}px, ${translateY}px)`);
      }

      if (rotate) {
        parts.push(`rotate(${rotate}deg)`);
      }

      element.style.transform = parts.join(" ").trim();
    }

    function getSelectedTextTarget() {
      const selectedElement = appState.selectedElement;
      return selectedElement && selectedElement.matches("[data-editor-text-editable='true']") ? selectedElement : null;
    }

    function getSelectedImageTarget() {
      const selectedElement = appState.selectedElement;
      return selectedElement && selectedElement.matches("img[data-editor-image='true']") ? selectedElement : null;
    }

    function canDeleteSelectedElement() {
      const element = appState.selectedElement;
      if (!element || !element.ownerDocument) {
        return false;
      }

      if (element === element.ownerDocument.body) {
        return false;
      }

      if (element.closest("[data-editor-overlay-root='true']")) {
        return false;
      }

      if (element.matches("[data-editor-page='true']")) {
        return false;
      }

      return true;
    }

    function canDeleteCurrentPage() {
      const previewDocument = previewFrame.contentDocument;
      if (!previewDocument) {
        return false;
      }

      const pages = getPageElements(previewDocument);
      if (pages.length <= 1) {
        return false;
      }

      const page = ensureCurrentPage(previewDocument, false);
      if (!page) {
        return false;
      }

      return page !== previewDocument.body;
    }

    function updateToolbarState() {
      const textTarget = getSelectedTextTarget();
      const imageTarget = getSelectedImageTarget();

      textControlsGroup.hidden = !textTarget;
      imageControlsGroup.hidden = !imageTarget;

      textStyleControls.forEach((control) => {
        control.disabled = !textTarget;
      });

      imageStyleControls.forEach((control) => {
        control.disabled = !imageTarget;
      });

      if (textTarget) {
        const computed = previewFrame.contentWindow.getComputedStyle(textTarget);
        fontFamilyControl.value = matchFontFamilyOption(computed.fontFamily);
        fontSizeControl.value = parseInt(computed.fontSize, 10) || 28;
        fontWeightControl.value = normalizeWeightOption(computed.fontWeight);
        textColorControl.value = toHexColor(computed.color, "#14213d");
        backgroundColorControl.value = toHexColor(computed.backgroundColor, "#ffffff");
        textAlignControl.value = computed.textAlign || "left";
        italicButton.setAttribute("aria-pressed", String(computed.fontStyle === "italic"));
        underlineButton.setAttribute("aria-pressed", String((computed.textDecorationLine || "").includes("underline")));
      } else {
        italicButton.setAttribute("aria-pressed", "false");
        underlineButton.setAttribute("aria-pressed", "false");
      }

      if (imageTarget) {
        const computed = previewFrame.contentWindow.getComputedStyle(imageTarget);
        imageWidthControl.value = Math.max(1, Math.round(imageTarget.getBoundingClientRect().width));
        imageHeightControl.value = Math.max(1, Math.round(imageTarget.getBoundingClientRect().height));
        imageRadiusControl.value = Math.max(0, Math.round(parseFloat(computed.borderTopLeftRadius) || 0));
        imageOpacityControl.value = Math.round((parseFloat(computed.opacity) || 1) * 100);
        imageRotateControl.value = Math.round(getTransformValue(imageTarget, "data-editor-rotate"));
        imageObjectFitControl.value = computed.objectFit || "fill";
        imageFilterControl.value = matchImageFilterPreset(imageTarget.style.filter || computed.filter);
      }

      deleteElementButton.disabled = !canDeleteSelectedElement();
      deletePageButton.disabled = !canDeleteCurrentPage();
      deletePageButton.textContent = isRemarkMode() ? "Delete Slide" : "Delete Page";

      updateRemarkMetadataControls();
    }

    function updateRemarkMetadataControls() {
      if (!isRemarkMode()) {
        slideClassControl.disabled = true;
        slideClassControl.value = "";
        return;
      }

      const slide = getCurrentRemarkSlide();
      slideClassControl.disabled = !slide;
      slideClassControl.value = slide ? getSlideDirectiveValue(slide, "class") : "";
    }

    function togglePresenterView() {
      if (!isRemarkMode()) {
        return;
      }

      appState.presenterView = !appState.presenterView;
      persistWorkspacePreference(STORAGE_KEYS.presenterView, appState.presenterView);
      updatePresenterViewUi();
    }

    function updatePresenterViewUi() {
      const isRelevant = isRemarkMode();
      const isVisible = isRelevant && appState.presenterView;
      presenterViewButton.setAttribute("aria-pressed", String(isVisible));
      presenterViewButton.textContent = "Presenter View";
      presenterViewButton.disabled = !isRelevant;
      presenterNotesPanel.hidden = !isVisible;
      presenterNotesPanel.setAttribute("aria-hidden", String(!isVisible));
      notesResizeHandle.hidden = !isVisible || window.innerWidth <= 980;
      previewSplit.classList.toggle("is-notes-visible", isVisible);

      if (!isVisible) {
        setPresenterNotesValue("");
        presenterNotesStatus.textContent = "Notes hidden";
        presenterNotesInput.disabled = true;
        return;
      }

      const slide = getCurrentRemarkSlide();
      const notes = slide?.notesSource || "";
      setPresenterNotesValue(notes);
      presenterNotesInput.disabled = !slide;
      presenterNotesStatus.textContent = notes ? "Notes visible" : "No notes yet";
    }

    function setPresenterNotesValue(value) {
      appState.isUpdatingNotesInternally = true;
      presenterNotesInput.value = value;
      appState.isUpdatingNotesInternally = false;
    }

    function handlePresenterNotesInput() {
